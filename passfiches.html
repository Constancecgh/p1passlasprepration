<style>
[data-theme="light"]{--bg:#f8f7f4;--surface:#fff;--border:#e8e0d4;--text:#1e1b18;--muted:#6b7280;--accent:#059669;--toggle-bg:#e8e0d4;}

*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Source Serif 4',serif;min-height:100vh;}
nav{position:fixed;top:0;left:0;right:0;z-index:200;padding:1rem 2.5rem;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);backdrop-filter:blur(12px);background:rgba(248,247,244,.92);}
[data-theme="dark"] nav{background:rgba(10,10,15,.92);}
.nav-logo{font-family:'Cormorant Garamond',serif;font-size:1.2rem;color:var(--accent);text-decoration:none;}
.nav-back{font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);text-decoration:none;}
.nav-back:hover{color:var(--text);}
.theme-toggle{background:var(--toggle-bg);border:1px solid var(--border);border-radius:100px;padding:5px 12px;cursor:pointer;font-size:13px;color:var(--muted);}

header{padding:90px 48px 36px;max-width:1100px;margin:0 auto;}
h1{font-family:'Libre Baskerville',serif;font-size:clamp(26px,4vw,40px);font-weight:700;margin-bottom:6px;}
.header-sub{color:var(--muted);font-size:14px;margin-bottom:24px;}

/* FILTRES */
.filters{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:36px;}
.filter-btn{padding:6px 14px;border:1.5px solid var(--border);border-radius:100px;font-size:12px;font-weight:600;cursor:pointer;background:var(--surface);color:var(--muted);transition:all .18s;font-family:'Source Serif 4',serif;}
.filter-btn.active{color:#fff;}
.filter-btn:hover{opacity:.85;}

/* GRILLE FICHES */
main{padding:0 48px 80px;max-width:1100px;margin:0 auto;}
.matieres-sections{}

.matiere-section{margin-bottom:48px;}
.matiere-header{display:flex;align-items:center;gap:12px;margin-bottom:18px;padding-bottom:12px;border-bottom:1px solid var(--border);}
.matiere-icon{font-size:20px;}
.matiere-name{font-family:'Libre Baskerville',serif;font-size:18px;font-weight:700;}
.matiere-count{font-size:11px;color:var(--muted);font-weight:600;letter-spacing:.08em;}

.chapitres-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;}

.fiche-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px 20px;border-left:3px solid var(--ac, #059669);transition:all .2s;}
.fiche-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.06);}
.fiche-num{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
.fiche-title{font-family:'Libre Baskerville',serif;font-size:14px;font-weight:700;margin-bottom:12px;color:var(--text);}
.fiche-points{list-style:none;display:flex;flex-direction:column;gap:5px;}
.fiche-points li{font-size:12px;color:var(--muted);line-height:1.5;padding-left:12px;position:relative;}
.fiche-points li::before{content:'→';position:absolute;left:0;color:var(--ac,#059669);font-size:10px;top:2px;}
.fiche-points li strong{color:var(--text);font-weight:600;}
.fiche-link{display:inline-block;margin-top:12px;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ac,#059669);text-decoration:none;transition:opacity .2s;}
.fiche-link:hover{opacity:.7;}

@media(max-width:600px){header,main{padding-left:16px;padding-right:16px;}header{padding-top:72px;}nav{padding:.85rem 1.2rem;}}
</style>
</head>

// Construire les filtres
var filtersEl = document.getElementById('filters');
DATA.forEach(function(m){
  var btn = document.createElement('button');
  btn.className = 'filter-btn';
  btn.textContent = m.matiere;
  btn.style.cssText = 'border-color:'+m.color+';color:'+m.color+';';
  btn.onclick = function(){ filterMat(btn, m.matiere); };
  filtersEl.appendChild(btn);
});

// Construire le contenu
var mainEl = document.getElementById('main-content');
DATA.forEach(function(m){
  var sec = document.createElement('div');
  sec.className = 'matiere-section';
  sec.dataset.matiere = m.matiere;

  var chapHTML = m.chapitres.map(function(ch){
    var pts = ch.points.map(function(p){ return '<li>'+p+'</li>'; }).join('');
    return '<div class="fiche-card" style="--ac:'+m.color+'"><div class="fiche-num">'+ch.num+'</div><div class="fiche-title">'+ch.title+'</div><ul class="fiche-points">'+pts+'</ul><a class="fiche-link" href="'+ch.url+'">Fiche complète →</a></div>';
  }).join('');

  sec.innerHTML = '<div class="matiere-header"><span class="matiere-icon">'+m.icon+'</span><span class="matiere-name">'+m.matiere+'</span><span class="matiere-count">'+m.chapitres.length+' chapitres</span></div><div class="chapitres-grid">'+chapHTML+'</div>';
  mainEl.appendChild(sec);
});

var activeMatiere = null;

function filterAll(btn){
  activeMatiere = null;
  document.querySelectorAll('.filter-btn').forEach(function(b){ b.classList.remove('active'); b.style.background=''; b.style.color=b.style.borderColor||''; });
  btn.classList.add('active'); btn.style.background='#1e1b18'; btn.style.color='#fff';
  document.querySelectorAll('.matiere-section').forEach(function(s){ s.style.display=''; });
}

function filterMat(btn, matiere){
  activeMatiere = matiere;
  document.querySelectorAll('.filter-btn').forEach(function(b){ b.classList.remove('active'); b.style.background=''; });
  btn.classList.add('active');
  var col = btn.style.borderColor;
  btn.style.background = col; btn.style.color = '#fff';
  document.querySelectorAll('.matiere-section').forEach(function(s){
    s.style.display = (s.dataset.matiere === matiere) ? '' : 'none';
  });
}

function toggleTheme(){var h=document.documentElement,b=document.getElementById('themeBtn');h.dataset.theme=h.dataset.theme==='dark'?'light':'dark';b.textContent=h.dataset.theme==='dark'?'☀️':'🌙';}
