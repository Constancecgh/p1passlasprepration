<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>QCM Toutes Matières PASS — Constance</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Source+Serif+4:opsz,wght@8..60,300;8..60,400;8..60,600&family=Cormorant+Garamond:wght@300;400&display=swap" rel="stylesheet">
<style>
[data-theme="light"]{--bg:#f8f7f4;--surface:#fff;--border:#e8e0d4;--text:#1e1b18;--muted:#6b7280;--pt:rgba(0,0,0,0.07);--tg:#e8e0d4;--opt:rgba(0,0,0,0.02);--oh:rgba(0,0,0,0.05);}
[data-theme="dark"]{--bg:#0a0a0f;--surface:#13131a;--border:#1e1e2e;--text:#e2e8f0;--muted:#64748b;--pt:rgba(255,255,255,0.06);--tg:#1e1e2e;--opt:rgba(255,255,255,0.03);--oh:rgba(255,255,255,0.07);}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Source Serif 4',serif;min-height:100vh;}
nav{position:fixed;top:0;left:0;right:0;z-index:200;padding:1rem 2.5rem;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);backdrop-filter:blur(12px);background:rgba(248,247,244,.90);}
[data-theme="dark"] nav{background:rgba(10,10,15,.90);}
.nav-logo{font-family:'Cormorant Garamond',serif;font-size:1.2rem;color:#6366f1;text-decoration:none;}
.nav-back{font-size:.75rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);text-decoration:none;}
.theme-toggle{background:var(--tg);border:1px solid var(--border);border-radius:100px;padding:5px 12px;cursor:pointer;font-size:14px;color:var(--muted);}
.view{max-width:700px;margin:0 auto;padding:100px 40px 48px;}
.view{display:none;} #setupView{display:block;}
h1{font-family:'Libre Baskerville',serif;font-size:clamp(28px,4vw,42px);font-weight:700;margin-bottom:8px;}
.sub{color:var(--muted);font-size:14px;margin-bottom:28px;line-height:1.7;}
.lbl{font-size:10px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:24px;}
.mat-btn{border:1.5px solid var(--border);border-radius:100px;padding:6px 14px;font-size:12px;font-weight:600;cursor:pointer;background:var(--surface);color:var(--muted);transition:all .18s;font-family:'Source Serif 4',serif;}
.mat-btn.on{color:#fff;}
.stats-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:24px;}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 18px;min-width:100px;}
.stat-v{font-family:'Libre Baskerville',serif;font-size:24px;font-weight:700;color:#6366f1;}
.stat-l{font-size:10px;color:var(--muted);font-weight:600;letter-spacing:.08em;text-transform:uppercase;}
.cfg{display:flex;align-items:center;gap:12px;margin-bottom:24px;flex-wrap:wrap;}
select{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 14px;font-size:13px;color:var(--text);cursor:pointer;font-family:'Source Serif 4',serif;}
.go{width:100%;padding:16px;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;border:none;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Source Serif 4',serif;transition:opacity .2s;}
.go:hover{opacity:.88;} .go:disabled{opacity:.35;cursor:default;}
.qh{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.qmat{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;}
.qnum{font-size:11px;color:var(--muted);font-weight:600;}
.qbar{height:3px;background:var(--pt);border-radius:100px;overflow:hidden;margin-bottom:24px;}
.qbar-fill{height:100%;background:linear-gradient(90deg,#6366f1,#8b5cf6);border-radius:100px;transition:width .4s;}
.qq{font-family:'Libre Baskerville',serif;font-size:18px;font-weight:700;line-height:1.55;margin-bottom:20px;}
.opts{display:flex;flex-direction:column;gap:9px;margin-bottom:14px;}
.opt{padding:13px 16px;background:var(--opt);border:1.5px solid var(--border);border-radius:11px;font-size:13px;cursor:pointer;color:var(--text);text-align:left;font-family:'Source Serif 4',serif;line-height:1.5;transition:all .15s;}
.opt:hover:not(:disabled){background:var(--oh);border-color:var(--muted);}
.opt.correct{background:rgba(99,102,241,.1);border-color:#6366f1;color:#4338ca;}
[data-theme="dark"] .opt.correct{color:#a5b4fc;}
.opt.wrong{background:rgba(239,68,68,.08);border-color:#ef4444;color:#b91c1c;}
[data-theme="dark"] .opt.wrong{color:#fca5a5;}
.opt:disabled{cursor:default;}
.fb{font-size:13px;line-height:1.6;padding:13px 16px;border-radius:11px;margin-bottom:14px;display:none;border:1px solid;}
.fb.show{display:block;}
.fb.ok{background:rgba(99,102,241,.07);border-color:#6366f1;color:#4338ca;}
[data-theme="dark"] .fb.ok{color:#a5b4fc;}
.fb.ko{background:rgba(239,68,68,.07);border-color:#ef4444;color:#b91c1c;}
[data-theme="dark"] .fb.ko{color:#fca5a5;}
.nxt{background:none;border:1.5px solid var(--border);border-radius:10px;padding:10px 22px;font-size:13px;font-weight:700;color:var(--muted);cursor:pointer;font-family:'Source Serif 4',serif;transition:all .2s;display:none;}
.nxt.show{display:inline-block;}
.nxt:hover{border-color:#6366f1;color:#6366f1;}
.sb{font-size:12px;color:var(--muted);font-weight:600;margin-top:8px;}
.res-emoji{font-size:56px;text-align:center;margin-bottom:14px;}
.res-score{font-family:'Libre Baskerville',serif;font-size:48px;font-weight:700;color:#6366f1;text-align:center;}
.res-sub{color:var(--muted);font-size:14px;text-align:center;margin-bottom:28px;}
.res-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.res-mat{font-size:11px;font-weight:700;width:150px;flex-shrink:0;}
.res-track{flex:1;height:6px;background:var(--pt);border-radius:100px;overflow:hidden;}
.res-fill{height:100%;border-radius:100px;}
.res-pct{font-size:11px;font-weight:700;color:var(--muted);width:36px;text-align:right;}
.actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:28px;}
.btn-r{padding:12px 28px;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Source Serif 4',serif;}
.btn-b{padding:12px 28px;background:var(--surface);border:1.5px solid var(--border);border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Source Serif 4',serif;color:var(--text);text-decoration:none;display:inline-block;}
@media(max-width:600px){.view{padding:80px 20px 32px;}nav{padding:.9rem 1.2rem;}}
</style>
</head>
<body>
<nav>
  <a class="nav-logo" href="index.html">Constance</a>
  <a class="nav-back" href="index.html">← Dashboard</a>
  <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙</button>
</nav>

<div class="view" id="setupView">
  <h1>QCM Entraînement</h1>
  <p class="sub">310 questions · 10 matières · Mode entraînement illimité.<br>Sélectionne les matières et lance.</p>
  <div class="stats-row">
    <div class="stat"><div class="stat-v" id="stTotal">310</div><div class="stat-l">Questions</div></div>
    <div class="stat"><div class="stat-v" id="stMat">9</div><div class="stat-l">Matières</div></div>
    <div class="stat"><div class="stat-v" id="stScore">—</div><div class="stat-l">Dernier score</div></div>
    <div class="stat"><div class="stat-v" id="stDone">0</div><div class="stat-l">Sessions</div></div>
  </div>
  <div class="lbl">Filtrer par matière</div>
  <div class="chips" id="matGrid"></div>
  <div class="cfg">
    <span style="font-size:12px;color:var(--muted);font-weight:600;">Nombre de questions</span>
    <select id="nbSel">
      <option value="10">10 questions</option>
      <option value="20" selected>20 questions</option>
      <option value="30">30 questions</option>
      <option value="50">50 questions</option>
      <option value="999">Tout (max)</option>
    </select>
  </div>
  <button class="go" onclick="startQuiz()">🎯 Lancer le QCM</button>
</div>

<div class="view" id="quizView">
  <div class="qh"><span class="qmat" id="qMat"></span><span class="qnum" id="qNum"></span></div>
  <div class="qbar"><div class="qbar-fill" id="qProg" style="width:0%"></div></div>
  <div class="qq" id="qText"></div>
  <div class="opts" id="qOpts"></div>
  <div class="fb" id="qFb"></div>
  <button class="nxt" id="qNxt" onclick="nextQ()">Question suivante →</button>
  <div class="sb" id="qSb"></div>
</div>

<div class="view" id="resultView">
  <div class="res-emoji" id="rEmoji"></div>
  <div class="res-score" id="rScore"></div>
  <div class="res-sub" id="rSub"></div>
  <div class="lbl">Par matière</div>
  <div id="rBars"></div>
  <div class="actions">
    <button class="btn-r" onclick="retry()">🔁 Rejouer</button>
    <a class="btn-b" href="index.html">← Dashboard</a>
  </div>
</div>

<script>
function toggleTheme(){var h=document.documentElement,b=document.getElementById('themeBtn');h.dataset.theme=h.dataset.theme==='light'?'dark':'light';b.textContent=h.dataset.theme==='dark'?'☀️':'🌙';}
var Q=[{"q": "La glycine est le seul AA achiral car :", "opts": ["Elle est très petite", "Son carbone α porte deux hydrogènes identiques (R = H) → pas de C asymétrique", "Elle ne forme pas de liaisons peptidiques", "Elle est chargée négativement"], "a": 1, "exp": "C* = 4 substituants TOUS différents. Glycine : Cα porte NH<sub>2</sub>, COOH, H, H → deux H identiques → pas de C asymétrique → achirale. Tous les autres AA naturels ont un Cα chiral de configuration L.", "matiere": "Biochimie", "color": "#d97706", "fichier": "biochimieaa"}, {"q": "Les 9 acides aminés essentiels comprennent :", "opts": ["Glycine, Alanine, Sérine, Cystéine, Arginine, Histidine, Tyrosine, Asparagine, Glutamine", "Phénylalanine, Valine, Thréonine, Tryptophane, Isoleucine, Méthionine, Histidine, Leucine, Lysine", "Tous les AA aromatiques", "Les AA acides uniquement"], "a": 1, "exp": "Mémo PVT TIM HaLL : Phe-Val-Thr-Trp-Ile-Met-His-Leu-Lys. Non synthétisables par l'humain → apport alimentaire obligatoire. Carence Trp → déficit sérotonine + niacine.", "matiere": "Biochimie", "color": "#d97706", "fichier": "biochimieaa"}, {"q": "Le pI d'un AA basique (ex : Lysine) est :", "opts": ["Inférieur à 7 (acide)", "Supérieur à 7 (basique) car la chaîne latérale est chargée positivement", "Égal à 7 (neutre)", "Identique à celui de la glycine"], "a": 1, "exp": "pI AA basique (Lys, Arg, His) > 7 car il faut un pH plus élevé pour les neutraliser. pI Lys ~9,7. pI Arg ~10,8. pI His ~7,6. pI AA acides (Asp, Glu) < 7 (pI Asp ~2,8). pI AA simples ~6.", "matiere": "Biochimie", "color": "#d97706", "fichier": "biochimieaa"}, {"q": "La phénylcétonurie (PKU) résulte d'un déficit en :", "opts": ["Tyrosine transférase", "Phénylalanine hydroxylase → accumulation de Phe → toxicité cérébrale", "Tryptophane déshydrogenase", "Phénylalanine-ARNt synthétase"], "a": 1, "exp": "PKU : déficit en Phe hydroxylase → Phe ne peut pas être convertie en Tyrosine → accumulation Phe → phénylacétate → neurotoxique. Dépistage néonatal systématique. Régime pauvre en Phe dès la naissance. Aspartame contre-indiqué (contient Phe).", "matiere": "Biochimie", "color": "#d97706", "fichier": "biochimieaa"}, {"q": "La vitamine C est indispensable pour la synthèse du collagène car :", "opts": ["Elle fournit les acides aminés", "Elle est cofacteur de la prolyl-hydroxylase → hydroxyproline → stabilité du collagène", "Elle active la glycine", "Elle est un antioxydant uniquement"], "a": 1, "exp": "Vitamine C (ascorbate) = cofacteur de la prolyl-hydroxylase et lysyl-hydroxylase → hydroxylation de Pro et Lys → hydroxyproline et hydroxylysine → triple hélice stable du collagène. Carence → scorbut (collagène instable → hémorragies, mauvaise cicatrisation).", "matiere": "Biochimie", "color": "#d97706", "fichier": "biochimieaa"}, {"q": "Le précurseur de la dopamine, la noradrénaline et l'adrénaline est :", "opts": ["Le tryptophane", "La tyrosine → DOPA → dopamine → noradrénaline → adrénaline (catécholamines)", "L'histidine", "La sérine"], "a": 1, "exp": "Voie de biosynthèse des catécholamines : Tyrosine → L-DOPA (tyrosine hydroxylase) → Dopamine (DOPA décarboxylase) → Noradrénaline (dopamine β-hydroxylase) → Adrénaline (PNMT). Déficit en dopamine → maladie de Parkinson. Cocaïne bloque la recapture de dopamine/noradrénaline.", "matiere": "Biochimie", "color": "#d97706", "fichier": "biochimieaa"}, {"q": "L'uracile remplace la thymine dans l'ARN car :", "opts": ["L'uracile est plus stable", "L'ARN utilise le ribose (2'-OH) et ne nécessite pas la méthylation en C5 de l'uracile (= thymine) — économie de biosynthèse", "L'uracile s'apparie mieux avec A", "L'ARN polymérase ne reconnaît pas la thymine"], "a": 1, "exp": "Thymine = 5-méthyluracile. La méthylation coûte de l'énergie (SAM). L'ARN est transitoire → pas besoin de la stabilité supplémentaire de la thymine. De plus, la désamination de C → U (mutation fréquente) serait invisible dans l'ARN (U est normal), donc l'ADN utilise T pour détecter la désamination de C.", "matiere": "Biochimie", "color": "#d97706", "fichier": "biochimieadn"}, {"q": "La règle de Chargaff stipule que dans l'ADN double brin :", "opts": ["A = G et C = T", "A = T et G = C (appariements Watson-Crick → %purines = %pyrimidines)", "A = C et G = T", "Les 4 bases sont en proportions égales"], "a": 1, "exp": "Règle de Chargaff : A=T (2 liaisons H) et G≡C (3 liaisons H) → %A = %T et %G = %C. Conséquence : %purines = %pyrimidines. GC-rich DNA → Tm plus élevée (plus de liaisons H).", "matiere": "Biochimie", "color": "#d97706", "fichier": "biochimieadn"}, {"q": "La réplication de l'ADN est dite semi-conservative car :", "opts": ["Seule la moitié du génome est répliquée", "Chaque molécule fille contient 1 brin parental + 1 brin néosynthétisé", "2 nouvelles molécules d'ADN entièrement neuves sont formées", "Un seul brin est répliqué par cycle"], "a": 1, "exp": "Semi-conservatif (Meselson & Stahl, 1958, expérience N<sup>1</sup><sup>5</sup>/N<sup>1</sup><sup>4</sup>) : chaque brin parental sert de matrice → 2 molécules filles, chacune avec 1 brin ancien + 1 brin nouveau. Ni conservatif (1 ancienne + 1 toute neuve) ni dispersif.", "matiere": "Biochimie", "color": "#d97706", "fichier": "biochimieadn"}, {"q": "L'épissage (splicing) des pré-ARNm consiste à :", "opts": ["Ajouter la coiffe 5' méthylguanosine", "Exciser les introns et lier les exons pour former l'ARNm mature", "Ajouter la queue poly-A en 3'", "Exporter l'ARNm du noyau"], "a": 1, "exp": "Splicing : les introns sont excisés par le splicéosome (complexe ARN+protéines) et les exons sont liés. Splicing alternatif → plusieurs isoformes protéiques depuis 1 gène. Maturation complète : coiffe 5' + splicing + poly-A → ARNm mature exporté vers le cytoplasme.", "matiere": "Biochimie", "color": "#d97706", "fichier": "biochimieadn"}, {"q": "Le codon AUG code pour :", "opts": ["La glutamine", "La méthionine ET initie toujours la traduction", "L'alanine", "Un codon stop"], "a": 1, "exp": "AUG = Met = seul codon initiateur de la traduction. Toute protéine commence par Met (souvent clivée ensuite par la méthionine aminopeptidase). Dans les procaryotes, AUG code pour fMet (formylméthionine). Les 3 codons stop = UAA, UAG, UGA (aucun ARNt correspondant → facteurs de terminaison).", "matiere": "Biochimie", "color": "#d97706", "fichier": "biochimieadn"}, {"q": "Le xeroderma pigmentosum est dû à un déficit dans :", "opts": ["Le système MMR (mismatch repair)", "Le système NER (nucleotide excision repair) → accumulation de dimères de thymine UV → cancers cutanés", "Le système BER (base excision repair)", "La télomérase"], "a": 1, "exp": "Xeroderma pigmentosum (XP) : déficit en NER → dimères de thymine UV non réparés → mutations → mélanomes et carcinomes cutanés précoces. Photosensibilité extrême. Déficit MMR → syndrome de Lynch (cancer colorectal). Déficit BRCA1/2 → cancer du sein (déficit HDR).", "matiere": "Biochimie", "color": "#d97706", "fichier": "biochimieadn"}, {"q": "Le Km d'une enzyme représente :", "opts": ["La vitesse maximale de la réaction", "La concentration en substrat [S] pour laquelle v = Vmax/2 → mesure de l'affinité pour le substrat", "La quantité d'enzyme totale", "La constante de dissociation enzyme-inhibiteur"], "a": 1, "exp": "Km = [S] pour laquelle v = Vmax/2. Km faible = forte affinité (enzyme quasi-saturée à faible [S]). Km élevé = faible affinité (nécessite beaucoup de substrat pour atteindre Vmax/2). Glucokinase (Km élevé) vs Hexokinase (Km faible).", "matiere": "Biochimie", "color": "#d97706", "fichier": "biochimieenzymes"}, {"q": "Dans l'inhibition compétitive :", "opts": ["Vmax diminue, Km identique", "Km apparent augmente, Vmax identique (excès de substrat peut déplacer l'inhibiteur)", "Les deux Km et Vmax diminuent", "Km diminue, Vmax augmente"], "a": 1, "exp": "Inhibition compétitive : inhibiteur ressemble au substrat → compète pour le site actif → Km apparent ↑. Mais avec excès de substrat, on peut déplacer l'inhibiteur → Vmax identique. Ex : méthotrexate/DHFR, statines/HMG-CoA réductase.", "matiere": "Biochimie", "color": "#d97706", "fichier": "biochimieenzymes"}, {"q": "La rétro-inhibition (feedback inhibition) dans la glycolyse : l'ATP inhibe :", "opts": ["L'hexokinase (étape 1) uniquement", "La phosphofructokinase-1 (PFK-1, étape 3) — enzyme allostérique clé de la glycolyse", "La pyruvate kinase (étape 10) uniquement", "Toutes les enzymes simultanément"], "a": 1, "exp": "ATP ↑ → cellule chargée énergétiquement → inhibe PFK-1 (allostériquement) → glycolyse ralentie → pas de surplus d'énergie. AMP ↑ → cellule déchargée → active PFK-1 → glycolyse accélérée. Mécanisme de thermostat énergétique.", "matiere": "Biochimie", "color": "#d97706", "fichier": "biochimieenzymes"}, {"q": "Le bilan du cycle de Krebs pour 1 acétyl-CoA est :", "opts": ["1 NADH + 1 FADH<sub>2</sub> + 1 GTP", "3 NADH + 1 FADH<sub>2</sub> + 1 GTP + 2 CO<sub>2</sub>", "4 NADH + 2 FADH<sub>2</sub> + 2 GTP", "6 NADH + 6 CO<sub>2</sub> + 2 ATP"], "a": 1, "exp": "Krebs (par acétyl-CoA) : 3 NADH + 1 FADH<sub>2</sub> + 1 GTP + 2 CO<sub>2</sub>. Pour 1 glucose → 2 tours → 6 NADH + 2 FADH<sub>2</sub> + 2 GTP (+ 2 NADH de la pyruvate déshydrogénase). La glycolyse + Krebs + phosphorylation oxydative ≈ 30-32 ATP/glucose.", "matiere": "Biochimie", "color": "#d97706", "fichier": "biochimieenzymes"}, {"q": "La thiamine (vitamine B1) est cofacteur de :", "opts": ["La lactate déshydrogénase", "La pyruvate déshydrogénase (décarboxylation oxydative du pyruvate → acétyl-CoA)", "L'hexokinase", "La citrate synthase"], "a": 1, "exp": "Thiamine (B1) → TPP (thiamine pyrophosphate) → cofacteur de pyruvate déshydrogénase et α-cétoglutarate déshydrogénase. Carence B1 → blocage de ces enzymes → accumulation pyruvate → acidose lactique + atteinte neurologique (Gayet-Wernicke chez l'alcoolique).", "matiere": "Biochimie", "color": "#d97706", "fichier": "biochimieenzymes"}, {"q": "Le cyanure est létal car il bloque :", "opts": ["La glycolyse", "La complexe IV de la chaîne respiratoire (cytochrome oxydase) → arrêt du transfert d'électrons à O<sub>2</sub> → arrêt de la production d'ATP", "L'ATP synthase directement", "La pyruvate déshydrogénase"], "a": 1, "exp": "KCN → lie le Fe<sup>3</sup><sup>+</sup> du complexe IV (cytochrome c oxydase) → bloque le transfert d'électrons à O<sub>2</sub> → arrêt de la chaîne → plus de gradient de protons → plus d'ATP → mort cellulaire. Antidote : hydroxocobalamine (chélation du CN<sup>−</sup>) + thiosulfate de sodium.", "matiere": "Biochimie", "color": "#d97706", "fichier": "biochimieenzymes"}, {"q": "Le galactose et le glucose sont des :", "opts": ["Énantiomères", "Isomères de constitution", "Épimères (diastéréoisomères différant uniquement en C4)", "Anomères"], "a": 2, "exp": "Épimères = diastéréoisomères différant par la configuration d'un seul carbone asymétrique. Galactose = épimère C4 du glucose. Anomères = différent en C anomérique (α/β).", "matiere": "Biochimie", "color": "#d97706", "fichier": "biochimiegluci"}, {"q": "La liaison β(1→4) dans la cellulose est :", "opts": ["Digestible par l'amylase humaine", "Non digestible par l'humain (pas de β-glucosidase intestinale) → fibres alimentaires", "Identique à la liaison de l'amidon", "Une liaison peptidique"], "a": 1, "exp": "β(1→4) glucose = cellulose → non digestible. α(1→4) glucose = amidon/glycogène → digestible par l'amylase. La simple différence α/β change totalement la propriété nutritionnelle.", "matiere": "Biochimie", "color": "#d97706", "fichier": "biochimiegluci"}, {"q": "L'enzyme régulatrice clé de la glycolyse est :", "opts": ["L'hexokinase (étape 1)", "La phosphofructokinase-1 (PFK-1, étape 3) — inhibée par ATP, activée par AMP", "La pyruvate kinase (étape 10)", "La glycéraldéhyde-3-P déshydrogénase"], "a": 1, "exp": "PFK-1 = enzyme régulatrice principale de la glycolyse. ATP élevé (cellule chargée) → PFK-1 inhibée → glycolyse freinée. AMP élevé (cellule déchargée) → PFK-1 activée → glycolyse accélérée. C'est le détecteur énergétique de la cellule.", "matiere": "Biochimie", "color": "#d97706", "fichier": "biochimiegluci"}, {"q": "Le lactose est hydrolysé en :", "opts": ["2 glucose", "Glucose + galactose (par la lactase, β-galactosidase intestinale)", "Glucose + fructose", "Galactose + fructose"], "a": 1, "exp": "Lactose = galactose β(1→4) glucose. Hydrolysé par la lactase (β-galactosidase). Déficit en lactase → intolérance au lactose → fermentation colique → ballonnements. L'allaitement maternel apporte du lactose → stimule la colonisation par Lactobacillus.", "matiere": "Biochimie", "color": "#d97706", "fichier": "biochimiegluci"}, {"q": "Le bilan net de la glycolyse (1 glucose → 2 pyruvates) est :", "opts": ["4 ATP, 2 NADH", "2 ATP net, 2 NADH, 2 pyruvates", "2 ATP, 2 FADH<sub>2</sub>, 2 pyruvates", "6 ATP, 6 CO<sub>2</sub>"], "a": 1, "exp": "Glycolyse : 2 ATP consommés (étapes 1 et 3) + 4 ATP produits (étapes 7 et 10) = 2 ATP nets + 2 NADH + 2 pyruvates. Pas d'O<sub>2</sub> nécessaire. En anaérobie : pyruvate → lactate (régénère le NAD<sup>+</sup> pour continuer la glycolyse).", "matiere": "Biochimie", "color": "#d97706", "fichier": "biochimiegluci"}, {"q": "L'HbA1c reflète :", "opts": ["La glycémie instantanée", "La glycémie moyenne des 3 derniers mois (durée de vie des GR)", "La réserve de glycogène hépatique", "La quantité d'insuline sécrétée"], "a": 1, "exp": "HbA1c = hémoglobine glyquée (glycation non enzymatique de l'Hb par le glucose). Durée de vie des GR = 120 jours → HbA1c reflète la glycémie des 3 derniers mois. Normale < 5,7%. Diabète si ≥ 6,5%. Objectif thérapeutique < 7%.", "matiere": "Biochimie", "color": "#d97706", "fichier": "biochimiegluci"}, {"q": "Les acides gras oméga-3 et oméga-6 sont dits essentiels car :", "opts": ["Ils sont synthétisés par le foie en grande quantité", "L'humain ne peut pas les synthétiser → apport alimentaire obligatoire", "Ils sont saturés", "Ils sont uniquement d'origine animale"], "a": 1, "exp": "AG essentiels = acide linoléique (C18:2, ω-6) et α-linolénique (C18:3, ω-3). L'humain manque des désaturases nécessaires. Ils sont précurseurs des eicosanoïdes (prostaglandines, leucotriènes, thromboxanes) — médiateurs inflammatoires clés.", "matiere": "Biochimie", "color": "#d97706", "fichier": "biochimielipides"}, {"q": "La β-oxydation de l'acide palmitique (C16:0) produit :", "opts": ["7 acétyl-CoA", "8 acétyl-CoA + 7 FADH<sub>2</sub> + 7 NADH (7 cycles pour C16:0)", "4 acétyl-CoA", "16 acétyl-CoA"], "a": 1, "exp": "C16:0 : 7 tours de β-oxydation → 8 acétyl-CoA + 7 FADH<sub>2</sub> + 7 NADH. Formule : (n/2) acétyl-CoA pour n carbones, (n/2 - 1) cycles. 8 acétyl-CoA × cycle de Krebs → ~106 ATP au total.", "matiere": "Biochimie", "color": "#d97706", "fichier": "biochimielipides"}, {"q": "Le LDL-cholestérol est dit 'mauvais' car :", "opts": ["Il transporte le cholestérol du foie vers les tissus et peut être oxydé → plaques d'athérome", "Il transporte le cholestérol des tissus vers le foie", "Il est produit par le tissu adipeux", "Il contient uniquement des triglycérides"], "a": 0, "exp": "LDL (faible densité) transporte cholestérol hépatique → tissus. LDL oxydés → captés par macrophages → cellules spumeuses → plaques d'athérome → risque coronarien. HDL = transport inverse (tissus → foie) = cardioprotecteur.", "matiere": "Biochimie", "color": "#d97706", "fichier": "biochimielipides"}, {"q": "La fluidité membranaire est augmentée par :", "opts": ["Les acides gras saturés (chaînes droites, empilement dense)", "Les acides gras insaturés (cis) et le cholestérol à haute température", "Un refroidissement", "Une augmentation du cholestérol à basse température"], "a": 1, "exp": "AG insaturés cis → coude dans la chaîne → empêche l'empilement dense → fluidité ↑ → Tf ↓. Cholestérol : fluidifiant à basse T (empêche la cristallisation), rigidifiant à haute T (limite le désordre). Tampon de fluidité membranaire.", "matiere": "Biochimie", "color": "#d97706", "fichier": "biochimielipides"}, {"q": "La surfactant pulmonaire est principalement composé de :", "opts": ["Cholestérol et triglycérides", "Dipalmitoylphosphatidylcholine (DPPC) + protéines SP-A, B, C, D", "Glycogène et glucose", "Acides gras libres uniquement"], "a": 1, "exp": "Surfactant = 90% lipides (DPPC majoritaire) + 10% protéines. DPPC réduit la tension superficielle alvéolaire. SP-B et SP-C = propriétés tensioactives. SP-A et SP-D = immunité innée. Déficit chez prématuré < 32 SA → maladie des membranes hyalines.", "matiere": "Biochimie", "color": "#d97706", "fichier": "biochimielipides"}, {"q": "Les phospholipides s'organisent en bicouche car :", "opts": ["Ils sont entièrement hydrophobes", "Leur structure amphiphile (tête polaire + queues apolaires) les pousse à s'orienter tête vers l'eau et queues vers l'intérieur → bicouche stable", "Ils sont attirés par le cholestérol", "Ils forment des liaisons covalentes entre eux"], "a": 1, "exp": "Amphiphile = deux caractères opposés dans la même molécule. En milieu aqueux : têtes polaires vers l'eau (feuillet externe et interne), queues apolaires se cachent au centre → bicouche. Énergie minimale. Spontané. La fluidité dépend du degré d'insaturation des AG et de la température.", "matiere": "Biochimie", "color": "#d97706", "fichier": "biochimielipides"}, {"q": "Le cholestérol est précurseur de :", "opts": ["Les acides gras uniquement", "Toutes les hormones stéroïdiennes (cortisol, aldostérone, testostérone, œstrogènes), les acides biliaires et la vitamine D", "Les phospholipides uniquement", "Le glucose via la néoglucogenèse"], "a": 1, "exp": "Cholestérol → voie des stéroïdes : cortisol (surrénale), aldostérone (surrénale), testostérone (testicules), estradiol (ovaires/placenta), progestérone. Aussi : acides biliaires (foie → émulsification graisses) et vitamine D (peau → UV). Les statines inhibent HMG-CoA réductase (synthèse du cholestérol) → ↓ LDL plasmatique.", "matiere": "Biochimie", "color": "#d97706", "fichier": "biochimielipides"}, {"q": "En diabète cétoacidosique, les corps cétoniques se forment car :", "opts": ["Le glucose est absent des cellules", "La lipolyse ↑↑ → β-oxydation ↑↑ → acétyl-CoA dépasse la capacité du cycle de Krebs → corps cétoniques", "Le glycogène est absent", "La glycolyse est bloquée"], "a": 1, "exp": "Insuline ↓↓ → lipolyse ↑↑ → AG libres → β-oxydation → acétyl-CoA ↑↑ > capacité Krebs (oxaloacétate limité) → condensation → acétoacétate → β-hydroxybutyrate + acétone → acidose métabolique + odeur d'acétone. pH < 7,30 = urgence.", "matiere": "Biochimie", "color": "#d97706", "fichier": "biochimielipides"}, {"q": "La liaison peptidique est plane et rigide car :", "opts": ["Elle est formée à haute température", "Elle a un caractère partiellement double (résonance) → délocalisation électronique entre C=O et C-N → rotation impossible autour de C-N", "Elle contient du soufre", "Elle est stabilisée par des ponts disulfure"], "a": 1, "exp": "Liaison peptidique : résonance entre C=O et C-N → double liaison partielle → planéité des 6 atomes (Cα, C, O, N, H, Cα suivant). Seules les rotations φ (N-Cα) et ψ (Cα-C) sont possibles → diagramme de Ramachandran. Cette rigidité contraint les conformations accessibles et est à la base des structures secondaires.", "matiere": "Biochimie", "color": "#d97706", "fichier": "biochimieproteines"}, {"q": "La proline brise les hélices α car :", "opts": ["Elle est trop volumineuse", "C'est un imino-acide : son azote est inclus dans un cycle pyrrolidine → pas de N-H libre → impossible de former la liaison hydrogène C=O(i)···H-N(i+4) qui stabilise l'hélice α", "Elle est hydrophile", "Elle a une chaîne R négative"], "a": 1, "exp": "Hélice α stabilisée par LH entre C=O(position i) et N-H(position i+4). Proline : N tertiaire inclus dans le cycle → pas de H → pas de LH → rupture obligatoire de l'hélice. Aussi : contrainte conformationnelle (φ figé à −60°) → coude dans la chaîne. Proline abondante dans le collagène (Gly-Pro-Hyp) où elle participe à la triple hélice collagénique.", "matiere": "Biochimie", "color": "#d97706", "fichier": "biochimieproteines"}, {"q": "Les ponts disulfure sont surtout présents dans les protéines extracellulaires car :", "opts": ["Le milieu extracellulaire est plus chaud", "Le milieu extracellulaire est oxydant (favorable à −SH + −SH → −S−S−) tandis que le cytoplasme est réducteur (glutathion → maintient les Cys sous forme −SH)", "Les cellules sécrètent plus de cystéines", "Le RE synthétise plus de cystéines"], "a": 1, "exp": "Ponts disulfure formés dans le RE (milieu oxydant → PDI = protéin disulfide isomerase catalyse la formation). Protéines sécrétées et extracellulaires : IgG (nombreux ponts inter-domaines), insuline (3 ponts), kératine (nombreux → rigidité des cheveux). Cytoplasme : milieu réducteur (glutathion réduit = GSH) → maintient les Cys en −SH → pas de ponts S-S stables.", "matiere": "Biochimie", "color": "#d97706", "fichier": "biochimieproteines"}, {"q": "La courbe de dissociation de l'hémoglobine est sigmoïde (≠ myoglobine hyperbolique) car :", "opts": ["L'hémoglobine a 4 atomes de fer et la myoglobine 1", "L'hémoglobine est coopérative (tétramère) : la fixation d'O₂ sur une sous-unité facilite la fixation sur les autres (T→R) → courbe en S = optimale pour la fixation pulmonaire ET la libération tissulaire", "La myoglobine ne fixe pas l'O₂", "L'hémoglobine fœtale a une structure tertiaire différente"], "a": 1, "exp": "Coopérativité : propriété des oligomères allostériques. Hb : 4 sous-unités (α₂β₂), état T (tendu, faible affinité) → R (relâché, haute affinité). 1ère fixation O₂ → changement conformationnel → facilite les 3 suivantes. Résultat : courbe sigmoïde avec effet interrupteur (switch). Myoglobine monomère → pas de coopérativité → hyperbole. Effet Bohr (pH↓ → affinité↓) et 2,3-DPG optimisent la libération dans les tissus actifs.", "matiere": "Biochimie", "color": "#d97706", "fichier": "biochimieproteines"}, {"q": "Les maladies amyloïdes (Alzheimer, Parkinson) partagent :", "opts": ["Une mutation du gène BRCA1", "Un repliement anormal → feuillets β anormaux → fibrilles amyloïdes insolubles → toxicité cellulaire (gain de toxicité de la conformation β pathologique)", "Un excès de chaperones HSP70", "Une dégradation accrue par le lysosome"], "a": 1, "exp": "Amyloïdoses : protéines solubles normales → conditions pathologiques → repliement aberrant → feuillets β → fibrilles β-croisées (amyloïdes) → plaques. Alzheimer : Aβ (extracellulaire) + Tau hyperphosphorylée (intracellulaire). Parkinson : α-synucléine (corps de Lewy). Huntington : huntingtine polyGln (intranucléaire). Mécanisme commun : β-agrégation = gain de toxicité. Cibles thérapeutiques : inhiber l'agrégation, stimuler la clairance autophagie/protéasome.", "matiere": "Biochimie", "color": "#d97706", "fichier": "biochimieproteines"}, {"q": "La principale différence entre cellule eucaryote et procaryote est :", "opts": ["La taille uniquement", "La présence d'un noyau délimité par une enveloppe nucléaire + d'organites membranaires dans la cellule eucaryote", "La présence de mitochondries dans les deux", "La composition de la membrane plasmique"], "a": 1, "exp": "Eucaryote : noyau (ADN linéaire en chromosomes), organites membranaires (mitochondries, Golgi, REG, lysosomes), ribosomes 80S. Procaryote : pas de noyau (nucléoïde = ADN circulaire), pas d'organites, ribosomes 70S. Taille : procaryote 1-10 µm vs eucaryote 10-100 µm.", "matiere": "Biologie Cellulaire", "color": "#7c3aed", "fichier": "biolcellcellule"}, {"q": "Dans la bicouche lipidique, le cholestérol joue le rôle de :", "opts": ["Canal ionique", "Tampon de fluidité : fluidifie la membrane à basse température (empêche la cristallisation) et la rigidifie à haute température (limite le désordre)", "Transporteur de glucose", "Récepteur hormonal"], "a": 1, "exp": "Cholestérol : s'intercale entre les phospholipides → régule la fluidité selon la température. Sans cholestérol : membrane gèle à basse T et devient trop fluide à haute T. Avec : fluidité tampon dans une plage physiologique. Important pour les radeaux lipidiques (lipid rafts) et la signalisation.", "matiere": "Biologie Cellulaire", "color": "#7c3aed", "fichier": "biolcellcellule"}, {"q": "Les pores nucléaires permettent :", "opts": ["La réplication de l'ADN", "Les échanges sélectifs : importation de protéines (via NLS) et exportation d'ARNm, ARNr, ARNt (via NES) — passif < 40 kDa, actif GTP-dépendant pour les grosses molécules", "La traduction directement dans le noyau", "La fusion des membranes lors de la mitose"], "a": 1, "exp": "Pores nucléaires (~3000 par noyau, complexe de 30 MDa) : passage passif des petites molécules (< 40 kDa). Transport actif : importation des facteurs de transcription, histones (NLS + importines + GTP). Exportation : ARNm mature (coiffe + poly-A), ARNr, ARNt (NES + exportines). Ran-GTP directionnalise le transport.", "matiere": "Biologie Cellulaire", "color": "#7c3aed", "fichier": "biolcellcellule"}, {"q": "Le taxol (paclitaxel) bloque la mitose en :", "opts": ["Inhibant la synthèse d'ADN", "Stabilisant les microtubules en état polymérisé → pas de dépolymérisation → chromosomes non séparés → blocage en métaphase → apoptose", "Inhibant l'actine du fuseau", "Bloquant la synthèse de tubuline"], "a": 1, "exp": "Taxol : se lie à la β-tubuline des microtubules → stabilise la polymérisation → microtubules rigides, ne peuvent ni croître ni rétrécir dynamiquement → fuseau mitotique non fonctionnel → chromosomes attachés mais non séparés → arrêt en métaphase. Vincristine/vinblastine : inverse (dépolymérisent). Les deux bloquent la division tumorale.", "matiere": "Biologie Cellulaire", "color": "#7c3aed", "fichier": "biolcellcellule"}, {"q": "La pompe Na<sup>+</sup>/K<sup>+</sup>-ATPase :", "opts": ["Fait entrer 3 Na<sup>+</sup> et sortir 2 K<sup>+</sup> (sens passif)", "Expulse 3 Na<sup>+</sup> et fait entrer 2 K<sup>+</sup> en consommant 1 ATP → maintient le gradient électrochimique essentiel au potentiel de repos et au transport actif secondaire", "Transporte le glucose avec le Na<sup>+</sup>", "Est inhibée par la digoxine pour faire sortir du K<sup>+</sup>"], "a": 1, "exp": "Na<sup>+</sup>/K<sup>+</sup>-ATPase : 3 Na<sup>+</sup> sortent + 2 K<sup>+</sup> entrent par ATP (électrogène → contribue au potentiel de repos négatif). Établit le gradient Na<sup>+</sup> (qui pilote les transporteurs secondaires : SGLT, NHE) et le gradient K<sup>+</sup> (potentiel de repos). Digoxine l'inhibe → Na<sup>+</sup> ↑ intracell → NCX ↓ → Ca<sup>2</sup><sup>+</sup> ↑ → inotrope positif.", "matiere": "Biologie Cellulaire", "color": "#7c3aed", "fichier": "biolcellcellule"}, {"q": "Le point de contrôle du fuseau (SAC) en métaphase fonctionne en :", "opts": ["Surveillant que tout l'ADN est répliqué", "Bloquant APC/C tant qu'un kinétochore n'est pas correctement attaché au fuseau → empêche la séparation prématurée des chromatides → aneuploïdie évitée", "Activant la CDK1-CycB pour entrer en anaphase", "Vérifier que le sillon de clivage est formé"], "a": 1, "exp": "SAC (Spindle Assembly Checkpoint) : le complexe MCC (Mad2 + BubR1 + Bub3) inhibe APC/C-Cdc20 tant qu'un seul kinétochore est non attaché. APC/C bloqué → sécurine non dégradée → séparase inactive → cohésine maintenue → chromatides sœurs liées. Quand tous les kinétochores sont bioriginaux → MCC dissocié → APC/C actif → anaphase.", "matiere": "Biologie Cellulaire", "color": "#7c3aed", "fichier": "biolcellcycle"}, {"q": "La trisomie 21 résulte d'une non-disjonction :", "opts": ["En phase S (réplication en double)", "Le plus souvent en méiose I maternelle — les 2 chromosomes 21 vont dans le même ovocyte → gamète à 24 chromosomes → après fécondation = 47 chromosomes. Fréquence augmente avec l'âge maternel", "En mitose des cellules somatiques", "En méiose II paternelle exclusivement"], "a": 1, "exp": "Trisomie 21 (syndrome de Down) : non-disjonction chromo 21 en méiose I (90% des cas, d'origine maternelle dans 95% des cas). Les ovocytes sont bloqués en prophase I depuis la naissance → plus ils attendent, plus les erreurs s'accumulent. Risque : ~1/1500 à 20 ans → ~1/30 à 45 ans. Diagnostic prénatal : triscopie, amniocentèse, DPNI.", "matiere": "Biologie Cellulaire", "color": "#7c3aed", "fichier": "biolcellcycle"}, {"q": "L'anaphase est déclenchée par :", "opts": ["La phosphorylation de la tubuline", "L'APC/C-Cdc20 qui ubiquitine la sécurine → libère la séparase → clève la cohésine centromérique SCC1 → séparation des chromatides sœurs", "La déphosphorylation de Rb", "L'activation de CDK1-Cycline B"], "a": 1, "exp": "Cascade anaphase : SAC dissocié (tous kinétochores attachés) → APC/C-Cdc20 actif → ubiquitine sécurine (→ protéasome → libère séparase) ET Cycline B (→ CDK1 inactif → sortie de mitose). Séparase clive SCC1 (cohésine centromérique) → chromatides libres → tirées vers les pôles. Shugoshin/SGO1 protège la cohésine centromérique jusqu'à ce moment précis.", "matiere": "Biologie Cellulaire", "color": "#7c3aed", "fichier": "biolcellcycle"}, {"q": "La recombinaison homologue (crossing-over) en méiose I :", "opts": ["Produit des mutations ponctuelles", "Échange des segments entre chromosomes homologues → nouveaux arrangements d'allèles → diversité génétique + chiasmas (points de croisement physiques qui maintiennent les bivalents)", "Sépare les chromatides sœurs", "Est responsable de la trisomie 21"], "a": 1, "exp": "Crossing-over en prophase I : chromosomes homologues s'apparient (synapsis) → complexe synaptonémal → échange réciproque de segments entre chromatides non-sœurs → chiasmas. Résultat : chromosomes avec nouvelles combinaisons d'allèles = diversité génétique. Obligatoire (au moins 1 par paire de chromosomes) sinon les chromosomes ne se séparent pas correctement.", "matiere": "Biologie Cellulaire", "color": "#7c3aed", "fichier": "biolcellcycle"}, {"q": "Le syndrome de Lynch (cancer colorectal héréditaire) résulte d'un déficit en :", "opts": ["BER (base excision repair)", "MMR (mismatch repair) — MSH2, MLH1 mutés → mésappariements non corrigés → instabilité des microsatellites (MSI) → mutations accumulées → cancer colorectal précoce", "NER (nucleotide excision repair)", "HR (homologous recombination)"], "a": 1, "exp": "Syndrome de Lynch : mutation germinale MSH2, MLH1, MSH6 ou PMS2 → déficit MMR → mésappariements ADN non corrigés → instabilité microsatellites (MSI-H) → mutations des gènes de régulation (dont TGFBR2, ACVR2) → cancer colorectal, endomètre, ovaire. Test MSI sur tumeur = diagnostic. Immunothérapie anti-PD-1 très efficace sur tumeurs MSI-H.", "matiere": "Biologie Cellulaire", "color": "#7c3aed", "fichier": "biolcellcycle"}, {"q": "Les cellules NK (Natural Killer) tuent préférentiellement les cellules qui :", "opts": ["Expriment fortement le CMH I", "N'expriment pas ou peu le CMH I — cellules tumorales ou infectées par un virus qui down-régulent le CMH I pour échapper aux LT CD8+ → les NK détectent l'absence de CMH I comme signal de danger", "Expriment des IgE à leur surface", "Produisent trop d'IFN-γ"], "a": 1, "exp": "NK : règle du 'missing self'. Cellules normales : CMH I → signal inhibiteur pour les NK (via KIR) → pas de lyse. Cellules tumorales/infectées : CMH I ↓ → perte du signal inhibiteur → NK activées → perforine + granzyme B → apoptose. Complément de l'immunité T CD8+ (qui au contraire nécessite CMH I pour tuer). Première ligne contre les cellules qui échappent aux LT.", "matiere": "Biologie Cellulaire", "color": "#7c3aed", "fichier": "biolcellimmunite"}, {"q": "La règle CMH I / CMH II dans la présentation antigénique :", "opts": ["CMH I → CD4+, CMH II → CD8+", "CMH I → LT CD8+ cytotoxiques (antigènes endogènes, 8-10 aa) · CMH II → LT CD4+ auxiliaires (antigènes exogènes phagocytés, 13-25 aa)", "CMH I et II présentent aux mêmes lymphocytes", "CMH I est uniquement sur les CPA"], "a": 1, "exp": "Règle fondamentale : CMH I (toutes cellules nucléées) → LT CD8+ (cytotoxiques). CMH II (CPA : macrophages, DC, LB) → LT CD4+ (helper). Mémo : 1×8=8 et 2×4=8. Antigènes endogènes (virus dans le cytoplasme) → protéasome → peptides 8-10 aa → CMH I. Antigènes exogènes (bactérie phagocytée) → lysosomes → peptides 13-25 aa → CMH II.", "matiere": "Biologie Cellulaire", "color": "#7c3aed", "fichier": "biolcellimmunite"}, {"q": "Les IgA sécrétoires sont importantes car :", "opts": ["Elles traversent le placenta", "Elles protègent les muqueuses (intestin, voies respiratoires, lait maternel) — première ligne de défense aux portes d'entrée des pathogènes. Produites localement par les LB des MALT", "Elles activent le mieux le complément", "Elles se fixent sur les mastocytes"], "a": 1, "exp": "IgA sécrétoires : forme dimérique liée à la pièce sécrétoire (protège de la protéolyse). Dans la salive, les larmes, le mucus respiratoire/intestinal, le lait maternel. Agglutinent les pathogènes, bloquent leur adhésion à l'épithélium. Lait maternel = transfert passif d'IgA → protection du nouveau-né pendant les 6 premiers mois.", "matiere": "Biologie Cellulaire", "color": "#7c3aed", "fichier": "biolcellimmunite"}, {"q": "Le VIH détruit spécifiquement les LT CD4+ car :", "opts": ["Il infecte toutes les cellules immunocompétentes", "Sa protéine gp120 se fixe sur le récepteur CD4 (+ corécepteur CCR5 ou CXCR4) → entrée du virus dans le LT CD4+ → réplication → lyse → déplétion progressive. SIDA défini si CD4 < 200/mm<sup>3</sup>", "Il bloque la production d'anticorps", "Il inactive le complément"], "a": 1, "exp": "gp120 du VIH : affinité pour CD4 + CCR5 (macrophages, LT mémoire) ou CXCR4 (LT naïfs). Tropisme R5 (utilise CCR5) = forme précoce. Tropisme X4 (utilise CXCR4) = forme avancée, plus agressif. Maraviroc = antagoniste CCR5 (traitement VIH). Individus CCR5Δ32 (délétion homozygote CCR5) = résistants naturels au VIH R5.", "matiere": "Biologie Cellulaire", "color": "#7c3aed", "fichier": "biolcellimmunite"}, {"q": "Les inhibiteurs de checkpoint (anti-PD-1) en immunothérapie :", "opts": ["Inhibent directement les cellules tumorales", "Lèvent le frein PD-1/PD-L1 → les LT CD8+ peuvent à nouveau tuer les cellules tumorales — mais risque de maladies auto-immunes iatrogènes (thyroïdite, colite, pneumopathie)", "Stimulent les anticorps contre la tumeur", "Inhibent les NK"], "a": 1, "exp": "Anti-PD-1 (nivolumab, pembrolizumab) : bloquent PD-1 sur les LT CD8+ → PD-L1 (exprimé par les cellules tumorales pour échapper) ne peut plus inhiber les LT → LT ré-activés → immunité anti-tumorale restaurée. Effets indésirables immuno-médiés : thyroïdite (30%), colite (5-10%), pneumopathie (3%), hépatite (1%) → corticoïdes si sévère.", "matiere": "Biologie Cellulaire", "color": "#7c3aed", "fichier": "biolcellimmunite"}, {"q": "L'ADN mitochondrial se transmet par :", "opts": ["Les deux parents (moitié de chaque)", "La mère exclusivement — les mitochondries de l'ovocyte seront dans toutes les cellules de l'embryon, celles du spermatozoïde sont détruites", "Le père uniquement", "Aléatoirement selon la cellule"], "a": 1, "exp": "ADNmt = transmission maternelle exclusive. Toutes les mitochondries viennent de l'ovocyte (les mitochondries du spermatozoïde sont ubiquitinées et dégradées après la fécondation). Conséquence : toute maladie mitochondriale maternelle est transmise à tous ses enfants, mais aucun enfant ne transmettra par son père.", "matiere": "Biologie Cellulaire", "color": "#7c3aed", "fichier": "biolcellorganites"}, {"q": "Les cytochromes P450 hépatiques sont localisés dans :", "opts": ["Le RER (réticulum endoplasmique rugueux)", "Le REL (réticulum endoplasmique lisse) — site du métabolisme des médicaments et xénobiotiques", "Les mitochondries", "Le noyau"], "a": 1, "exp": "CYP450 hépatiques : enzymes du REL → oxydation/réduction/hydrolyse des médicaments (phase I du métabolisme). La plupart des interactions médicamenteuses reposent sur l'induction (CYP induit → médicament dégradé plus vite → inefficacité) ou l'inhibition (CYP inhibé → médicament s'accumule → toxicité). Ex : rifampicine induit CYP3A4 → réduit l'efficacité de nombreux médicaments.", "matiere": "Biologie Cellulaire", "color": "#7c3aed", "fichier": "biolcellorganites"}, {"q": "L'ajout de mannose-6-phosphate (M6P) dans le Golgi sert à :", "opts": ["Adresser les protéines à la membrane plasmique", "Diriger les hydrolases lysosomales vers les lysosomes — le récepteur M6P au Golgi trans capte ces enzymes et les emballe dans des vésicules de clathrine vers les lysosomes", "Marquer les protéines pour la sécrétion", "Activer les facteurs de croissance"], "a": 1, "exp": "M6P : signal de tri lysosomal. Ajouté dans le Golgi par GlcNAc-1-phosphotransférase. Récepteur M6P au Golgi trans → endocytose des enzymes vers les lysosomes. Déficit de GlcNAc-1-phosphotransférase → maladie I-cell. M6P retiré après livraison → le récepteur retourne au Golgi pour un nouveau cycle.", "matiere": "Biologie Cellulaire", "color": "#7c3aed", "fichier": "biolcellorganites"}, {"q": "L'autophagie est activée lors du jeûne car :", "opts": ["mTOR est activé par l'absence de nutriments", "L'absence de nutriments inactive mTOR → désinhibition de la voie d'autophagie → autophagosome entoure les composants cellulaires → autolysosome → recyclage des acides aminés et lipides pour survivre", "Le lysosome se remplit spontanément", "Les mitochondries se divisent plus vite"], "a": 1, "exp": "Autophagie : mTOR (activé par nutriments et croissance) inhibe l'initiation de l'autophagie. Jeûne → mTOR inhibé → ULK1 actif → formation de la phagophore → autophagosome (double membrane) → fusionne avec lysosome → autolysosome → dégradation → recyclage. AMPK (jeûne → AMP ↑) inhibe aussi mTOR. Prix Nobel Yoshinori Ohsumi 2016.", "matiere": "Biologie Cellulaire", "color": "#7c3aed", "fichier": "biolcellorganites"}, {"q": "L'hypercholestérolémie familiale est due à :", "opts": ["Une surproduction de cholestérol par le foie", "Des mutations du récepteur LDL (LDLR) → endocytose médiée par récepteur inefficace → LDL s'accumulent dans le sang → athérosclérose précoce", "Un excès d'absorption intestinale du cholestérol", "Une déficience en HDL"], "a": 1, "exp": "HF : LDLR muté → LDL non capté → LDL plasmatique ↑↑ → athérosclérose. Formes hétérozygotes (~1/500) : LDL 2× normale. Formes homozygotes (~1/1M) : LDL 6-8× normale → infarctus avant 20 ans. Statines ↑ expression LDLR. Anti-PCSK9 (évolocumab, alirocumab) : empêchent dégradation du LDLR → plus de récepteurs actifs → LDL ↓ jusqu'à 60%.", "matiere": "Biologie Cellulaire", "color": "#7c3aed", "fichier": "biolcellorganites"}, {"q": "Les récepteurs couplés aux protéines G (RCPG) avec Gαs activent :", "opts": ["La phospholipase C → IP<sub>3</sub> + DAG", "L'adénylyl cyclase → AMPc ↑ → PKA → phosphorylation de nombreuses cibles (glycogénolyse, inotropisme, synthèse hormonale)", "Directement un canal ionique", "La voie RAS/MAPK"], "a": 1, "exp": "Gαs : active l'adénylyl cyclase (AC) → AMPc ↑ → PKA (protéine kinase A) → phosphorylation de la phosphorylase kinase → glycogénolyse, canaux Ca<sup>2</sup><sup>+</sup> cardiaques, lipase hormonosensible. Gαi : inhibe AC → ↓ AMPc. Gαq : active PLC → IP<sub>3</sub> + DAG. Récepteurs β-adrénergiques, glucagon-R, TSH-R = Gαs.", "matiere": "Biologie Cellulaire", "color": "#7c3aed", "fichier": "biolcellsignalisation"}, {"q": "La toxine cholérique provoque une diarrhée massive en :", "opts": ["Inhibant la Na<sup>+</sup>/K<sup>+</sup>-ATPase", "ADP-ribosylant Gαs → Gαs bloqué actif → AC constitutivement active → AMPc ↑↑ → PKA → CFTR ouvert en permanence → Cl<sup>−</sup> sécrété → Na<sup>+</sup>/H<sub>2</sub>O suivent → diarrhée profuse", "Détruisant les entérocytes", "Bloquant les jonctions serrées intestinales"], "a": 1, "exp": "Toxine cholérique : ADP-ribosyl-transférase → Gαs bloqué avec GTP (ne peut pas hydrolyser GTP → reste actif) → AMPc permanent → PKA → phosphorylation de CFTR → Cl<sup>−</sup> sort massivement → Na<sup>+</sup> (paracellulaire) + H<sub>2</sub>O suivent → diarrhée cholérique. Traitement : SRO (profite du SGLT1 intact = cotransporteur Na<sup>+</sup>/glucose non affecté).", "matiere": "Biologie Cellulaire", "color": "#7c3aed", "fichier": "biolcellsignalisation"}, {"q": "La ciclosporine inhibe le rejet de greffe en :", "opts": ["Bloquant la prolifération des lymphocytes B", "Inhibant la calcineurine dans les lymphocytes T → NFAT non déphosphorylé → ne va pas dans le noyau → pas d'IL-2 → pas de prolifération des LT effecteurs", "Détruisant les lymphocytes T", "Inhibant le CMH de classe II"], "a": 1, "exp": "Ciclosporine : complexe ciclosporine-cyclophiline → inhibe la calcineurine (phosphatase) → NFAT reste phosphorylé → ne peut pas entrer dans le noyau → pas de transcription IL-2 → pas de signaux de prolifération pour les LT → immunosuppression. Tacrolimus : même mécanisme mais complexe avec FK506-binding protein. Plus puissant que la ciclosporine.", "matiere": "Biologie Cellulaire", "color": "#7c3aed", "fichier": "biolcellsignalisation"}, {"q": "BRAF V600E est une mutation oncogène car :", "opts": ["Elle inactive BRAF", "Elle rend BRAF constitutivement actif sans signal en amont → voie MAPK activée en permanence → prolifération → mélanome. Ciblé par le vémurafénib", "Elle amplifie RAS", "Elle inactive p53"], "a": 1, "exp": "BRAF V600E : substitution Val→Glu en position 600 → BRAF actif sans RAS actif → MEK → ERK → prolifération continue → mélanome (50% des cas). Vémurafénib (inhibiteur BRAF V600E) → réponse 80% mais résistance en 6-8 mois. Cobimétinib (inhibiteur MEK) en association → retarde la résistance. Même mutant dans certains cancers thyroïdiens et colorectaux.", "matiere": "Biologie Cellulaire", "color": "#7c3aed", "fichier": "biolcellsignalisation"}, {"q": "Les hormones stéroïdiennes agissent en :", "opts": ["Se fixant sur des récepteurs membranaires → second messager", "Traversant la membrane par diffusion (liposolubles) → récepteur intracellulaire → translocation nucléaire → liaison HRE → activation/répression de la transcription", "Étant endocytées par leurs cellules cibles", "Activant des canaux ioniques"], "a": 1, "exp": "Hormones stéroïdiennes (cortisol, aldostérone, œstrogènes, progestérone, testostérone) + vitamine D + T3/T4 : liposolubles → diffusion membranaire → récepteurs nucléaires (NR) → complexe hormone-NR → dimérisation → liaison HRE (Hormone Response Element) → recrutement de coactivateurs/corépresseurs → transcription. Mécanisme lent (heures) vs récepteurs membranaires (secondes/minutes).", "matiere": "Biologie Cellulaire", "color": "#7c3aed", "fichier": "biolcellsignalisation"}, {"q": "Le point de restriction R en G1 est contrôlé par :", "opts": ["p53 et MDM2", "La protéine Rb (rétinoblastome) : hyperphosphorylée par CDK4/6-CycD → libère E2F → transcription des gènes de phase S", "La cycline B et CDK1", "L'ATM kinase uniquement"], "a": 1, "exp": "Point R : Rb (hypophosphorylée) séquestre E2F → répression. CDK4/6-CycD phosphoryle Rb → libère E2F → gènes de phase S. Palbociclib = inhibiteur CDK4/6 → Rb reste active → arrêt G1 → cancer du sein HR+. Si RB1 muté → Rb absente → prolifération incontrôlée.", "matiere": "Biologie Moléculaire", "color": "#0284c7", "fichier": "biolmolcycle"}, {"q": "RAS est un oncogène car :", "opts": ["Il produit trop de facteurs de croissance", "La mutation G12D bloque l'activité GTPase intrinsèque → RAS reste en conformation active GTP → signalisation proliférative constitutive (RAF/MEK/ERK)", "Il amplifie p53", "Il inactive la réparation de l'ADN"], "a": 1, "exp": "RAS normal : GTPase, hydrolyse GTP → GDP → RAS inactif. KRAS G12D/G12V : mutation dans le domaine GTPase → impossible d'hydrolyser GTP → RAS bloqué actif → RAF → MEK → ERK → prolifération. Présent dans 90% des cancers du pancréas, 40% des cancers colorectaux, 25% des poumons.", "matiere": "Biologie Moléculaire", "color": "#0284c7", "fichier": "biolmolcycle"}, {"q": "Le concept de 'two-hit' de Knudson explique :", "opts": ["Pourquoi 2 mutations de proto-oncogènes suffisent pour déclencher un cancer", "Pourquoi les suppresseurs de tumeurs nécessitent 2 mutations (perte des 2 allèles) pour perdre leur fonction — l'une peut être germinale", "Pourquoi p53 a 2 domaines fonctionnels", "La nécessité de 2 chimiothérapies en association"], "a": 1, "exp": "Knudson (1971, rétinoblastome) : les suppresseurs de tumeurs sont récessifs → les 2 allèles doivent être inactivés. Dans la forme héréditaire : 1 hit germinale (tous les cellules) + 1 hit somatique (dans la rétine) → tumeur précoce, bilatérale. Dans la forme sporadique : 2 hits somatiques dans la même cellule → tumeur tardive, unilatérale.", "matiere": "Biologie Moléculaire", "color": "#0284c7", "fichier": "biolmolcycle"}, {"q": "Dans la voie intrinsèque de l'apoptose, le cytochrome c est libéré de :", "opts": ["Le noyau", "Le réticulum endoplasmique", "La membrane mitochondriale externe — perméabilisée par BAX/BAK — → apoptosome → caspase 9 → caspases 3/7", "Le Golgi"], "a": 2, "exp": "Voie intrinsèque : BAX/BAK (pro-apoptotiques) perméabilisent la membrane mitochondriale externe → cytochrome c + SMAC libérés → cytoc + APAF1 + procaspase 9 = apoptosome → caspase 9 active → caspases effectrices 3/7 → mort. Bcl-2/Bcl-XL s'opposent à BAX/BAK. Venetoclax = inhibiteur Bcl-2.", "matiere": "Biologie Moléculaire", "color": "#0284c7", "fichier": "biolmolcycle"}, {"q": "La létalité synthétique des inhibiteurs PARP repose sur :", "opts": ["L'inhibition directe de BRCA1/2", "Le fait que les cellules BRCA-mutées n'ont plus que la voie BER pour réparer leur ADN — bloquer PARP (BER) → cassures irréparables → mort sélective des cellules tumorales", "L'activation de p53 dans les cellules cancéreuses", "La radiosensibilisation des tumeurs"], "a": 1, "exp": "Cellules normales : HR (BRCA) + BER (PARP) redondantes. Cellules BRCA mutées : HR non fonctionnelle → seule BER reste. Inhiber PARP → plus aucune réparation → cassures DSB s'accumulent → mort sélective. Cells normales (BRCA intact) → HR compense → survivent. Olaparib = premier iPARP. Indication : cancers BRCA1/2 mutés.", "matiere": "Biologie Moléculaire", "color": "#0284c7", "fichier": "biolmolcycle"}, {"q": "Le génome humain haploïde contient environ :", "opts": ["200 millions de paires de bases et 100 000 gènes", "3 milliards de paires de bases et ~20 000 gènes protéo-codants", "1 milliard de pb et 50 000 gènes", "6 milliards de pb et 20 000 gènes"], "a": 1, "exp": "Génome haploïde (n) : ~3 × 10<sup>9</sup> pb sur 23 chromosomes, ~20 000 gènes protéo-codants = seulement 2% du génome. Le reste : introns, séquences régulatrices, éléments répétés (50%). Génome diploïde (2n) = 6 × 10<sup>9</sup> pb dans chaque cellule somatique.", "matiere": "Biologie Moléculaire", "color": "#0284c7", "fichier": "biolmolgenome"}, {"q": "Le nucléosome est constitué de :", "opts": ["ADN + ARN ribosomique", "147 pb d'ADN enroulées autour d'un octamère d'histones (H2A, H2B, H3, H4 × 2)", "ADN + protéines non histones uniquement", "200 pb d'ADN + histone H1 uniquement"], "a": 1, "exp": "Nucléosome = 147 pb d'ADN + octamère (2×H2A, 2×H2B, 2×H3, 2×H4). H1 = histone linker (ferme le nucléosome, lie l'ADN entrant et sortant). Unité de base de la compaction. Modifications des queues d'histones = code épigénétique.", "matiere": "Biologie Moléculaire", "color": "#0284c7", "fichier": "biolmolgenome"}, {"q": "La réplication de l'ADN nécessite une amorce ARN car :", "opts": ["L'ARN polymérase est plus rapide", "Les ADN polymérases ne peuvent pas initier une nouvelle chaîne de novo — elles ne peuvent qu'élonger une amorce existante", "L'ARN est plus stable que l'ADN", "L'ADN ne peut pas s'hybrider sans ARN"], "a": 1, "exp": "ADN polymérases : allongement 5'→3' uniquement, pas d'initiation de novo. La primase (ARN polymérase spéciale) synthétise une courte amorce ARN (~10 nt). Ensuite l'ADN pol allonge. L'amorce est ensuite remplacée par de l'ADN (ADN pol δ + RNase H) et les fragments sont ligaturés (Ligase I).", "matiere": "Biologie Moléculaire", "color": "#0284c7", "fichier": "biolmolgenome"}, {"q": "Une mutation décalante (frameshift) est particulièrement grave car :", "opts": ["Elle change un seul acide aminé", "Elle insère ou supprime un nombre de nucléotides non multiple de 3 → décalage du cadre de lecture → protéine totalement aberrante en aval", "Elle crée un codon stop prématuré uniquement", "Elle est toujours silencieuse"], "a": 1, "exp": "Frameshift : insertion/délétion non multiple de 3 → tous les codons en aval sont décalés → séquence d'AA totalement différente → protéine non fonctionnelle + souvent codon stop prématuré. Ex : ΔF508 dans CFTR = délétion de 3 pb (= perte d'1 AA, Phe508) → mauvais repliement → dégradation → mucoviscidose.", "matiere": "Biologie Moléculaire", "color": "#0284c7", "fichier": "biolmolgenome"}, {"q": "La télomérase est surexprimée dans les cancers car :", "opts": ["Elle répare les cassures double brin", "Elle rallonge les télomères → maintient la longueur télomérique → immortalisation cellulaire (contournement de la limite de Hayflick)", "Elle active la transcription des oncogènes", "Elle dégrade les suppresseurs de tumeurs"], "a": 1, "exp": "Cellules normales : télomères raccourcissent → sénescence → mort. Cellules cancéreuses : surexpression de TERT (sous-unité catalytique de la télomérase) → télomères maintenus → division illimitée → immortalisation. 85% des cancers humains surexpriment la télomérase. Cible thérapeutique potentielle.", "matiere": "Biologie Moléculaire", "color": "#0284c7", "fichier": "biolmolgenome"}, {"q": "La PCR quantitative en temps réel (qPCR) est utilisée pour :", "opts": ["Séquencer l'ADN", "Quantifier une séquence cible en temps réel par fluorescence — charge virale VIH, CMV ; fusion BCR-ABL en LMC ; expression génique", "Visualiser les protéines sur membrane", "Réaliser une FISH"], "a": 1, "exp": "qPCR (TaqMan ou SYBR Green) : fluorescence ∝ quantité d'ADN amplifié. Ct (cycle threshold) = cycle où le signal dépasse le seuil. Ct faible = beaucoup de cible. RT-qPCR : ARN → ADNc → qPCR → quantification des transcrits. Usage clinique : charge virale VIH (copie/mL), suivi LMC (BCR-ABL en %), diagnostic COVID.", "matiere": "Biologie Moléculaire", "color": "#0284c7", "fichier": "biolmoltechniques"}, {"q": "La cassure double brin créée par CRISPR-Cas9 est réparée de deux façons :", "opts": ["Uniquement par HDR (recombinaison homologue)", "NHEJ (insertion/délétion → knock-out souvent) ou HDR si un ADN matrice est fourni (correction précise de mutation)", "Uniquement par NHEJ", "Par la télomérase"], "a": 1, "exp": "NHEJ (Non-Homologous End Joining) : ligation directe → souvent indels → décalage → KO. HDR (Homology-Directed Repair) : si un ADN matrice est fourni → correction précise. NHEJ dominant en cellules différenciées. HDR plus efficace en phase S (cellules en division). Casgevy utilise NHEJ pour inactiver BCL11A.", "matiere": "Biologie Moléculaire", "color": "#0284c7", "fichier": "biolmoltechniques"}, {"q": "Le Western Blot (immunoblot) détecte :", "opts": ["L'ADN — après digestion par des enzymes de restriction", "Les protéines — SDS-PAGE → transfert → anticorps primaire + secondaire → détection. Confirmation VIH, diagnostic maladies à prions", "Les ARNm", "Les chromosomes par fluorescence"], "a": 1, "exp": "Mémo : Southern = ADN (inventeur E. Southern). Northern = ARN (jeu de mots). Western = protéines. Eastern = modifications post-traductionnelles (moins utilisé). Western Blot VIH : bandes gp160/120 (env) + p66/51 (pol) + p55/24 (gag) → confirmation séropositivité.", "matiere": "Biologie Moléculaire", "color": "#0284c7", "fichier": "biolmoltechniques"}, {"q": "Le Ki-67 en immunohistochimie est un marqueur de :", "opts": ["La différenciation cellulaire", "La prolifération cellulaire — pourcentage de cellules en cycle (G1, S, G2, M) → index de prolifération tumorale", "L'apoptose", "L'invasion vasculaire"], "a": 1, "exp": "Ki-67 (MKI67) : protéine exprimée dans toutes les phases actives du cycle (G1, S, G2, M) mais pas en G0. IHC Ki-67 → % de cellules marquées = index prolifératif. Utilisé pour classer les tumeurs (bas grade vs haut grade) et guider le traitement (cancer du sein luminal A < 20% vs B > 20%).", "matiere": "Biologie Moléculaire", "color": "#0284c7", "fichier": "biolmoltechniques"}, {"q": "La FISH est utilisée en oncologie pour :", "opts": ["Mesurer l'expression des protéines", "Détecter des translocations (BCR-ABL, ALK), des amplifications (HER2, MYCN) et des délétions chromosomiques sur coupes tissulaires ou apprêts", "Séquencer les mutations ponctuelles", "Mesurer la charge tumorale circulante"], "a": 1, "exp": "FISH : sondes fluorescentes spécifiques → hybridation sur chromosomes → compter les signaux. Break-apart FISH (ALK, ROS1, RET) : 2 signaux séparés = translocation. Amplification HER2 : ratio HER2/Chr17 > 2. Délétion 17p (TP53) en LLC. Indispensable pour décider du traitement ciblé (crizotinib si ALK+, trastuzumab si HER2 amplifié).", "matiere": "Biologie Moléculaire", "color": "#0284c7", "fichier": "biolmoltechniques"}, {"q": "Le ribosome 80S eucaryote est composé de :", "opts": ["50S + 30S", "60S + 40S — la grande sous-unité contient l'activité ribozyme (peptidyl-transférase)", "70S + 10S", "80S est indivisible"], "a": 1, "exp": "80S = 60S (ARNr 28S, 5,8S, 5S + protéines) + 40S (ARNr 18S + protéines). Activité peptidyl-transférase = ARNr 28S (ribozyme). Ribosome procaryote = 70S (50S + 30S) → cible des antibiotiques. Différence fondamentale pour la sélectivité des antibiotiques.", "matiere": "Biologie Moléculaire", "color": "#0284c7", "fichier": "biolmoltraduction"}, {"q": "L'initiation de la traduction chez les eucaryotes nécessite :", "opts": ["La reconnaissance directe de l'AUG sans facteurs", "La reconnaissance de la coiffe 5' par eIF4E → scanning → Kozak → AUG → assemblage du ribosome 80S", "La reconnaissance d'un site de liaison ribosomique (Shine-Dalgarno) comme chez les bactéries", "L'ARNr 18S uniquement"], "a": 1, "exp": "Eucaryotes : scanning (du cap 5' jusqu'à l'AUG dans un contexte Kozak favorable). Bactéries : séquence Shine-Dalgarno (complémentaire de l'ARNr 16S) en amont de l'AUG. Différence majeure exploitée par les antibiotiques.", "matiere": "Biologie Moléculaire", "color": "#0284c7", "fichier": "biolmoltraduction"}, {"q": "Le bortézomib traite le myélome en :", "opts": ["Inhibant la réplication de l'ADN", "Bloquant le protéasome 26S → accumulation de protéines mal repliées + NF-κB → mort des cellules de myélome", "Ciblant les récepteurs de surface du myélome", "Inhibant la télomérase"], "a": 1, "exp": "Myélome = plasmocytes tumoraux qui produisent massivement des immunoglobulines → très dépendants du protéasome pour dégrader les protéines mal repliées. Bortézomib = inhibiteur du protéasome → accumulation → stress UPR → apoptose. Also inhibe NF-κB (anti-apoptotique). Traitement de référence du myélome.", "matiere": "Biologie Moléculaire", "color": "#0284c7", "fichier": "biolmoltraduction"}, {"q": "Le signal mannose-6-phosphate (M6P) dirige les protéines vers :", "opts": ["Le noyau", "Les mitochondries", "Les lysosomes — défaut dans la maladie I-cell → enzymes sécrétées au lieu d'aller aux lysosomes", "Le réticulum endoplasmique"], "a": 2, "exp": "M6P : ajouté dans le REG/Golgi sur les hydrolases acides lysosomales → récepteur M6P au Golgi trans → vésicules → lysosomes. Maladie I-cell = défaut de M6P → hydrolases sécrétées → lysosomes non fonctionnels → inclusions + syndrome polymalformatif.", "matiere": "Biologie Moléculaire", "color": "#0284c7", "fichier": "biolmoltraduction"}, {"q": "Les chaperones moléculaires (Hsp70, BiP) :", "opts": ["Synthétisent les protéines", "Aident au repliement correct des protéines néosynthétisées et empêchent les agrégations non spécifiques", "Dégradent les protéines ubiquitinées", "Méthylent les histones"], "a": 1, "exp": "Chaperones : reconnaissent les séquences hydrophobes exposées (signe de protéine non repliée) → stabilisent → facilitent le repliement correct via cycles ATP-dépendants. Surexprimées dans les cancers (résistance au stress) → cibles thérapeutiques (inhibiteurs Hsp90 : ganetespib). BiP/GRP78 = chaperone majeure du REG, capteur de l'UPR.", "matiere": "Biologie Moléculaire", "color": "#0284c7", "fichier": "biolmoltraduction"}, {"q": "L'ARN polymérase II transcrit principalement :", "opts": ["Les ARNr (ribosomiques)", "Les ARNm (messagers) et la plupart des ARN non codants", "Les ARNt (de transfert)", "L'ADN mitochondrial"], "a": 1, "exp": "ARN pol I : ARNr (5,8S, 18S, 28S) dans le nucléole. ARN pol II : ARNm + miARN + lncARN + snARN. ARN pol III : ARNt + ARNr 5S + petits ARN. Alpha-amanitine : inhibe spécifiquement ARN pol II (hépatotoxique, Amanita phalloides).", "matiere": "Biologie Moléculaire", "color": "#0284c7", "fichier": "biolmoltranscription"}, {"q": "La règle GT-AG dans l'épissage signifie :", "opts": ["L'intron commence par GU et se termine par AG (sites donneurs/accepteurs conservés)", "L'exon commence par GT et se termine par AG", "Le splicéosome utilise des ARNt GT et AG", "La queue poly-A commence par GT"], "a": 0, "exp": "Sites d'épissage conservés : site donneur 5' = GU (en ARN) / GT (en ADN), site accepteur 3' = AG. Branchpoint (A) + séquence polypyrimidine en amont du site accepteur. Mutations de ces sites → maladies génétiques (bêta-thalassémie, SMA).", "matiere": "Biologie Moléculaire", "color": "#0284c7", "fichier": "biolmoltranscription"}, {"q": "Le patisiran (premier siARN thérapeutique approuvé) traite :", "opts": ["La mucoviscidose", "L'amylose à transthyrétine héréditaire — silençage de l'ARNm TTR par ARN interférence", "Le cancer du sein HER2+", "La maladie de Huntington"], "a": 1, "exp": "Patisiran (Onpattro, FDA 2018) : nanoparticules lipidiques contenant un siARN anti-TTR → RISC → dégradation de l'ARNm TTR → ↓ transthyrétine mal repliée → amylose ↓. Premier médicament siARN. Révolution : éteindre sélectivement un gène malade in vivo.", "matiere": "Biologie Moléculaire", "color": "#0284c7", "fichier": "biolmoltranscription"}, {"q": "L'enhancer est :", "opts": ["Le promoteur proximal uniquement", "Une séquence amplificatrice pouvant être à grande distance du gène, qui augmente la transcription × 100-1000 via des boucles chromatiniennes", "Une séquence codante", "Un type de codon stop"], "a": 1, "exp": "Enhancers : éléments régulateurs en cis, indépendants de la distance et de l'orientation. Se rapprochent du promoteur par boucles chromatiniennes (médiées par CTCF et cohésine). Actifs dans des types cellulaires spécifiques. Rôle crucial dans le développement et la carcinogenèse.", "matiere": "Biologie Moléculaire", "color": "#0284c7", "fichier": "biolmoltranscription"}, {"q": "La méthylation des CpG dans le promoteur d'un gène :", "opts": ["Active la transcription", "Réprime la transcription — les cytosines méthylées recrutent des répresseurs et empêchent la liaison des facteurs de transcription", "N'a aucun effet sur l'expression", "Active l'épissage alternatif"], "a": 1, "exp": "Méthylation CpG promoteur → répression. Mécanismes : CpG méthylés recrutent les MBD (methyl-CpG binding domain proteins) → HDAC → déacétylation histones → chromatine fermée. Dans les cancers : hyperméthylation des promoteurs de gènes suppresseurs (RB, MLH1, BRCA1) → silençage → perte de contrôle de la prolifération.", "matiere": "Biologie Moléculaire", "color": "#0284c7", "fichier": "biolmoltranscription"}, {"q": "L'ectoderme de surface donnera principalement :", "opts": ["Le tube digestif", "L'épiderme, les glandes cutanées, le cristallin — et le neuroectoderme donnera le SNC et les crêtes neurales", "Le muscle cardiaque", "Les hépatocytes"], "a": 1, "exp": "Ectoderme = feuillet externe. Ectoderme de surface → épiderme + phanères + glandes exocrines cutanées + épithélium buccal/anal + cristallin + placode optique. Neuroectoderme → tube neural → SNC. Crêtes neurales → mélanocytes, SNP, chondrocytes crânio-faciaux, surrénale médullaire. Mésoderme = muscle, os, rein. Endoderme = tube digestif, foie, pancréas, poumons.", "matiere": "Bio. Reproduction", "color": "#be185d", "fichier": "bioreprEmbryogenese"}, {"q": "L'acide folique réduit les malformations du tube neural car :", "opts": ["Il stabilise l'ADN fœtal", "Il est cofacteur de la synthèse des purines et de la méthylation de l'ADN → indispensable à la division cellulaire rapide lors de la neurulation (J22-28). Sa carence → défaut de fermeture du tube neural", "Il inhibe les tératogènes", "Il stimule la production de LH"], "a": 1, "exp": "Acide folique (vitamine B9) : cofacteur du transfert de groupements monocarbonés → synthèse des bases puriques + thymidylate → division cellulaire. La neurulation nécessite des divisions très rapides → carence → défaut de fermeture. Supplémentation : 0,4 mg/j dès 4 semaines avant la conception (car neurulation terminée à J26, souvent avant que la grossesse soit connue). Dose élevée (5 mg/j) si ATCD ou antiépileptiques.", "matiere": "Bio. Reproduction", "color": "#be185d", "fichier": "bioreprEmbryogenese"}, {"q": "La période la plus critique pour les tératogènes est :", "opts": ["Le 1er trimestre avant J14 (loi du tout ou rien)", "La 3ème à la 8ème semaine = organogenèse — c'est la fenêtre où les organes se forment. Avant J14 : tout ou rien. Après 8 SA : tératogènes peuvent encore affecter croissance et fonctions mais moins de malformations structurelles majeures", "Le 3ème trimestre", "Le 2ème trimestre uniquement"], "a": 1, "exp": "Tératogènes : agents capables de causer des malformations. Fenêtre critique = 3-8ème semaine (organogenèse). Avant J14 : loi du tout ou rien (mort embryonnaire ou développement normal car toutes les cellules sont encore totipotentes). Thalidomide J28-50 → phocomélie (membres). Rubéole 1er trimestre → cataracte, cardiopathie, surdité. Valproate → spina bifida. Alcool : tout le long de la grossesse.", "matiere": "Bio. Reproduction", "color": "#be185d", "fichier": "bioreprEmbryogenese"}, {"q": "Dans la différenciation sexuelle masculine, l'AMH (hormone anti-müllérienne) :", "opts": ["Stimule le développement des canaux de Müller", "Provoque la régression des canaux de Müller (futurs utérus, trompes, vagin supérieur) chez le fœtus XY — sécrétée par les cellules de Sertoli. Si absent → persistance des canaux de Müller même chez le garçon", "Stimule la production de testostérone", "Détermine le sexe génétique"], "a": 1, "exp": "Différenciation masculine (XY) : SRY → cellules de Sertoli (AMH → régression canaux de Müller) + cellules de Leydig (testostérone → développement canaux de Wolff, DHT → OGE masculins). Syndrome d'insensibilité aux androgènes (SIA) : XY mais récepteur aux androgènes non fonctionnel → OGE féminins + AMH présente → pas d'utérus. Confirme que la voie 'par défaut' est féminine.", "matiere": "Bio. Reproduction", "color": "#be185d", "fichier": "bioreprEmbryogenese"}, {"q": "Les cardiopathies congénitales sont les malformations les plus fréquentes car :", "opts": ["Le cœur est le 1er organe à se former et se forme rapidement — les 1ers battements débutent à J22, la septation est complète à la 7ème semaine. Cette organogenèse rapide et complexe est très sensible aux perturbations génétiques et environnementales", "Le cœur est exposé à tous les tératogènes", "Les chromosomes sexuels portent les gènes cardiaques", "Tous les gènes cardiaques sont sur l'autosomes 21"], "a": 0, "exp": "Cardiopathies congénitales : ~8/1000 naissances. Multifactorielles (gènes + environnement). Le cœur est le 1er organe formé (J22 = 1ers battements) avec une organogenèse très complexe (4 cavités, 4 valves, 2 circulations). Dépistage : écho morphologique 22 SA + écho fœtale spécialisée si suspicion. Chirurgie cardiaque pédiatrique dès la naissance si critique (transposition des gros vaisseaux = urgence néonatale).", "matiere": "Bio. Reproduction", "color": "#be185d", "fichier": "bioreprEmbryogenese"}, {"q": "La réaction de zona lors de la fécondation sert à :", "opts": ["Faciliter la pénétration du spermatozoïde", "Empêcher la polyspermie — à la pénétration du 1er spermatozoïde, les granules corticaux libèrent leurs enzymes → modification de la zone pellucide → imperméable aux autres spermatozoïdes", "Déclencher la fin de la méiose II", "Permettre la capacitation"], "a": 1, "exp": "Blocage de la polyspermie (2 mécanismes) : rapide = dépolarisation de la membrane ovocytaire (< 1 seconde). Lent = réaction corticale : granules corticaux → exocytose → enzymes modifient les glycoprotéines de la ZP → plus de récepteurs ZP3 fonctionnels → les autres spermatozoïdes ne peuvent plus se fixer. La polyspermie entraînerait une triploïdie (3n) → embryon non viable.", "matiere": "Bio. Reproduction", "color": "#be185d", "fichier": "bioreprFecondation"}, {"q": "La masse cellulaire interne (MCI) du blastocyste donnera :", "opts": ["Le placenta", "L'embryon lui-même — cellules pluripotentes capables de donner tous les tissus des 3 feuillets embryonnaires. Le trophoblaste périphérique donnera le placenta.", "Le cordon ombilical uniquement", "Le liquide amniotique"], "a": 1, "exp": "Blastocyste : trophoblaste (extérieur) = placenta + membranes extraembryonnaires. MCI/embryoblaste (intérieur) = embryon. Cellules de la MCI = cellules souches embryonnaires (ESC) pluripotentes. La distinction trophoblaste/MCI est le premier événement de différenciation cellulaire (J4-5). Facteurs de transcription : CDX2 (trophoblaste), OCT4/NANOG/SOX2 (MCI).", "matiere": "Bio. Reproduction", "color": "#be185d", "fichier": "bioreprFecondation"}, {"q": "La hCG (human Chorionic Gonadotropin) est sécrétée par :", "opts": ["Le corps jaune", "Le syncytiotrophoblaste dès J8-9 → maintient le corps jaune → maintien de la progestérone → pas de règles = signal de grossesse", "L'hypophyse maternelle", "L'ovaire fœtal"], "a": 1, "exp": "hCG : produite par le syncytiotrophoblaste invasif. Structure proche de LH (sous-unité α identique, sous-unité β spécifique). Se fixe sur les récepteurs LH du corps jaune → maintien de la production de progestérone → pas d'atrésie du corps jaune → pas de chute hormonale → pas de menstruation. Détectable dans les urines dès J10-12 (test de grossesse). Pic à 10 SA puis placenta prend le relais.", "matiere": "Bio. Reproduction", "color": "#be185d", "fichier": "bioreprFecondation"}, {"q": "La contraception d'urgence (lévonorgestrel, NorLevo) agit principalement en :", "opts": ["Empêchant l'implantation d'un œuf déjà fécondé", "Retardant ou bloquant l'ovulation — si l'ovulation n'a pas encore eu lieu, le lévonorgestrel l'empêche. Il ne prévient PAS l'implantation d'un embryon déjà formé", "Détruisant les spermatozoïdes", "Bloquant la fécondation dans la trompe"], "a": 1, "exp": "NorLevo = forte dose de lévonorgestrel (progestatif) → ↓ pic LH → retard/blocage ovulatoire. Efficace si pris avant l'ovulation. Si l'ovulation a déjà eu lieu et la fécondation aussi → NorLevo n'a pas d'effet sur l'implantation d'un embryon formé (endomètre déjà sous l'effet de la progestérone). Délai d'action maximal : < 72h (efficacité 95%). EllaOne (ulipristal) : < 120h, plus efficace.", "matiere": "Bio. Reproduction", "color": "#be185d", "fichier": "bioreprFecondation"}, {"q": "Le DPI (diagnostic préimplantatoire) est réalisé :", "opts": ["Sur le fœtus à 16 SA", "Sur les embryons issus de FIV avant transfert — biopsie de 1-2 blastomères (J3) ou du trophoblaste (J5-6) → analyse génétique (NGS/PCR) → sélection d'un embryon sain → transfert", "Sur le sperme avant la fécondation", "Sur les ovocytes avant fécondation"], "a": 1, "exp": "DPI : biopsie embryonnaire précoce (J3 : 1-2 blastomères sur 8, les autres restent totipotents = pas de dommage pour l'embryon. Ou J5 : trophoblaste = futur placenta = moins de risque pour l'embryon). Analyse par NGS (toutes les paires de chromosomes) ou PCR ciblée (maladie monogénique). Résultats en 24-48h → transfert de l'embryon sain. Réglementé en France par la loi de bioéthique.", "matiere": "Bio. Reproduction", "color": "#be185d", "fichier": "bioreprFecondation"}, {"q": "Les ovocytes sont bloqués en métaphase II jusqu'à :", "opts": ["L'ovulation", "La fécondation — c'est le spermatozoïde qui déclenche la fin de la méiose II et l'expulsion du 2ème globule polaire", "La puberté", "La ménopause"], "a": 1, "exp": "Chronologie méiose ovocytaire : Prophase I (fœtal) → BLOCAGE jusqu'à l'ovulation (sous le pic de LH) → reprise méiose I → ovocyte II bloqué en MÉTAPHASE II → ovulé → si fécondation → fin méiose II → 2ème globule polaire expulsé → zygote (2n). Si pas de fécondation → l'ovocyte II dégénère. Donc la méiose ne se termine que si la fécondation a lieu.", "matiere": "Bio. Reproduction", "color": "#be185d", "fichier": "bioreprGametogenese"}, {"q": "Le pic de LH au milieu du cycle déclenche :", "opts": ["La croissance folliculaire initiale", "L'ovulation — reprise de la méiose I de l'ovocyte, rupture du follicule dominant, expulsion de l'ovocyte II, formation du corps jaune", "La menstruation", "La synthèse de FSH"], "a": 1, "exp": "Pic de LH (milieu du cycle, J14 dans un cycle de 28j) : seul signal capable de déclencher l'ovulation. Mécanismes : reprise de la méiose I de l'ovocyte (levée du blocage en prophase I), rupture de la paroi folliculaire par des prostaglandines et des protéases (collagénases), transformation du follicule résiduel en corps jaune. La LH stimule aussi les cellules de la thèque → androgènes → aromatisés en œstradiol.", "matiere": "Bio. Reproduction", "color": "#be185d", "fichier": "bioreprGametogenese"}, {"q": "La GnRH en administration continue (et non pulsatile) provoque :", "opts": ["Une stimulation prolongée de la FSH et LH", "Une down-régulation de ses récepteurs → ↓ FSH et LH → ↓ production de stéroïdes gonadiques (castration chimique réversible). Utilisé dans le cancer de prostate hormonodépendant", "Une hyperstimulation ovarienne", "Une augmentation de la testostérone"], "a": 1, "exp": "GnRH pulsatile (naturelle) → stimule FSH + LH. GnRH continue (agonistes : leuproréline, triptoréline) → désensibilisation des récepteurs hypophysaires → ↓ FSH + LH → ↓ stéroïdes gonadiques. Utilisations : cancer d
