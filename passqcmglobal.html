opts": ["Glycémie à jeun > 1 g/L", "Glycémie à jeun ≥ 1,26 g/L à 2 reprises OU glycémie aléatoire ≥ 2 g/L avec symptômes OU HbA1c ≥ 6,5%", "HbA1c > 5,7% uniquement", "Glycémie post-prandiale > 1,4 g/L"], "a": 1, "exp": "Diabète : GAJ ≥ 1,26 g/L × 2 · OU glycémie ≥ 2 g/L + symptômes (polyurie, polydipsie, amaigrissement) · OU HGPO 2h ≥ 2 g/L · OU HbA1c ≥ 6,5%. Pré-diabète : GAJ 1,10-1,25 g/L ou HbA1c 5,7-6,4%. Un seul critère suffit si symptômes, sinon confirmer à 2 reprises.", "matiere": "Physiologie", "color": "#059669", "fichier": "physioendo"}, {"q": "Le syndrome de Cushing se caractérise biologiquement par :", "opts": ["Cortisol bas, ACTH basse", "Cortisol élevé avec perte du rythme circadien — ACTH élevée si hypophysaire (maladie de Cushing) ou basse si surrénalien", "Cortisol bas, ACTH élevée", "Aldostérone élevée, rénine basse"], "a": 1, "exp": "Cushing : cortisol libre urinaire ↑ + perte du rythme circadien (cortisol 23h ↑). Si ACTH ↑ = dépendant ACTH (adénome hypophysaire 70% = maladie de Cushing, ACTH ectopique 5%). Si ACTH ↓ = indépendant ACTH (adénome surrénalien, cancer). Freinage dexaméthasone 1 mg : non freiné si Cushing.", "matiere": "Physiologie", "color": "#059669", "fichier": "physioendo"}, {"q": "Une hypercalcémie avec PTH basse est évocatrice de :", "opts": ["Hyperparathyroïdie primaire (adénome parathyroïdien)", "Une origine maligne — PTHrP sécrétée par une tumeur (CBPC, cancer du rein, du sein) OU métastases osseuses → ostéoclastes activés — PTH basse car CaSR perçoit la Ca<sup>2</sup><sup>+</sup> élevée", "Un déficit en vitamine D", "Un hyperaldostéronisme"], "a": 1, "exp": "Hypercalcémie + PTH ↑ = hyperparathyroïdie primaire (adénome parathyroïdien 85%). Hypercalcémie + PTH ↓ = maligne (PTHrP = protéine PTH-related sécrétée par tumeur, non dosée par le dosage PTH standard). Bilan : PTH + PTHrP + scanner si PTH basse. Bisphosphonates IV (zolédronate) en urgence si hypercalcémie sévère.", "matiere": "Physiologie", "color": "#059669", "fichier": "physioendo"}, {"q": "Le DFG est normal à :", "opts": ["< 30 mL/min", "~120 mL/min/1,73m<sup>2</sup> chez l'adulte jeune, estimé par CKD-EPI ou MDRD", "> 200 mL/min", "60 L/jour seulement"], "a": 1, "exp": "DFG normal : ~120 mL/min = ~180 L/j filtrés. MRC : G3b si 30-44, G4 si 15-29, G5 (terminale) si < 15 → dialyse ou greffe. CKD-EPI = formule de référence actuelle. Créatinine : augmente tardivement (50% du DFG perdu avant doublement de créatinine).", "matiere": "Physiologie", "color": "#059669", "fichier": "physiorein"}, {"q": "Le furosémide est un diurétique de l'anse car il bloque :", "opts": ["Les aquaporines AQP2 du tube collecteur", "Le cotransporteur NKCC2 de la branche ascendante large de l'anse de Henlé → pas de gradient cortico-papillaire → pas de concentration des urines → diurèse massive", "Le cotransporteur NCC du TCD", "ENaC du tube collecteur"], "a": 1, "exp": "Furosémide : inhibition NKCC2 (Na<sup>+</sup>-K<sup>+</sup>-2Cl<sup>−</sup>) dans l'anse ascendante → no gradient → pas de réabsorption H<sub>2</sub>O en descendante → diurèse massive. Aussi → kaliurèse (hypokaliémie). Thiazidiques : NCC (TCD). Spironolactone : antagoniste aldostérone (ENaC). SGLT2i : glucose + Na<sup>+</sup> dans le TCP.", "matiere": "Physiologie", "color": "#059669", "fichier": "physiorein"}, {"q": "Le SIADH provoque une hyponatrémie par :", "opts": ["Perte rénale de Na<sup>+</sup>", "ADH inappropriée → H<sub>2</sub>O réabsorbée en excès → Na<sup>+</sup> dilué — hyponatrémie euvolémique hypoosmolaire", "Apport excessif de Na<sup>+</sup>", "Insuffisance surrénalienne"], "a": 1, "exp": "SIADH : ADH sécrétée indépendamment de l'osmolarité → réabsorption H<sub>2</sub>O (AQP2) → Na<sup>+</sup> dilué → hyponatrémie normovolémique. Osmolarité urinaire > osmolarité plasmatique (paradoxal). Causes : CBPC, médicaments (SSRIs, CBZ), infections. Correction lente : < 8-10 mmol/L/24h → risque de myélinolyse pontique si trop rapide.", "matiere": "Physiologie", "color": "#059669", "fichier": "physiorein"}, {"q": "Les alpha-1 bloquants (tamsulosine) traitent l'HBP en :", "opts": ["Réduisant le volume de la prostate", "Relaxant le muscle lisse du col vésical et de la prostate → ↓ résistance à l'écoulement → amélioration du jet", "Inhibant la DHT", "Réduisant la production de testostérone"], "a": 1, "exp": "Alpha-1 bloquants : bloquent les récepteurs α<sub>1</sub> adrénergiques du muscle lisse prostatique et du sphincter urétral interne → relaxation → moins d'obstruction → meilleur débit. Effet rapide (48-72h). Effets secondaires : hypotension orthostatique, éjaculation rétrograde. Finastéride (5ARI) : réduit la taille de la prostate (inhibe DHT) mais délai de 6 mois.", "matiere": "Physiologie", "color": "#059669", "fichier": "physiorein"}, {"q": "La ventilation alvéolaire est différente de la ventilation minute car :", "opts": ["Elles sont identiques", "La ventilation minute inclut l'espace mort anatomique (~150 mL non échangeable) — VA = (VT − VD) × FR", "La VA mesure uniquement le VT", "La VA est plus grande que la ventilation minute"], "a": 1, "exp": "VA = (VT − VD) × FR. VD (espace mort) = ~150 mL (voies aériennes conductives qui ne participent pas aux échanges). Si FR ↑ avec VT petit → espace mort relatif ↑ → VA ↓ malgré ventilation minute normale → hypercapnie. Ex : ventilation superficielle rapide = peu efficace.", "matiere": "Physiologie", "color": "#059669", "fichier": "physiorespir"}, {"q": "Le transport du CO<sub>2</sub> dans le sang se fait principalement :", "opts": ["Dissous (70%)", "Sous forme de HCO<sub>3</sub><sup>−</sup> (70%) — CO<sub>2</sub> + H<sub>2</sub>O → H<sub>2</sub>CO<sub>3</sub> → H<sup>+</sup> + HCO<sub>3</sub><sup>−</sup> dans les GR", "Lié à l'albumine (70%)", "Lié à l'hémoglobine (70%)"], "a": 1, "exp": "CO<sub>2</sub> transport : HCO<sub>3</sub><sup>−</sup> (70%) + lié Hb = carbhémoglobine (23%) + dissous (7%). Dans le GR : anhydrase carbonique → CO<sub>2</sub> + H<sub>2</sub>O → H<sub>2</sub>CO<sub>3</sub> → H<sup>+</sup> + HCO<sub>3</sub><sup>−</sup>. HCO<sub>3</sub><sup>−</sup> sort par antiport HCO<sub>3</sub><sup>−</sup>/Cl<sup>−</sup> (shift chlorure). H<sup>+</sup> tamponné par l'Hb (effet Bohr).", "matiere": "Physiologie", "color": "#059669", "fichier": "physiorespir"}, {"q": "Une acidose métabolique se reconnaît sur le GDS par :", "opts": ["pH ↑, HCO<sub>3</sub><sup>−</sup> ↑, PaCO<sub>2</sub> ↑", "pH ↓, HCO<sub>3</sub><sup>−</sup> ↓, PaCO<sub>2</sub> ↓ (compensation respiratoire par hyperventilation)", "pH ↓, HCO<sub>3</sub><sup>−</sup> ↑, PaCO<sub>2</sub> ↑", "pH ↑, HCO<sub>3</sub><sup>−</sup> ↓, PaCO<sub>2</sub> ↓"], "a": 1, "exp": "Acidose métabolique : pH ↓ (cause) + HCO<sub>3</sub><sup>−</sup> ↓ (primaire) + PaCO<sub>2</sub> ↓ (compensation respiratoire). PaCO<sub>2</sub> attendue = 1,5 × HCO<sub>3</sub><sup>−</sup> + 8 ± 2 (formule de Winter). Si PaCO<sub>2</sub> pas adaptée → trouble mixte. Causes : DKA, IR, acidose lactique, diarrhée profuse (perte HCO<sub>3</sub><sup>−</sup>).", "matiere": "Physiologie", "color": "#059669", "fichier": "physiorespir"}, {"q": "Le surfactant pulmonaire est indispensable car :", "opts": ["Il transporte l'O<sub>2</sub>", "Il réduit la tension superficielle alvéolaire → améliore la compliance → empêche l'affaissement des petites alvéoles (loi de Laplace)", "Il filtre les bactéries", "Il produit du mucus"], "a": 1, "exp": "Loi de Laplace : P = 2T/r. Petite alvéole (r petit) → P très élevée → tendance à se vider dans une grande. Le surfactant ↓ T de façon inversement proportionnelle à r → équilibre les pressions → maintient ouvertes les petites alvéoles. Prématuré : absence surfactant → SDNN → CPAP + surfactant exogène (poractant alfa).", "matiere": "Physiologie", "color": "#059669", "fichier": "physiorespir"}, {"q": "L'embolie pulmonaire crée une hypoxémie par :", "opts": ["Un shunt droit-gauche anatomique", "Des zones à V/Q élevé (espace mort) → redistribution de la perfusion → zones à V/Q bas ailleurs → hypoxémie globale", "Une hypoventilation directe", "Une destruction alvéolaire"], "a": 1, "exp": "EP : obstruction artérielle pulmonaire → zone ventilée non perfusée = espace mort (V/Q ↑↑) → sang redirigé vers les autres zones → surperfusion → V/Q bas → déséquilibre → hypoxémie. D-dimères négatifs exclut l'EP (haute VPN). Angioscanner thoracique = gold standard diagnostique.", "matiere": "Physiologie", "color": "#059669", "fichier": "physiorespir"}, {"q": "Pourquoi les cellules eucaryotes sont-elles plus grandes que les bactéries sans que ça pose problème pour les échanges ?", "opts": ["Elles ont une paroi plus épaisse", "Elles ont des organites qui optimisent les échanges internes — mitochondries, RE, Golgi organisent les réactions à l'intérieur sans tout dépendre de la diffusion depuis l'extérieur", "Elles produisent plus d'ATP", "Leur membrane est plus perméable"], "a": 1, "exp": "Les eucaryotes compensent leur grande taille par la compartimentation : chaque organite spécialise une fonction. Les mitochondries produisent l'énergie sur place, le RE traite les protéines localement. La diffusion seule (efficace sur ~100 µm max) est complétée par des transports actifs vésiculaires.", "matiere": "Biologie Cellulaire", "color": "#7c3aed", "fichier": "biolcellcellule"}, {"q": "Quelle est la principale différence entre une cellule animale et une cellule végétale ?", "opts": ["La cellule animale est plus grande", "La cellule végétale possède une paroi en cellulose, des chloroplastes et une grande vacuole centrale — absents chez les animaux", "La cellule animale a plus de mitochondries", "La cellule végétale n'a pas de noyau"], "a": 1, "exp": "Cellule végétale : paroi cellulosique (rigidité + forme), chloroplastes (photosynthèse), grande vacuole centrale (turgescence). Cellule animale : membrane plasmique seule (pas de paroi), pas de chloroplaste, vacuoles petites et nombreuses. Les deux ont : noyau, mitochondries, RE, Golgi.", "matiere": "Biologie Cellulaire", "color": "#7c3aed", "fichier": "biolcellcellule"}, {"q": "Pourquoi la théorie endosymbiotique explique-t-elle l'origine des mitochondries ?", "opts": ["Les mitochondries sont formées dans le noyau", "Les mitochondries ressemblent à des bactéries : elles ont leur propre ADN circulaire, leurs propres ribosomes 70S et se divisent par fission — comme si une bactérie avait été englobée par une cellule ancestrale", "Les mitochondries ont été synthétisées chimiquement", "Les mitochondries viennent du REL"], "a": 1, "exp": "Preuves de l'endosymbiose : ADN mitochondrial circulaire (comme les bactéries), ribosomes 70S (bactériens, pas 80S comme les eucaryotes), double membrane (membrane interne = ancienne membrane bactérienne), division autonome par fission binaire. Lynn Margulis, 1967.", "matiere": "Biologie Cellulaire", "color": "#7c3aed", "fichier": "biolcellorganites"}, {"q": "Quel est le rôle principal des lysosomes dans la cellule ?", "opts": ["Synthétiser des protéines", "Dégrader les macromolécules (protéines, lipides, glucides, acides nucléiques) dans un compartiment acide (pH ~4,5) grâce à des hydrolases acides — recyclage cellulaire", "Produire de l'ATP", "Transporter les vésicules vers la membrane"], "a": 1, "exp": "Lysosomes : organites acides contenant ~50 hydrolases capables de tout dégrader. Fonctions : autophagie (recycler ses propres composants endommagés), hétérophagie (digérer ce qui a été phagocyté), recyclage des protéines mal repliées. Déficit d'une hydrolase → maladie de surcharge lysosomale (Gaucher, Pompe...).", "matiere": "Biologie Cellulaire", "color": "#7c3aed", "fichier": "biolcellorganites"}, {"q": "Comment les RCPG (récepteurs couplés aux protéines G) transmettent-ils un signal ?", "opts": ["Ils traversent directement le noyau", "Le ligand se fixe → changement de conformation du récepteur → activation de la protéine G → production d'un second messager (AMPc, IP₃, DAG) → cascade intracellulaire → réponse cellulaire", "Ils se lient directement à l'ADN", "Ils ouvrent directement un canal ionique"], "a": 1, "exp": "RCPG : 7 domaines transmembranaires. Signal extracellulaire (hormone, neurotransmetteur) → protéine G activée (échange GDP→GTP sur Gα) → Gα se dissocie → active une enzyme effectrice : AC (→AMPc→PKA) si Gαs, PLC (→IP₃+DAG) si Gαq, AC inhibée si Gαi. Second messager amplifie le signal.", "matiere": "Biologie Cellulaire", "color": "#7c3aed", "fichier": "biolcellsignalisation"}, {"q": "Pourquoi l'ARNm doit-il être 'mature' avant de quitter le noyau ?", "opts": ["Pour être plus petit", "Le pré-ARNm contient des introns (séquences non codantes) qui doivent être éliminés par épissage, et des modifications (coiffe 5' + queue poly-A) qui le protègent de la dégradation et permettent la traduction", "Pour avoir plus de codons stop", "Pour être reconnu par les ribosomes directement"], "a": 1, "exp": "Maturation du pré-ARNm : 1) Coiffe 7-méthylguanosine en 5' (protection + reconnaissance ribosomale), 2) Queue poly-A en 3' (stabilité + export), 3) Épissage des introns par le spliceosome (retrait des introns, jonction des exons). L'ARNm mature sort par les pores nucléaires → traduction dans le cytoplasme.", "matiere": "Biologie Moléculaire", "color": "#0284c7", "fichier": "biolmoltranscription"}, {"q": "Quel est le rôle du codon AUG dans la traduction ?", "opts": ["C'est un codon stop", "C'est le codon d'initiation — il code pour la méthionine et indique au ribosome où commencer la lecture. Sans AUG, pas de synthèse protéique", "C'est un codon qui code pour l'arginine", "Il code pour la sérine dans toutes les protéines"], "a": 1, "exp": "AUG = codon start universel → code Met (méthionine). Le ribosome scanne l'ARNm de 5' vers 3' et commence la traduction au premier AUG dans un bon contexte (séquence de Kozak chez les eucaryotes). La méthionine initiatrice est souvent clivée après. Les 3 codons stop (UAA, UAG, UGA) ne codent pour aucun acide aminé.", "matiere": "Biologie Moléculaire", "color": "#0284c7", "fichier": "biolmoltraduction"}, {"q": "Quelle est la différence fondamentale entre proto-oncogène et oncogène ?", "opts": ["Ce sont les mêmes gènes", "Le proto-oncogène est un gène normal qui contrôle la prolifération cellulaire. L'oncogène est sa version mutée/suractivée qui pousse la cellule à se diviser sans contrôle — gaz coincé en position ouverte", "L'oncogène est un gène supprimé", "Le proto-oncogène est spécifique aux cellules cancéreuses"], "a": 1, "exp": "Proto-oncogènes : gènes normaux (RAS, MYC, HER2...) qui stimulent la prolifération en réponse à des signaux. Mutation → oncogène : activité permanente indépendamment des signaux = accélérateur bloqué. Exemples : KRAS muté (côlon, pancréas), BRAF V600E (mélanome), amplification HER2 (sein). Nécessite souvent d'autres mutations pour donner un cancer.", "matiere": "Biologie Moléculaire", "color": "#0284c7", "fichier": "biolmolcycle"}, {"q": "Pourquoi les acides gras insaturés rendent-ils les membranes plus fluides ?", "opts": ["Ils sont plus courts", "Leurs doubles liaisons créent des coudes dans la chaîne → les queues ne peuvent pas s'empaqueter serré → membrane plus fluide et flexible, surtout à basse température", "Ils sont chargés négativement", "Ils attirent plus d'eau"], "a": 1, "exp": "Acide gras saturé : chaîne droite → empilement dense → membrane rigide. Acide gras insaturé (cis) : double liaison → coude → empilement impossible → membrane fluide. Importance physiologique : membranes des animaux en région froide ont plus d'insaturés (poissons d'eau froide, huiles végétales). Le cholestérol joue un rôle tampon entre les deux extrêmes.", "matiere": "Biochimie", "color": "#d97706", "fichier": "biochimielipides"}, {"q": "Comment les enzymes accélèrent-elles les réactions chimiques ?", "opts": ["En augmentant la température", "En se liant au substrat et en abaissant l'énergie d'activation — elles stabilisent l'état de transition → réaction plus rapide mais le bilan énergétique (ΔG) reste identique", "En apportant de l'énergie", "En modifiant le pH"], "a": 1, "exp": "Enzyme = catalyseur biologique. Mécanisme : site actif complémentaire au substrat (clé-serrure ou modèle de l'ajustement induit) → complexe enzyme-substrat → état de transition stabilisé → énergie d'activation abaissée → réaction x10⁶ à x10¹² fois plus rapide. L'enzyme n'est pas consommée. ΔG de la réaction reste le même (thermodynamique inchangée).", "matiere": "Biochimie", "color": "#d97706", "fichier": "biochimieenzymes"}, {"q": "Quelle est la différence entre inhibition compétitive et non compétitive ?", "opts": ["Ce sont les mêmes", "Compétitive : l'inhibiteur ressemble au substrat et occupe le site actif (déplaçable par excès de substrat). Non compétitive : l'inhibiteur se fixe ailleurs, change la forme de l'enzyme et réduit l'efficacité même en excès de substrat", "Compétitive est irréversible, non compétitive est réversible", "Compétitive modifie le pH optimum"], "a": 1, "exp": "Compétitive : Km apparent augmente (plus de substrat nécessaire), Vmax inchangée. Ex : statines (ressemblent au substrat naturel de HMG-CoA réductase). Non compétitive (allostérique) : Km inchangé, Vmax diminue. Ex : aspirine sur COX-1 (acétylation irréversible du site actif). Réversible vs irréversible = autre distinction (irréversible = liaison covalente).", "matiere": "Biochimie", "color": "#d97706", "fichier": "biochimieenzymes"}, {"q": "Pourquoi l'ADN est-il une double hélice et non une simple chaîne ?", "opts": ["Pour être plus résistant aux chocs", "La complémentarité des bases (A-T, G-C) permet d'avoir deux brins antiparallèles : un brin sert de matrice pour copier l'autre — c'est la base de la réplication fidèle et de la réparation de l'ADN", "Pour être plus compact", "Pour faciliter la transcription directement"], "a": 1, "exp": "Double hélice (Watson et Crick, 1953) : A est toujours en face de T (2 LH), G est toujours en face de C (3 LH). Les deux brins sont antiparallèles (5'→3' et 3'→5'). Avantages : redondance (si un brin est endommagé, l'autre sert de matrice pour réparer), réplication semi-conservative (chaque brin est conservé dans les cellules filles), règle de Chargaff ([A]=[T], [G]=[C]).", "matiere": "Biochimie", "color": "#d97706", "fichier": "biochimieadn"}, {"q": "Quelle est la caractéristique principale d'un tissu épithélial ?", "opts": ["Il contient beaucoup de substance extracellulaire", "Les cellules sont jointives (peu de substance extracellulaire), reposent sur une membrane basale et ont une polarité apico-basale — elles forment des barrières ou des surfaces de sécrétion/absorption", "Il est très vascularisé", "Il est composé de fibres et de cellules isolées"], "a": 1, "exp": "Tissu épithélial : cellules jointives (jonctions serrées, adhérentes), peu de MEC, toujours sur une membrane basale (lame basale = collagène IV + laminines). Polarité : pôle apical (face libre = vers l'extérieur ou une cavité) ≠ pôle basal (face lame basale). Avascular (nourri par diffusion depuis le tissu conjonctif sous-jacent). Fonctions : protection, absorption, sécrétion, perception sensorielle.", "matiere": "Histologie", "color": "#db2777", "fichier": "histologieepithelium"}, {"q": "Pourquoi le muscle cardiaque peut-il se contracter sans se fatiguer contrairement au muscle squelettique ?", "opts": ["Il ne contient pas d'actine ni de myosine", "Il utilise uniquement des lipides comme source d'énergie, a des mitochondries très nombreuses, et ses cellules sont reliées par des disques intercalaires avec des jonctions gap qui synchronisent les contractions automatiquement", "Il est contrôlé par des hormones uniquement", "Il n'a pas besoin d'ATP"], "a": 1, "exp": "Muscle cardiaque (myocarde) : cellules striées mononucléées reliées par des disques intercalaires (jonctions gap → couplage électrique → syncytium fonctionnel). Automatisme propre (nœud sinusal). Très riche en mitochondries (~30% du volume = métabolisme aérobie quasi-exclusif). Pas de fatigue car utilise les lipides et le lactate en continu. Muscle squelettique : fatigue par accumulation de lactate (anaérobie).", "matiere": "Histologie", "color": "#db2777", "fichier": "histologiemusculaire"}, {"q": "Quelle est la différence entre un neurone et une cellule gliale ?", "opts": ["Les cellules gliales conduisent l'influx nerveux plus vite", "Le neurone est la cellule excitable qui transmet l'information (potentiel d'action). La cellule gliale (astrocyte, oligodendrocyte, cellule de Schwann, microglie) assure le soutien, la myélinisation, la nutrition et la protection — elle ne conduit pas de potentiel d'action", "Les cellules gliales ont un axone", "Les neurones ne peuvent pas mourir"], "a": 1, "exp": "Neurones : excitables, potentiel d'action, synapses. Non mitotiques chez l'adulte (sauf quelques zones). Cellules gliales : 10× plus nombreuses que les neurones. Astrocytes (soutien, BHE), oligodendrocytes (myélinisation centrale = gaine de myéline sur l'axone → conduction rapide saltatoire), cellules de Schwann (myélinisation périphérique), microglie (macrophages du SNC). La sclérose en plaques = destruction de la myéline par le système immunitaire.", "matiere": "Histologie", "color": "#db2777", "fichier": "histologienerveux"}, {"q": "Pourquoi le cœur peut-il pomper plus de sang quand on fait du sport sans que le cerveau lui dise ?", "opts": ["Grâce aux hormones uniquement", "Loi de Frank-Starling : plus le cœur est rempli de sang (précharge ↑), plus il se contracte fort et éjecte plus de volume — mécanisme intrinsèque sans commande nerveuse", "Car le cœur grossit à l'effort", "Grâce à l'adrénaline uniquement"], "a": 1, "exp": "Frank-Starling : étirement des fibres myocardiques → plus de ponts acto-myosine formés → contraction plus forte → volume d'éjection systolique ↑. Pendant l'effort : retour veineux ↑ (muscles poussent le sang vers le cœur) → cœur plus rempli → se contracte plus fort. S'ajoute à la réponse sympathique (adrénaline → FC↑ + contractilité↑). Mécanisme adaptatif fondamental.", "matiere": "Physiologie", "color": "#059669", "fichier": "physiocardio"}, {"q": "Pourquoi une personne qui hyperventile peut-elle avoir des fourmillements et des crampes ?", "opts": ["Par manque d'oxygène", "L'hyperventilation élimine trop de CO₂ → alcalose respiratoire → le pH sanguin monte → le calcium ionisé plasmatique diminue (se lie aux protéines) → hyperexcitabilité neuromusculaire → fourmillements (paresthésies), crampes, spasme carpo-pédal (signe de Trousseau)", "Par excès d'oxygène toxique", "Par déshydratation"], "a": 1, "exp": "CO₂ dissous = acide (CO₂+H₂O→H₂CO₃). Hyperventilation → ↓CO₂ → ↓H₂CO₃ → pH↑ (alcalose respiratoire). En alcalose : albumine capte plus de Ca²⁺ → Ca²⁺ ionisé libre ↓ → hypocalcémie relative → neurones plus excitables → paresthésies, crampes. Traitement : respirer dans un sac (réinhale le CO₂). Enseigne l'équilibre acido-basique.", "matiere": "Physiologie", "color": "#059669", "fichier": "physiorespir"}, {"q": "Pourquoi boire beaucoup d'eau d'un coup peut être dangereux ?", "opts": ["L'eau est toxique à haute dose", "L'excès d'eau dilue le sodium sanguin (hyponatrémie = Na⁺ < 135 mmol/L) → eau entre dans les cellules par osmose → les cellules gonflent, notamment les neurones → œdème cérébral → confusion, convulsions, coma", "L'eau augmente trop la pression artérielle", "L'eau bloque les reins"], "a": 1, "exp": "Intoxication à l'eau (potomanie, noyade en eau douce, prise excessive pendant un marathon) : dilution du Na⁺ plasmatique → osmolarité extracellulaire ↓ → eau entre dans les cellules → gonflement. Neurones les plus sensibles (boîte crânienne non extensible → pression ↑). Symptômes : nausées, confusion, convulsions, décès si sévère. Reins normaux éliminent ~1 L/h → problème si ingestion plus rapide.", "matiere": "Physiologie", "color": "#059669", "fichier": "physiorein"}, {"q": "Pourquoi prendre un antibiotique sans finir la cure favorise les résistances ?", "opts": ["Car les bactéries apprennent à reconnaître l'antibiotique", "Arrêter tôt laisse survivre les bactéries les plus résistantes (celles qui avaient une légère résistance naturelle). Ces survivantes se multiplient et transmettent leur résistance — sélection darwinienne des plus résistantes", "Car l'antibiotique devient actif uniquement en cure complète", "Car le patient redevient contagieux"], "a": 1, "exp": "Résistance aux antibiotiques = sélection naturelle accélérée. Une population bactérienne contient toujours quelques individus légèrement moins sensibles. Si on arrête l'antibiotique trop tôt (les sensibles sont morts, les résistantes survivent) → multiplication des résistantes → résistance acquise. D'où la règle : finir la cure même si on se sent mieux, et ne pas utiliser d'antibiotiques pour les infections virales.", "matiere": "Pharmacologie", "color": "#ea580c", "fichier": "pharmaabc"}, {"q": "Pourquoi les médicaments per os sont-ils souvent moins efficaces que par voie intraveineuse ?", "opts": ["Car ils sont dégradés par l'estomac uniquement", "Car ils subissent l'effet de premier passage hépatique : absorbés dans l'intestin → veine porte → foie → métabolisme partiel avant d'atteindre la circulation générale → biodisponibilité < 100%", "Car les intestins les bloquent", "Car le sang les dilue trop"], "a": 1, "exp": "Voie orale : absorption intestinale → veine porte → foie (enzymes CYP450) → métabolisme avant d'arriver dans le sang général (effet de premier passage hépatique). Certains médicaments ont un EPP très fort (morphine : biodisponibilité ~30%) → dose orale 3× dose IV. IV : directement dans le sang → biodisponibilité 100%, action immédiate. La voie sublinguale (trinitrine) évite l'EPP car drainage veineux cave.", "matiere": "Pharmacologie", "color": "#ea580c", "fichier": "pharmapk"}, {"q": "Pourquoi les vaccins à ARNm n'intègrent-ils pas l'ADN humain ?", "opts": ["Car l'ARNm est détruit avant d'entrer dans le noyau", "L'ARNm ne peut pas entrer dans le noyau (pas de séquence de localisation nucléaire) et ne contient pas de rétrotranscriptase → il est traduit dans le cytoplasme puis dégradé en quelques jours — l'information ne peut pas s'intégrer à l'ADN", "Car les ribosomes bloquent cette intégration", "Car l'ARNm est trop grand"], "a": 1, "exp": "Dogme central : ADN → ARN → protéine. L'intégration (ARN → ADN) nécessite une enzyme spéciale : la rétrotranscriptase (que les rétrovirus comme le VIH possèdent). Les vaccins ARNm n'en contiennent pas. De plus, l'ARNm reste dans le cytoplasme (pas de signal de transport nucléaire) et est dégradé en quelques jours par les ARNases normales de la cellule. L'ADN dans le noyau n'est jamais touché.", "matiere": "Pharmacologie", "color": "#ea580c", "fichier": "pharmapd"}, {"q": "Pourquoi les femmes naissent-elles avec tous leurs ovocytes déjà formés ?", "opts": ["Pour économiser de l'énergie", "L'ovogenèse commence pendant la vie fœtale et s'arrête — contrairement aux hommes qui produisent des spermatozoïdes en continu. Les ovocytes sont bloqués en prophase I dès la naissance et ne reprennent leur développement qu'à la puberté, un par cycle", "Car les ovaires ne peuvent pas produire de nouvelles cellules", "Pour éviter les mutations"], "a": 1, "exp": "Stock fixe à la naissance (~1-2 millions d'ovocytes bloqués en prophase I). À la puberté : chaque cycle, une cohorte de follicules est recrutée, un seul ovule est libéré. À la ménopause : stock épuisé → fin des cycles. Ce mécanisme explique pourquoi le risque d'anomalies chromosomiques augmente avec l'âge maternel : plus les ovocytes attendent, plus les erreurs s'accumulent.", "matiere": "Bio. Reproduction", "color": "#be185d", "fichier": "bioreprGametogenese"}, {"q": "Comment le test de grossesse urinaire détecte-t-il une grossesse aussi tôt ?", "opts": ["Il détecte les œstrogènes", "Il détecte la β-hCG (sous-unité β de la gonadotrophine chorionique humaine) produite par le syncytiotrophoblaste dès l'implantation de l'embryon (J8-9) — avant même le retard de règles", "Il détecte la progestérone", "Il détecte les spermatozoïdes"], "a": 1, "exp": "Implantation (J6-7) → syncytiotrophoblaste → hCG dès J8-9 → détectable dans les urines dès J10-12. hCG maintient le corps jaune → progestérone → pas de règles. Structure proche de LH → utilisé aussi pour déclencher l'ovulation en PMA. Doublement tous les 2 jours en début de grossesse = signe de bonne évolution. GEU : β-hCG positive mais embryon pas visible en utérus → urgence.", "matiere": "Bio. Reproduction", "color": "#be185d", "fichier": "bioreprFecondation"}, {"q": "Pourquoi l'acide folique doit-il être pris AVANT la grossesse et pas seulement après ?", "opts": ["Car il est toxique après la conception", "La fermeture du tube neural (qui deviendra la moelle épinière et le cerveau) se produit entre J22 et J28 — souvent avant que la femme sache qu'elle est enceinte. La carence en acide folique à ce moment précis cause le spina bifida", "Car les reins l'éliminent trop vite", "Car il est mieux absorbé à jeun"], "a": 1, "exp": "Tube neural se ferme à J26 (neuropore caudal). La plupart des femmes apprennent leur grossesse après J28. Si l'acide folique n'est pas disponible pendant cette fenêtre critique, le risque de spina bifida augmente. Recommandation : 0,4 mg/j dès le désir de grossesse (4 semaines avant la conception). Réduit le risque de malformations du tube neural de 70%.", "matiere": "Bio. Reproduction", "color": "#be185d", "fichier": "bioreprEmbryogenese"}, {"q": "Pourquoi les liaisons covalentes sont-elles plus solides que les liaisons hydrogène ?", "opts": ["Les liaisons covalentes impliquent l'eau", "Les liaisons covalentes impliquent un partage d'électrons (liaison forte, ~350 kJ/mol). Les liaisons hydrogène sont des attractions électrostatiques faibles (~20 kJ/mol) mais leur très grand nombre compense leur faiblesse individuelle", "Les liaisons hydrogène sont plus longues", "Les liaisons covalentes sont réversibles"], "a": 1, "exp": "Liaison covalente : partage de 2 électrons → liaison forte, difficile à rompre (C-C ~345 kJ/mol, O-H ~460 kJ/mol). Liaison hydrogène : attraction entre H δ+ d'un donneur (O-H, N-H) et un atome accepteur (O, N, F) δ- → ~10-40 kJ/mol. Mais dans l'ADN : 3 milliards de paires de bases × 2-3 LH chacune → somme considérable qui maintient la double hélice. En biochimie : LH = faibles individuellement, essentielles collectivement.", "matiere": "Chimie Générale", "color": "#818cf8", "fichier": "chimiegenliaisons"}, {"q": "Qu'est-ce qu'un acide faible et pourquoi est-ce important en biologie ?", "opts": ["Un acide qui ne réagit pas avec l'eau", "Un acide qui ne se dissocie que partiellement en solution (contrairement aux acides forts comme HCl). Ils forment des systèmes tampons (acide faible + sa base conjuguée) qui maintiennent le pH stable — essentiel pour le sang (pH 7,40 ± 0,05)", "Un acide dilué", "Un acide à haute température uniquement"], "a": 1, "exp": "Acide faible (CH₃COOH, H₂CO₃, H₂PO₄⁻, acides aminés) : Ka < 1 → équilibre entre forme acide et base conjuguée. Système tampon = mélange acide faible + base conjuguée → résiste aux variations de pH (loi de Henderson-Hasselbalch). Sang : tampon bicarbonate (H₂CO₃/HCO₃⁻) + protéines + phosphates. Si pH < 7,35 → acidose (convulsions, coma). Si pH > 7,45 → alcalose.", "matiere": "Chimie Générale", "color": "#818cf8", "fichier": "chimiegenacidebase"}, {"q": "Pourquoi les réactions de combustion libèrent-elles de l'énergie ?", "opts": ["Car elles nécessitent de l'eau", "Car les liaisons formées dans les produits (CO₂, H₂O) sont plus stables (plus d'énergie libérée à leur formation) que les liaisons rompues dans les réactifs — l'énergie libérée = différence entre énergie de formation des produits et énergie nécessaire pour rompre les réactifs", "Car la température augmente les liaisons", "Car l'oxygène est un catalyseur"], "a": 1, "exp": "Thermochimie : ΔH = énergie des liaisons rompues − énergie des liaisons formées. Si ΔH < 0 (exothermique) → libère de l'énergie. Combustion du glucose : C₆H₁₂O₆ + 6O₂ → 6CO₂ + 6H₂O + énergie (~2800 kJ/mol). Les liaisons C=O dans CO₂ et O-H dans H₂O sont très stables → beaucoup d'énergie libérée. C'est le même principe que la respiration cellulaire (glucose → CO₂ + H₂O + ATP).", "matiere": "Chimie Générale", "color": "#818cf8", "fichier": "chimiegenthermo"}, {"q": "Pourquoi les alcènes (avec une double liaison C=C) sont-ils plus réactifs que les alcanes ?", "opts": ["Car ils sont plus grands", "La double liaison C=C contient un nuage électronique π accessible aux réactifs électrophiles → addition électrophile (HBr, H₂O, Br₂) possible. Les alcanes n'ont que des liaisons σ solides → très peu réactifs (substitution radicalaire uniquement sous UV)", "Car ils ont plus d'hydrogènes", "Car ils sont liquides à température ambiante"], "a": 1, "exp": "Double liaison C=C : liaison σ (forte, dans l'axe) + liaison π (faible, nuage au-dessus/en-dessous). La liaison π est accessible → site riche en électrons → attire les électrophiles (E⁺). Réactions d'addition : Br₂ (colore en brun → test d'insaturation), HBr (règle de Markovnikov), H₂O/H⁺ (→ alcool). En chimie pharmaceutique : les doubles liaisons sont des sites réactifs importants pour les médicaments.", "matiere": "Chimie Organique", "color": "#16a34a", "fichier": "chimieorgareactions"}, {"q": "Pourquoi deux molécules peuvent-elles avoir la même formule brute mais des propriétés différentes ?", "opts": ["C'est impossible", "Elles sont des isomères : même nombre et type d'atomes mais arrangement spatial différent. Les isomères de constitution ont des liaisons différentes, les stéréoisomères (énantiomères, diastéréoisomères) ont la même connectivité mais une disposition spatiale différente — et peuvent avoir des effets biologiques totalement opposés", "Ce sont des allotropes", "Leurs masses molaires sont différentes"], "a": 1, "exp": "Isomérie = même formule brute, propriétés différentes. Exemples : éthanol et éther diméthylique (C₂H₆O, isomères de constitution) → l'un est alcool, l'autre éther. Thalidomide : énantiomère R = sédatif, énantiomère S = tératogène → catastrophe médicale. L'acide ibuprofen : énantiomère S = actif, R = inactif mais converti in vivo. En biologie : les enzymes reconnaissent spécifiquement un seul énantiomère (stéréosélectivité).", "matiere": "Chimie Organique", "color": "#16a34a", "fichier": "chimieorgastereo"}, {"q": "Quelle est la différence entre cellule procaryote et eucaryote ?", "opts": ["Les procaryotes ont un noyau membranaire", "Les procaryotes n'ont pas de noyau membranaire ni d'organites membraneux. Les eucaryotes ont un noyau délimité par une membrane, des mitochondries, un RE et un Golgi", "Les eucaryotes sont toujours unicellulaires", "Les procaryotes ont des mitochondries"], "a": 1, "exp": "Procaryotes (bactéries) : pas de noyau vrai, ADN circulaire libre dans le nucléoïde, ribosomes 70S, pas de mitochondries. Eucaryotes (animaux, plantes) : noyau membranaire, ADN linéaire, ribosomes 80S, mitochondries, RE, Golgi. Taille : procaryotes ~1-10 µm, eucaryotes ~10-100 µm.", "matiere": "Biologie Cellulaire", "color": "#7c3aed", "fichier": "biolcellcellule"}, {"q": "Quel organite produit l'ATP par respiration cellulaire ?", "opts": ["Le noyau", "La mitochondrie — via la phosphorylation oxydative sur la membrane interne (chaîne respiratoire + ATP synthase)", "Le ribosome", "Le lysosome"], "a": 1, "exp": "Mitochondrie : double membrane. Matrice = cycle de Krebs. Membrane interne = chaîne respiratoire + ATP synthase. 1 glucose = ~30-32 ATP. ADN mitochondrial circulaire (héritage maternel). Origine endosymbiotique.", "matiere": "Biologie Cellulaire", "color": "#7c3aed", "fichier": "biolcellorganites"}, {"q": "Quel est le rôle du réticulum endoplasmique rugueux (RER) ?", "opts": ["Dégrader les protéines mal repliées uniquement", "Synthèse et maturation des protéines destinées à être sécrétées, membranaires ou lysosomales. Les ribosomes fixés sur le RER injectent les protéines dans sa lumière pour maturation (N-glycosylation)", "Produire de l'ATP", "Synthétiser les lipides membranaires"], "a": 1, "exp": "RER (avec ribosomes) : protéines sécrétées (anticorps, hormones, enzymes digestives), membranaires et lysosomales. N-glycosylation dans le RER. Envoi au Golgi via vésicules COPII. REL (sans ribosomes) : synthèse lipides, détoxification (CYP450), stockage Ca++.", "matiere": "Biologie Cellulaire", "color": "#7c3aed", "fichier": "biolcellorganites"}, {"q": "Que fait l'appareil de Golgi ?", "opts": ["Synthétise l'ADN", "Reçoit les protéines du RER, les modifie (glycosylation, clivage), les trie et les envoie à leur destination : membrane plasmique, lysosomes (via M6P) ou sécrétion", "Produit les ribosomes", "Dégrade les acides gras"], "a": 1, "exp": "Golgi : centre de tri. Face cis (reçoit du RE), face trans (expédie). Modifications : O-glycosylation, phosphorylation mannose (M6P pour les lysosomes), clivages. Vésicules : COPI (rétrograde Golgi->RE), clathrine (Golgi->lysosomes), constitutives (Golgi->membrane).", "matiere": "Biologie Cellulaire", "color": "#7c3aed", "fichier": "biolcellorganites"}, {"q": "Quelles sont les 4 phases de la mitose dans le bon ordre ?", "opts": ["Interphase, métaphase, télophase, cytocinèse", "Prophase, Métaphase, Anaphase, Télophase (PMAT). Condensation → alignement équateur → séparation chromatides sœurs → décondensation + cytocinèse", "Métaphase, prophase, anaphase, télophase", "Prophase, anaphase, métaphase, télophase"], "a": 1, "exp": "PMAT : Prophase (condensation chromosomes, disparition enveloppe nucléaire, formation fuseau mitotique). Métaphase (chromosomes alignés sur la plaque équatoriale). Anaphase (séparation des chromatides sœurs vers les pôles). Télophase (reformation enveloppe, décondensation) + cytocinèse (2 cellules filles identiques 2n).", "matiere": "Biologie Cellulaire", "color": "#7c3aed", "fichier": "biolcellcycle"}, {"q": "Quelle est la différence entre mitose et méiose ?", "opts": ["Aucune différence", "Mitose : 1 cellule → 2 cellules identiques (2n→2n), pour croissance et réparation. Méiose : 1 cellule → 4 cellules haploïdes non identiques (2n→4 x n), pour reproduction sexuée", "Méiose produit des cellules plus grandes", "Mitose produit des gamètes"], "a": 1, "exp": "Mitose : division somatique. 1 division → 2 cellules filles diploïdes identiques. Méiose : cellules germinales. 2 divisions (I+II) → 4 cellules haploïdes. Crossing-over en prophase I = brassage génétique. Brassage interchromosomique en anaphase I. Résultat : diversité génétique des gamètes.", "matiere": "Biologie Cellulaire", "color": "#7c3aed", "fichier": "biolcellcycle"}, {"q": "Comment fonctionne le système CMH dans l'immunité ?", "opts": ["Le CMH produit des anticorps", "Le CMH présente des fragments protéiques aux lymphocytes T. CMH I (toutes cellules nucléées) + CD8 = 8 lettres. CMH II (CPA uniquement) + CD4 = 8 chiffres", "Le CMH détruit directement les virus", "Le CMH est une enzyme"], "a": 1, "exp": "CMH I : exprimé par toutes les cellules nucléées. Présente peptides endogènes aux LT CD8 (cytotoxiques). Si peptide viral/tumoral -> destruction. CMH II : sur CPA (macrophages, DC, LB). Présente peptides exogènes aux LT CD4 (auxiliaires). Règle mnémotechnique : CMH I + CD8 = 8 lettres. CMH II + CD4 = 6 lettres... mais on retient que I va avec 8 et II va avec 4.", "matiere": "Biologie Cellulaire", "color": "#7c3aed", "fichier": "biolcellimmunite"}, {"q": "Quelle est la structure de l'ADN ?", "opts": ["Simple brin circulaire", "Double hélice antiparallèle : 2 brins complémentaires. A s'apparie avec T (2 liaisons H), G avec C (3 liaisons H). Sucre = désoxyribose. Les deux brins sont antiparallèles (5 prime vers 3 prime d'un côté, 3 vers 5 de l'autre)", "Triple hélice", "Circulaire chez les eucaryotes"], "a": 1, "exp": "ADN double hélice (Watson et Crick, 1953) : 2 chaînes antiparallèles, liaisons H entre bases. Complémentarité : A-T (2 LH), G-C (3 LH). Règle de Chargaff : [A]=[T], [G]=[C]. Désoxyribose (pas d'OH en 2'). 10 paires de bases par tour d'hélice, pas = 3,4 nm.", "matiere": "Biologie Moléculaire", "color": "#0284c7", "fichier": "biolmolgenome"}, {"q": "Qu'est-ce que la réplication semi-conservative ?", "opts": ["Les 2 brins sont détruits et reconstruits", "Chaque brin parental sert de matrice pour un nouveau brin complémentaire. Chaque cellule fille reçoit 1 brin ancien + 1 nouveau brin", "Les 2 cellules filles reçoivent chacune 1 copie entièrement nouvelle", "Un seul brin est copié"], "a": 1, "exp": "Semi-conservative (Meselson et Stahl, 1958) : l'ADN se déroule, chaque brin sert de matrice. ADN polymérase synthétise le nouveau brin (5 vers 3 uniquement). Brin continu (leading) et brin discontinu (lagging, fragments d'Okazaki + amorce ARN). Fidélité : 1 erreur / 1 milliard de nucléotides.", "matiere": "Biologie Moléculaire", "color": "#0284c7", "fichier": "biolmolgenome"}, {"q": "Qu'est-ce que l'epissage alternatif ?", "opts": ["Une erreur de transcription", "Un même pre-ARNm peut donner plusieurs ARNm differents selon les exons inclus ou exclus → une seule proteine peut donner plusieurs isoformes. C'est pourquoi ~25 000 genes codent pour plus de 100 000 proteines", "L'epissage ajoute la coiffe en 5'", "C'est la fusion de deux genes differents"], "a": 1, "exp": "Epissage alternatif : le spliceosome peut joindre differents exons selon le tissu ou le contexte. Exemple : tropomyosine donne des isoformes differentes dans le muscle strie, lisse et le cerveau. Importance medicale : mutations des sites d'epissage causent des maladies (thalassemies, myopathies).", "matiere": "Biologie Moléculaire", "color": "#0284c7", "fichier": "biolmoltranscription"}, {"q": "Qu'est-ce que le dogme central de la biologie moleculaire ?", "opts": ["ADN → Proteines uniquement", "ADN → ARN (transcription) → Proteines (traduction). Information genetique circule dans ce sens. Exception : retrovirus (ARN → ADN via retrotranscriptase)", "ARN → ADN → Proteines", "Proteines → ARN → ADN"], "a": 1, "exp": "Dogme central (Francis Crick, 1958) : ADN → ARN → Proteine. Transcription (ADN→ARN, dans le noyau). Traduction (ARN→proteine, dans le cytoplasme). Exception : retrotranscriptase des retrovirus (VIH) : ARN → ADN. ARN interferent : ARNm → degradation. CRISPR : modification directe de l'ADN. Le flux inverse (proteine → ARN ou ADN) n'existe pas.", "matiere": "Biologie Moléculaire", "color": "#0284c7", "fichier": "biolmoltranscription"}, {"q": "Quelle est la difference entre glucide simple et complexe ?", "opts": ["Les simples ont plus de calories", "Les glucides simples (monosaccharides : glucose, fructose) sont des sucres unitaires absorbes directement. Les complexes (polysaccharides : amidon, glycogene) sont des chaines de monosaccharides", "Les complexes sont plus sucres", "Les simples ne contiennent pas de carbone"], "a": 1, "exp": "Monosaccharides (glucose, fructose, galactose) : unite de base. Disaccharides (saccharose, lactose, maltose) : 2 sucres. Polysaccharides : amidon (reserve vegetale, liaisons alpha 1-4), glycogene (reserve animale, plus ramifie), cellulose (paroi vegetale, liaisons beta 1-4, non digestible). Index glycemique = vitesse d'absorption.", "matiere": "Biochimie", "color": "#d97706", "fichier": "biochimiegluci"}, {"q": "Qu'est-ce que la glycolyse ?", "opts": ["La synthese du glucose dans le foie", "La degradation du glucose (6C) en 2 pyruvates (3C) dans le cytoplasme, produisant 2 ATP nets et 2 NADH. Se passe sans oxygene (anaerobie possible)", "La synthese des acides gras", "La degradation des proteines en acides amines"], "a": 1, "exp": "Glycolyse (cytoplasme) : glucose -> 2 pyruvates. Bilan net : 2 ATP + 2 NADH. En aerobie : pyruvate -> acetyl-CoA -> cycle de Krebs -> ~30-32 ATP total. En anaerobie : pyruvate -> lactate (muscles) ou ethanol (levures). 10 reactions. Enzyme cle : phosphofructokinase-1 (PFK-1) = point de regulation principal.", "matiere": "Biochimie", "color": "#d97706", "fichier": "biochimiegluci"}, {"q": "Quelle est la difference entre acide gras sature et insature ?", "opts": ["Les insatures ont plus d'atomes de carbone", "Les satures n'ont que des liaisons C-C simples (solides : beurre, graisses animales). Les insatures ont une ou plusieurs doubles liaisons C=C (liquides : huiles vegetales, omega-3/6)", "Les satures sont toujours bons pour la sante", "Les insatures contiennent de l'azote"], "a": 1, "exp": "Satures : chaine droite -> empilement dense -> solide (beurre, saindoux). Mono-insatures (1 double liaison, ex : acide oleique C18:1 dans l'huile d'olive). Poly-insatures (oméga-3 EPA/DHA dans les poissons, omega-6). Trans (margarines hydrogenees) : deleteres cardiovasculairement. Insatures ameliorent le profil lipidique (HDL↑, LDL↓).", "matiere": "Biochimie", "color": "#d97706", "fichier": "biochimielipides"}, {"q": "Comment l'enzyme perd-elle son activite en cas de chaleur excessive ?", "opts": ["Elle manque de substrat", "La chaleur rompt les liaisons faibles (hydrogene, Van der Waals, hydrophobes) maintenant la structure tertiaire -> denaturation -> site actif deformé -> enzyme inactive", "Elle se divise en deux", "Elle produit trop d'ATP"], "a": 1, "exp": "Enzymes : optimum ~37°C. T° trop haute -> denaturation (structure 2° et 3° destruites). Meme principe pour le pH : pepsine (pH~2), trypsine (pH~8), amylase salivaire (pH~7). Agents dénaturants : chaleur, pH extreme, urée, SDS, mercaptoéthanol. La structure primaire (sequence) est conservée, la fonction est perdue.", "matiere": "Biochimie", "color": "#d97706", "fichier": "biochimieenzymes"}, {"q": "Qu'est-ce qu'un epithelium et quelles sont ses caracteristiques ?", "opts": ["Un tissu avec beaucoup de matrice extracellulaire", "Tissu forme de cellules jointives, polarisees, sur une lame basale. Avasculaire. Fonctions : protection, absorption, secretion, sensation", "Un tissu uniquement vasculaire", "Un tissu qui produit de l'energie"], "a": 1, "exp": "Epithelium : cellules jointives (jonctions serrées, adherentes, desmosomes), polarite apico-basale, lame basale obligatoire, avasculaire (nourri par diffusion). Simple (1 couche) ou stratifie (plusieurs). Pavimenteux, cubique ou prismatique. Exemples : epiderme (stratifie pavimenteux keratinise), intestin (simple prismatique + microvillosites), trachee (pseudostratifie cilie).", "matiere": "Histologie", "color": "#db2777", "fichier": "histologieepithelium"}, {"q": "Quels sont les 3 types de muscles et leurs differences ?", "opts": ["Il n'y a qu'un seul type de muscle", "Muscle squelettique (strie, volontaire, plurinuclee), cardiaque (strie, involontaire, mononuclee, disques intercalaires, autorhythme), lisse (non strie, involontaire, mononuclee, visceres)", "Muscles rouge, blanc et jaune", "Muscles lents et rapides uniquement"], "a": 1, "exp": "Squelettique : fibres striees longues, multinucleees, volontaire, jonction neuromusculaire, contraction rapide, fatigable. Cardiaque : cellules mononucleees, striees, disques intercalaires (jonctions gap = syncytium), autorhythme (noeud sinusal), resistante a la fatigue. Lisse : cellules fusiformes, non striees, involontaire, visceres, vaisseaux, uterus.", "matiere": "Histologie", "color": "#db2777", "fichier": "histologiemusculaire"}, {"q": "Quelles sont les differentes cellules sanguines et leurs fonctions ?", "opts": ["Le sang ne contient que des globules rouges", "Erythrocytes (transport O2, hemoglobine, anuclees), leucocytes (defense immunitaire : neutrophiles, lymphocytes, monocytes, eosinophiles, basophiles), plaquettes (hemostase)", "Le sang contient uniquement du plasma", "Les plaquettes sont des cellules nucleees"], "a": 1, "exp": "GR (erythrocytes) : anuclees, biconcaves, hemoglobine, duree de vie ~120j. Leucocytes : PNN neutrophiles (phagocytose bactéries, 60%), lymphocytes (B=anticorps, T=immunite cellulaire, 30%), monocytes→macrophages, eosinophiles (parasites), basophiles (histamine). Plaquettes : fragments de megacaryocytes, hemostase primaire. Plasma : eau + albumine + fibrinogene + Ig.", "matiere": "Histologie", "color": "#db2777", "fichier": "histologiesang"}, {"q": "Comment le coeur cree-t-il son propre rythme ?", "opts": ["Le cerveau envoie un signal a chaque battement", "Le noeud sino-auriculaire (NSA) dans l'oreillette droite genere spontanement des potentiels d'action qui se propagent via le systeme de conduction (noeud AV, faisceau de His, fibres de Purkinje) -> contraction coordonnee", "Les muscles cardiaques se contractent au hasard", "L'adrenaline est necessaire a chaque battement"], "a": 1, "exp": "Automatisme cardiaque : NSA (60-100 bpm) -> noeud AV (40-60 bpm si NSA defaillant) -> faisceau de His -> branches D/G -> fibres de Purkinje -> ventricules. ECG : onde P (auriculaire), QRS (ventriculaire), onde T (repolarisation). Sympathique↑FC, parasympathique (nerf vague)↓FC.", "matiere": "Physiologie", "color": "#059669", "fichier": "physiocardio"}, {"q": "Comment les poumons echangent-ils les gaz avec le sang ?", "opts": ["Par transport actif uniquement", "Par diffusion passive selon les gradients de pression partielle : O2 passe de l'alveole (PO2 elevee) vers le sang. CO2 passe du sang vers l'alveole. Surface ~70-100 m², membrane tres fine (~0,5 µm)", "Par osmose", "Le sang pompe activement l'O2"], "a": 1, "exp": "Hematose (echanges alveolo-capillaires) : diffusion passive selon loi de Fick. O2 : alveole (100 mmHg) -> sang veineux (40 mmHg) -> se lie a l'Hb. CO2 : sang (46 mmHg) -> alveole (40 mmHg) -> expire. Surface alveolaire immense (~100 m²). Capacite de diffusion peut doubler a l'effort (recrutement capillaires pulmonaires).", "matiere": "Physiologie", "color": "#059669", "fichier": "physiorespir"}, {"q": "Quel est le role du rein dans l'equilibre hydrique ?", "opts": ["Le rein ne regule pas l'eau", "Le rein filtre le sang et reabsorbe selectivement l'eau selon les besoins. L'ADH (vasopressine) augmente la permeabilite a l'eau du tube collecteur -> retention si deshydratation. L'aldosterone regule le Na+ -> et secondairement l'eau", "Le rein elimine uniquement l'uree", "L'eau est reabsorbee uniquement dans le tube proximal"], "a": 1, "exp": "Rein : 180 L de filtrat/jour -> 1-2 L d'urine. Tube proximal : reabsorption 65% eau + Na+, glucose, AA. Anse de Henle : gradient osmotique medullaire. ADH (hypophyse posterieure) : si osmolarite↑ -> aquaporines 2 -> reabsorption eau. Aldosterone (cortex surrenalien) : si angiotensine II ou K+↑ -> reabsorption Na+.", "matiere": "Physiologie", "color": "#059669", "fichier": "physiorein"}, {"q": "Quelle est la difference entre agoniste et antagoniste ?", "opts": ["Ce sont des synonymes", "Agoniste : se fixe sur un recepteur ET l'active (mimétique du ligand naturel). Antagoniste : se fixe SANS activer et bloque l'agoniste naturel (competitif ou non competitif)", "L'agoniste detruit le recepteur", "L'antagoniste augmente l'effet"], "a": 1, "exp": "Agoniste complet : activite maximale (morphine sur recepteurs mu). Agoniste partiel : activite sous-maximale (buprenorphine). Antagoniste competitif : meme site, deplacable par exces d'agoniste (naloxone). Antagoniste non competitif : site allosterique, non deplacable. Agoniste inverse : effet oppose a l'agoniste naturel.", "matiere": "Pharmacologie", "color": "#ea580c", "fichier": "pharmapd"}, {"q": "Qu'est-ce que la biodisponibilite d'un medicament ?", "opts": ["La quantite totale ingéree", "La fraction de la dose qui atteint la circulation generale sous forme active. IV = 100% (reference). Orale < 100% a cause de l'absorption incomplete et de l'effet de premier passage hepatique", "La vitesse d'action", "Le volume de distribution"], "a": 1, "exp": "Biodisponibilite (F) = ASC orale / ASC IV x 100%. Effet premier passage hepatique : absorption intestinale -> veine porte -> foie -> metabolisme avant circulation generale. Morphine F~30%, aspirine F~60%, paracetamol F~80%. Voies sublinguale, rectale, transdermique evitent l'effet de premier passage.", "matiere": "Pharmacologie", "color": "#ea580c", "fichier": "pharmapk"}, {"q": "Comment les beta-bloquants agissent-ils sur le coeur ?", "opts": ["Ils augmentent la frequence cardiaque", "Ils bloquent les recepteurs beta-1 adrénergiques cardiaques -> diminuent la frequence cardiaque, la contractilite et la conduction AV. Utilises dans l'HTA, l'insuffisance cardiaque, les arythmies, l'angor", "Ils dilatent les arteres directement", "Ils augmentent la pression arterielle"], "a": 1, "exp": "Beta-bloquants (metoprolol, bisoprolol, propranolol) : antagonistes recepteurs B1 (coeur). Effets : FC diminuée (chronotrope negatif), contractilite diminuée (inotrope negatif), PA diminuée, consommation O2 myocardique diminuée. Indications : HTA, IC (benefique au long cours), angor, tachyarythmies, post-IDM. CI : asthme, BAV, choc cardiogenique.", "matiere": "Pharmacologie", "color": "#ea580c", "fichier": "pharmacardio"}, {"q": "Qu'est-ce qu'un AINS et comment agit-il ?", "opts": ["Un antibiotique", "Un Anti-Inflammatoire Non Steroidien qui inhibe les COX (cyclo-oxygenases) -> bloque la synthese des prostaglandines -> effets anti-inflammatoire, antalgique et antipyretique. Exemples : ibuprofene, aspirine", "Un antidepresseur", "Un medicament qui augmente les prostaglandines"], "a": 1, "exp": "AINS inhibent COX-1 (constitutive, protection gastrique, agregation plaquettaire) et/ou COX-2 (inductible, inflammation). Aspirine : inhibition irreversible -> antiagreagant plaquettaire definitif (7-10j). Ibuprofene, diclofenac : reversibles. Effets indesirables : ulcere gastroduodenal (COX-1), insuffisance renale, risque CV. CI : insuffisance renale, ulcere, grossesse T3.", "matiere": "Pharmacologie", "color": "#ea580c", "fichier": "pharmaneuro"}, {"q": "Qu'est-ce qu'un atome et de quoi est-il compose ?", "opts": ["Un atome est fait uniquement de protons", "Un atome est la plus petite unite d'un element. Il est compose d'un noyau (protons+ et neutrons) entoure d'electrons-. Z = nombre de protons. A = protons + neutrons", "Un atome est fait uniquement d'electrons", "Un atome ne peut pas se diviser"], "a": 1, "exp": "Noyau : protons (charge +, identité de l'element) + neutrons (neutres). Electrons (charge -) sur des orbitales. Z = numéro atomique = identite de l'element. A = nombre de masse = Z + N. Isotopes : meme Z, A different (meme element, masse differente). Electrons de valence = couche externe = reactivite chimique.", "matiere": "Chimie Générale", "color": "#818cf8", "fichier": "chimiegenatome"}, {"q": "Quelle est la difference entre liaison ionique et covalente ?", "opts": ["Ce sont des synonymes", "Ionique : transfert complet d'electrons entre metal et non-metal -> ions opposes attires (NaCl : Na+ et Cl-). Covalente : partage d'electrons entre non-metaux (H2O, CO2). Covalente polaire : partage inegal. Covalente apolaire : partage egal", "La liaison ionique est toujours plus forte", "La covalente implique des metaux"], "a": 1, "exp": "Ionique (difference electronegativite > 1,7) : transfert. Solides cristallins conducteurs en solution. Covalente : partage de 2 electrons. Simple (C-C), double (C=C), triple (C≡C). Polaire si différence EN > 0,4 (H2O, HCl, NH3). En biomolecules : covalentes (resistantes) + liaisons faibles (LH, Van der Waals) pour la structure.", "matiere": "Chimie Générale", "color": "#818cf8", "fichier": "chimiegenliaisons"}, {"q": "Qu'est-ce que le pH ?", "opts": ["pH = concentration en eau", "pH = -log[H3O+]. pH < 7 = acide. pH = 7 = neutre. pH > 7 = basique. Le pH du sang humain est maintenu a 7,40 +/- 0,05", "pH = concentration en sel", "pH = temperature de la solution"], "a": 1, "exp": "pH echelle 0-14. Acide fort (HCl) : pH~1. Acide faible (CH3COOH) : pH~3-5. Eau pure : pH=7. Base faible (NH3) : pH~9-11. Base forte (NaOH) : pH~13. En biologie : sang 7,35-7,45. Estomac ~1-2. Intestin ~7-8. Acidose : pH < 7,35. Alcalose : pH > 7,45.", "matiere": "Chimie Générale", "color": "#818cf8", "fichier": "chimiegenacidebase"}, {"q": "Qu'est-ce qu'une reaction exothermique vs endothermique ?", "opts": ["L'enthalpie est toujours positive", "Exothermique (delta H < 0) : libere de la chaleur, chauffe l'environnement (combustion, respiration cellulaire). Endothermique (delta H > 0) : absorbe de la chaleur, refroidit (photosynthese, dissolution de NH4Cl)", "Les reactions biologiques sont toujours endothermiques", "L'enthalpie mesure la vitesse de reaction"], "a": 1, "exp": "delta H = H produits - H reactifs. Exothermique (delta H<0) : combustion, neutralisation acide-base, respiration cellulaire. Endothermique (delta H>0) : photosynthese, cuisson d'un oeuf. delta G (enthalpie libre) = delta H - T.delta S -> delta G < 0 = reaction spontanee. Couplage ATP/ADP : reactions endothermiques couplees a l'hydrolyse ATP.", "matiere": "Chimie Générale", "color": "#818cf8", "fichier": "chimiegenthermo"}, {"q": "Quels sont les grands groupes fonctionnels en chimie organique ?", "opts": ["Il n'y a que les alcools", "Alcool (-OH), aldehyde (-CHO), cetone (C=O entre 2C), acide carboxylique (-COOH), amine (-NH2), ester (-COO-), amide (-CO-NH-), thiol (-SH). Chaque groupe determine les proprietes de la molecule", "Uniquement les acides et les bases", "Uniquement les alcools et les acides"], "a": 1, "exp": "Groupes fonctionnels = reactivite. -OH (alcool) : polaire, liaisons H. -COOH (acide carboxylique) : pKa~4-5. -NH2 (amine) : base faible, pKa~9-10. -C=O (carbonyle) : reactif. Ester (-COO-) : dans les lipides. Amide (-CO-NH-) : liaison peptidique des proteines. Thiol (-SH) : cysteine, ponts disulfure.", "matiere": "Chimie Organique", "color": "#16a34a", "fichier": "chimieorgafonctions"}, {"q": "Qu'est-ce qu'un enantiomere ?", "opts": ["Des molecules de taille differente", "Des molecules images miroir non superposables : meme formule, meme connectivite, mais configuration spatiale inverse autour d'un carbone asymetrique. Les enantiomeres peuvent avoir des activites biologiques radicalement differentes", "Des isomeres de constitution", "Des molecules avec des masses differentes"], "a": 1, "exp": "Chiralite : carbone sp3 avec 4 substituants differents. Notation R/S. Enantiomeres : proprietes physiques identiques (sauf pouvoir rotatoire). Proprietes biologiques differentes (enzymes et recepteurs sont chiraux). Thalidomide : R sedatif, S teratogene. Ibuprofene : S actif, R inactif. Medicaments racemiques = melange R+S.", "matiere": "Chimie Organique", "color": "#16a34a", "fichier": "chimieorgastereo"}, {"q": "Qu'est-ce qu'une reaction d'addition electrophile sur un alcene ?", "opts": ["Une reaction qui enleve des atomes", "La double liaison C=C reactive avec un electrophile qui s'additionne sur un carbone, puis un nucleophile s'additionne sur l'autre. La double liaison disparait -> liaison simple. Exemple : HBr sur propene (regle de Markovnikov)", "Une reaction de substitution", "Une reaction qui ne modifie pas la structure"], "a": 1, "exp": "Addition electrophile (AE) sur alcenes : 2 etapes. 1) Electrophile (H+, Br+) -> carbocation. 2) Nucleophile (Br-, OH-) attaque le carbocation. Regle de Markovnikov : H s'additionne sur le C le plus hydrogenee. Exemples : H2O/H+ -> alcool. HBr -> bromoalcane. Br2 -> dibromure (decoloration eau de brome = test d'insaturation).", "matiere": "Chimie Organique", "color": "#16a34a", "fichier": "chimieorgareactions"}, {"q": "Quelles sont les hormones principales du cycle menstruel ?", "opts": ["Une seule hormone controle le cycle", "FSH (developpement folliculaire), LH (pic -> ovulation + corps jaune), oestradiol (proliferation endometre, declenche pic LH), progestérone (preparation implantation). Chute progestérone -> menstruation", "Uniquement la progesterone", "Uniquement les oestrogenes"], "a": 1, "exp": "Cycle (~28j) : Phase folliculaire (J1-14) : FSH -> follicules -> oestradiol augmente -> endometre prolifere. Pic LH (J14) -> ovulation -> corps jaune. Phase luteale (J14-28) : corps jaune -> progestérone + oestradiol -> endometre secretoire. Si pas grossesse : corps jaune degenere -> chute hormonale -> menstruation J1. Si grossesse : hCG maintient corps jaune.", "matiere": "Bio. Reproduction", "color": "#be185d", "fichier": "bioreprGametogenese"}, {"q": "Comment se forment les jumeaux monozygotes et dizygotes ?", "opts": ["Les jumeaux sont toujours identiques", "Monozygotes (vrais jumeaux) : 1 ovule + 1 spermatozoide -> embryon se divise en 2 -> 2 individus genetiquement identiques. Dizygotes (faux jumeaux) : 2 ovules + 2 spermatozoïdes -> 2 individus differents (comme freres/soeurs)", "Les jumeaux ont toujours le meme sexe", "Les jumeaux viennent toujours d'une stimulation ovarienne"], "a": 1, "exp": "Monozygotes (~30% des grossesses gemeliaires) : meme genome -> meme groupe sanguin, meme sexe. Division precoce (<3j) -> bichorioniques. Division 4-8j -> monochorioniques/biamniotiques (placenta partage -> risque transfusion foeto-foetale). Siamois si division >13j. Dizygotes (70%) : peuvent etre de sexes differents. Risque augmente avec PMA.", "matiere": "Bio. Reproduction", "color": "#be185d", "fichier": "bioreprEmbryogenese"}, {"q": "Qu'est-ce que la mortalite et la morbidite ?", "opts": ["Ce sont des synonymes", "Mortalite : frequence des deces dans une population. Morbidite : frequence des maladies. Une maladie peut avoir forte morbidite mais faible mortalite (rhume) ou l'inverse (Ebola)", "La morbidite concerne uniquement les enfants", "La mortalite mesure uniquement les accidents"], "a": 1, "exp": "Mortalite : deces / population. Mortalite infantile : deces < 1 an / 1000 naissances. Esperance de vie : indicateur de developpement. Morbidite : charge de la maladie. Mesures : prevalence, incidence, DALY (Disability-Adjusted Life Years = annees de vie en bonne sante perdues). Indicateurs cles pour allouer les ressources de sante publique.", "matiere": "Statistiques & Santé Publique", "color": "#16a34a", "fichier": "passstatsepi"}, {"q": "Quelles sont les principales causes de mortalite mondiale ?", "opts": ["Les accidents uniquement", "Maladies cardiovasculaires (1ere cause mondiale), cancers (2eme), maladies respiratoires chroniques, infections (tuberculose, VIH, paludisme dans les pays a faibles revenus)", "Maladies infectieuses uniquement", "La malnutrition uniquement"], "a": 1, "exp": "Causes mondiales (OMS) : cardiovasculaires (~17 millions/an), cancers (~10 millions), respiratoires chroniques, infections basses, neonatales. Pays riches : maladies chroniques. Pays a faibles revenus : infectieuses (paludisme, tuberculose) + chroniques en augmentation. Covid-19 a cause directement et indirectement des millions de deces en 2020-2021.", "matiere": "Statistiques & Santé Publique", "color": "#16a34a", "fichier": "passstatssante"}, {"q": "Qu'est-ce qu'un facteur de confusion en epidemiologie ?", "opts": ["Un biais de mesure", "Une troisième variable associee a la fois a l'exposition et a la maladie, qui peut expliquer une association observee sans qu'il y ait de lien causal direct", "Une erreur de calcul statistique", "Un probleme d'echantillonnage"], "a": 1, "exp": "Facteur de confusion (confounder) : variable liee a l'exposition ET a la maladie, non dans la chaine causale. Exemple : les buveurs de cafe ont plus de cancers du poumon, mais c'est parce qu'ils fument davantage (tabac = facteur de confusion). Solutions : restriction, appariement, ajustement statistique, randomisation (ECR elimine les confondants).", "matiere": "Statistiques & Santé Publique", "color": "#16a34a", "fichier": "passstatsepi"}, {"q": "Qu'est-ce que la pyramide des preuves en recherche medicale ?", "opts": ["Une structure architecturale", "La hierarchie des types d'etudes selon leur niveau de preuve : opinion d'expert (bas) → serie de cas → cas-temoins → cohorte → essai randomise controle → meta-analyse (haut). Plus on monte, plus les resultats sont fiables", "Un diagramme de flux patient", "La classification des maladies par gravite"], "a": 1, "exp": "Pyramide des preuves (Evidence-Based Medicine) : du bas vers le haut : opinion d'expert, cas clinique, etude transversale, cas-temoins, cohorte, ECR, meta-analyse. Chaque niveau compense les biais du niveau inferieur. La meta-analyse combine tous les ECR disponibles -> meilleure estimation de l'effet. Mais qualite depend des etudes incluses (garbage in, garbage out).", "matiere": "Statistiques & Santé Publique", "color": "#16a34a", "fichier": "passstatslca"}, {"q": "Qu'est-ce que la sante selon l'OMS ?", "opts": ["L'absence de maladie uniquement", "Un etat de complet bien-etre physique, mental et social, et pas seulement l'absence de maladie ou d'infirmite. Definition adoptee en 1948, encore en vigueur", "La capacite a travailler", "L'absence de douleur"], "a": 1, "exp": "Definition OMS (1948) : sante = bien-etre physique + mental + social. Revolution conceptuelle : la sante n'est pas seulement l'absence de maladie mais un etat positif global. Critiques : definition utopique (personne n'est en parfaite sante), ne prend pas en compte la resilience. Charte d'Ottawa (1986) : promotion de la sante = donner aux individus les moyens de controler leur sante. Determinants sociaux = facteurs les plus influents.", "matiere": "Statistiques & Santé Publique", "color": "#16a34a", "fichier": "passstatsprevention"}, {"q": "Qu'est-ce que le taux de letalite d'une maladie infectieuse ?", "opts": ["Le nombre de personnes infectees", "La proportion de personnes infectees qui decedent de la maladie (deces / cas confirmes x 100%). Differencier de la mortalite (deces / population generale)", "La vitesse de propagation du virus", "Le nombre de jours avant la guerison"], "a": 1, "exp": "Taux de letalite (Case Fatality Rate, CFR) : deces / cas confirmes. Varie selon l'age, les comorbidites, le systeme de sante. Covid-19 : CFR ~1-2% globalement mais >10% chez les >80 ans. Grippe saisonniere : ~0,1%. Ebola : ~50-90%. CFR != Infection Fatality Rate (IFR) qui inclut les cas non confirmes (iceberg). Biais : CFR surestime si peu de tests (on ne compte que les cas graves).", "matiere": "Statistiques & Santé Publique", "color": "#16a34a", "fichier": "passstatsepi"}, {"q": "Qu'est-ce que l'evidence-based medicine (medecine basee sur les preuves) ?", "opts": ["Utiliser uniquement son experience clinique", "Integrer les meilleures preuves scientifiques disponibles, l'expertise clinique du medecin et les preferences du patient pour prendre des decisions therapeutiques. Les 3 piliers : preuves + expertise + patient", "Appliquer mecaniquement les recommandations", "Faire uniquement ce que les etudes disent"], "a": 1, "exp": "EBM (Sackett, 1996) : 3 piliers. 1) Meilleures preuves (meta-analyses, ECR). 2) Expertise clinique (experience du medecin, examen clinique). 3) Valeurs et preferences du patient. L'EBM ne remplace pas le jugement clinique : les recommandations sont des outils, pas des obligations. Un medecin peut s'en ecarter s'il le justifie. L'EBM combat le paternalisme medical et valorise le patient comme acteur de sa sante.", "matiere": "Statistiques & Santé Publique", "color": "#16a34a", "fichier": "passstatslca"}, {"q": "Qu'est-ce qu'une pandemie et comment se distingue-t-elle d'une epidemie ?", "opts": ["Ce sont des synonymes", "Epidemie : augmentation rapide du nombre de cas d'une maladie dans une region ou population donnee, au-dela du niveau habituel. Pandemie : epidemie mondiale touchant plusieurs pays ou continents simultanement (ex : Covid-19, grippe de 1918)", "Une pandemie est toujours plus mortelle", "Une epidemie touche uniquement les animaux"], "a": 1, "exp": "Endemie : presence habituelle d'une maladie dans une region (paludisme en Afrique tropicale). Epidemie : augmentation au-dela du niveau endemique (grippe saisonniere = epidemie hiver). Pandemie : propagation mondiale (Covid-19, grippe espagnole 1918, VIH). R0 (taux de reproduction de base) determine la propagation : R0 > 1 = expansion, R0 < 1 = extinction. Covid-19 : R0 initial ~2-3, variant Omicron : R0 ~8-10.", "matiere": "Statistiques & Santé Publique", "color": "#16a34a", "fichier": "passstatssante"}, {"q": "Pourquoi le depistage systematique n'est-il pas toujours benefique ?", "opts": ["Le depistage est toujours benefique", "Un depistage peut causer du tort : surdiagnostic (decouverte de maladies qui n'auraient jamais cause de symptomes), surtraitement, anxiete liee a des faux positifs, complications des examens diagnostiques. Il faut que le benefice depasse les risques", "Le depistage est trop coûteux", "Les patients refusent toujours le depistage"], "a": 1, "exp": "Depistage : benefice-risque a evaluer soigneusement. Surdiagnostic : PSA pour le cancer de la prostate (detection de cancers lents qui n'auraient jamais tue). Faux positifs : mammographie -> biopsies inutiles + anxiete. Faux negatifs : fausse reassurance. Principe : depistage utile si la maladie est grave, frequente, avec traitement precoce efficace, et test suffisamment sensible et specifique.", "matiere": "Statistiques & Santé Publique", "color": "#16a34a", "fichier": "passstatsepi"}, {"q": "Qu'est-ce que l'esperance de vie en bonne sante (EVBS) ?", "opts": ["L'age moyen au deces", "Le nombre d'annees qu'une personne peut esperer vivre en bonne sante (sans incapacite majeure), par opposition a l'esperance de vie totale qui inclut les annees vecues avec une maladie ou un handicap", "La duree de vie maximale", "Le nombre d'annees sans maladie chronique"], "a": 1, "exp": "EVBS (Healthy Life Years, HLY) : mesure la qualite de vie en plus de la quantite. France : esperance de vie totale ~85 ans pour les femmes, EVBS ~65 ans -> 20 ans en moyenne avec une incapacite. Ecart croissant entre les deux (progres medicaux maintiennent en vie mais pas toujours en bonne sante). Enjeu majeur : le vieillissement de la population. Objectif de sante publique : augmenter l'EVBS autant que l'esperance de vie totale.", "matiere": "Statistiques & Santé Publique", "color": "#16a34a", "fichier": "passstatssante"}, {"q": "Qu'est-ce que l'apoptose et en quoi est-elle differente de la necrose ?", "opts": ["Ce sont des synonymes", "Apoptose : mort cellulaire programmee et ordonnee (propre, pas d'inflammation). Necrose : mort cellulaire pathologique (explosive, inflammation). L'apoptose est essentielle au developpement embryonnaire et a l'elimination des cellules tumorales", "L'apoptose est toujours pathologique", "La necrose est toujours propre"], "a": 1, "exp": "Apoptose (mort programmee) : voie intrinseque (mitochondrie, cytochrome c -> caspases) ou extrinseque (recepteurs de mort FAS, TNF-R). Condensation chromatine, fragmentation ADN (echelle -> electrophorese), corps apoptotiques phagocytes sans inflammation. Necrose : mort pathologique (ischeemie, toxines) -> gonflement, lyse, liberation contenu cellulaire -> inflammation. Apoptose essentielle : morphogenese (disparition membrane interdigitale), elimination lymphocytes autoimmuns.", "matiere": "Biologie Cellulaire", "color": "#7c3aed", "fichier": "biolcellcycle"}, {"q": "Comment fonctionnent les antibiotiques de la famille des beta-lactamines ?", "opts": ["Ils detruisent la membrane des bacteries", "Ils inhibent la synthese de la paroi bacterienne en se fixant sur les PLP (proteines liant la penicilline) -> blocage des transpeptidases -> paroi fragilisee -> lyse osmotique. Actifs uniquement sur les bacteries (pas les cellules humaines qui n'ont pas de paroi)", "Ils bloquent la synthese des proteines bacteriennes", "Ils inhibent la replication de l'ADN bacterien"], "a": 1, "exp": "Beta-lactamines (penicillines, cephalosporines, carbapenemes) : inhibent la transpeptidation -> synthese peptidoglycane (paroi bacterienne) impossible -> bacteries se lysent. Specifiques aux bacteries (cellules humaines = pas de paroi). Mecanismes de resistance : beta-lactamases (enzymes qui hydrolyse le cycle beta-lactame -> BLSE, carbapenemases), modification des PLP (SARM : Staphylocoque Auree Resistant Methicilline). Association avec inhibiteur de beta-lactamase : amoxicilline + acide clavulanique.", "matiere": "Pharmacologie", "color": "#ea580c", "fichier": "pharmaabc"}];
var MATS=["Bio. Reproduction", "Biochimie", "Biologie Cellulaire", "Biologie Mol\u00e9culaire", "Chimie G\u00e9n\u00e9rale", "Chimie Organique", "Histologie", "Pharmacologie", "Physiologie", "Statistiques & Sant\u00e9 Publique"];
var COL={"Biochimie": "#d97706", "Biologie Cellulaire": "#7c3aed", "Biologie Mol\u00e9culaire": "#0284c7", "Bio. Reproduction": "#be185d", "Chimie G\u00e9n\u00e9rale": "#818cf8", "Chimie Organique": "#16a34a", "Histologie": "#db2777", "Pharmacologie": "#ea580c", "Physiologie": "#059669", "Statistiques & Sant\u00e9 Publique": "#16a34a"};
var sel=MATS.slice();
var ss={q:[],i:0,sc:0,ms:{}};

// Init boutons matières
var mg=document.getElementById('matGrid');
MATS.forEach(function(m){
  var b=document.createElement('button');
  b.className='mat-btn on';b.textContent=m;
  b.style.borderColor=COL[m];b.style.background=COL[m];b.style.color='#fff';
  b.onclick=function(){
    var x=sel.indexOf(m);
    if(x>-1&&sel.length>1){sel.splice(x,1);b.classList.remove('on');b.style.background='var(--surface)';b.style.color=COL[m];}
    else if(x===-1){sel.push(m);b.classList.add('on');b.style.background=COL[m];b.style.color='#fff';}
    upd();
  };
  mg.appendChild(b);
});

function upd(){
  var f=Q.filter(function(q){return sel.includes(q.matiere);});
  document.getElementById('stTotal').textContent=f.length;
  document.getElementById('stMat').textContent=sel.length;
}

// Stats sauvegardées
var sv=JSON.parse(localStorage.getItem('qcm_stats')||'{}');
if(sv.sc)document.getElementById('stScore').textContent=sv.sc;
if(sv.n)document.getElementById('stDone').textContent=sv.n;

function shuf(a){var b=a.slice();for(var i=b.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=b[i];b[i]=b[j];b[j]=t;}return b;}

function startQuiz(){
  var nb=parseInt(document.getElementById('nbSel').value);
  var pool=shuf(Q.filter(function(q){return sel.includes(q.matiere);}));
  if(nb<999)pool=pool.slice(0,nb);
  ss={q:pool,i:0,sc:0,ms:{}};
  MATS.forEach(function(m){ss.ms[m]={ok:0,tot:0};});
  show('quizView');renderQ();
}

function renderQ(){
  var q=ss.q[ss.i],tot=ss.q.length;
  document.getElementById('qMat').textContent=q.matiere;
  document.getElementById('qMat').style.color=q.color;
  document.getElementById('qNum').textContent=(ss.i+1)+' / '+tot;
  document.getElementById('qProg').style.width=Math.round(ss.i/tot*100)+'%';
  document.getElementById('qText').textContent=q.q;
  document.getElementById('qFb').className='fb';
  document.getElementById('qNxt').className='nxt';
  document.getElementById('qSb').textContent=ss.i>0?'Score : '+ss.sc+' / '+ss.i:'';
  var od=document.getElementById('qOpts');od.innerHTML='';
  q.opts.forEach(function(o,i){
    var b=document.createElement('button');b.className='opt';b.textContent=o;
    b.onclick=function(){ans(i);};od.appendChild(b);
  });
}

function ans(i){
  var q=ss.q[ss.i];
  document.querySelectorAll('.opt').forEach(function(b){b.disabled=true;});
  var ok=i===q.a;
  if(ok){ss.sc++;document.querySelectorAll('.opt')[i].classList.add('correct');}
  else{document.querySelectorAll('.opt')[i].classList.add('wrong');document.querySelectorAll('.opt')[q.a].classList.add('correct');}
  if(!ss.ms[q.matiere])ss.ms[q.matiere]={ok:0,tot:0};
  ss.ms[q.matiere].tot++;if(ok)ss.ms[q.matiere].ok++;
  var fb=document.getElementById('qFb');
  fb.textContent=(ok?'✓ Correct ! ':'✗ Incorrect. ')+q.exp;
  fb.className='fb show '+(ok?'ok':'ko');
  document.getElementById('qNxt').className='nxt show';
  document.getElementById('qSb').textContent='Score : '+ss.sc+' / '+(ss.i+1);
}

function nextQ(){ss.i++;if(ss.i>=ss.q.length)showRes();else renderQ();}

function showRes(){
  show('resultView');
  var pct=Math.round(ss.sc/ss.q.length*100);
  document.getElementById('rEmoji').textContent=pct>=80?'🏆':pct>=60?'💪':'📚';
  document.getElementById('rScore').textContent=ss.sc+' / '+ss.q.length;
  document.getElementById('rSub').textContent=pct+'% · '+ss.q.length+' questions';
  var h='';
  MATS.forEach(function(m){
    var ms=ss.ms[m];if(!ms||ms.tot===0)return;
    var p=Math.round(ms.ok/ms.tot*100);
    h+='<div class="res-row"><div class="res-mat" style="color:'+COL[m]+'">'+m+'</div><div class="res-track"><div class="res-fill" style="width:'+p+'%;background:'+COL[m]+'"></div></div><div class="res-pct">'+p+'%</div></div>';
  });
  document.getElementById('rBars').innerHTML=h;
  var sv2=JSON.parse(localStorage.getItem('qcm_stats')||'{}');
  sv2.sc=ss.sc+'/'+ss.q.length+' ('+pct+'%)';sv2.n=(sv2.n||0)+1;
  localStorage.setItem('qcm_stats',JSON.stringify(sv2));
}

function retry(){show('setupView');var sv3=JSON.parse(localStorage.getItem('qcm_stats')||'{}');if(sv3.sc)document.getElementById('stScore').textContent=sv3.sc;if(sv3.n)document.getElementById('stDone').textContent=sv3.n;upd();}

function show(id){['setupView','quizView','resultView'].forEach(function(v){document.getElementById(v).style.display=v===id?'block':'none';});}
</script>
</body>
</html>
