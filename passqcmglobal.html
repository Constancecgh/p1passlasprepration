e prostate, endométriose, PMA (blocage avant stimulation contrôlée), bloqueurs de puberté. Effet réversible à l'arrêt.", "matiere": "Bio. Reproduction", "color": "#be185d", "fichier": "bioreprGametogenese"}, {"q": "Le syndrome de Klinefelter (47,XXY) cause une infertilité car :", "opts": ["Il manque un chromosome Y", "Le chromosome X supplémentaire perturbe la spermatogenèse → azoospermie — les tubules séminifères dégénèrent (hyalinisation)", "Il provoque une absence de testostérone", "Il bloque la méiose des ovocytes"], "a": 1, "exp": "Klinefelter (47,XXY) : 1/1000 hommes (cause génétique la plus fréquente d'infertilité masculine). X supplémentaire → dégénérescence des tubes séminifères → azoospermie sécrétoire. Cellules de Leydig parfois fonctionnelles → testostérone peut être basse ou normale. Dans 50% des cas : spermatozoïdes trouvables directement dans le testicule par biopsie → ICSI. Phénotype : grande taille, petits testicules, gynécomastie.", "matiere": "Bio. Reproduction", "color": "#be185d", "fichier": "bioreprGametogenese"}, {"q": "La principale fonction endocrine du placenta en début de grossesse est :", "opts": ["La synthèse d'insuline", "La synthèse de hCG qui maintient le corps jaune → production de progestérone → maintien de la grossesse jusqu'à ce que le placenta prenne le relais (vers 10-12 SA)", "La synthèse de TSH", "La synthèse de cortisol fœtal"], "a": 1, "exp": "hCG (syncytiotrophoblaste) : analogue à LH → maintien du corps jaune → progestérone → endomètre intact → pas de menstruation. Entre 10-12 SA, le placenta sécrète lui-même assez de progestérone → corps jaune peut régresser sans risque (lutéo-placentaire shift). hPL : insulinorésistance maternelle → glucose vers le fœtus. Œstrogènes placentaires : synthèse à partir des précurseurs androgènes surrénaliens fœtaux.", "matiere": "Bio. Reproduction", "color": "#be185d", "fichier": "bioreprGrossesse"}, {"q": "La surveillance de la grossesse en France comprend notamment :", "opts": ["Une seule échographie à 22 SA", "3 échographies obligatoires (11-13 SA, 22 SA, 32 SA) + dépistage combiné T1 trisomie 21 + sérologies + HGPO à 24-28 SA", "Un caryotype fœtal systématique", "Uniquement des prises de sang mensuelles"], "a": 1, "exp": "3 échographies obligatoires remboursées : T1 (11-13 SA : clarté nucale + datation) + T2 (22 SA : morphologie fœtale complète) + T3 (32 SA : croissance + Doppler). Dépistage combiné T1 : clarté nucale + β-hCG + PAPP-A → risque trisomie 21. Si risque > 1/50 → DPNI ou amniocentèse. HGPO 75g à 24-28 SA : dépistage diabète gestationnel (DG).", "matiere": "Bio. Reproduction", "color": "#be185d", "fichier": "bioreprGrossesse"}, {"q": "L'accouchement est déclenché notamment par :", "opts": ["La chute de la hCG uniquement", "Les prostaglandines (maturation cervicale) + l'ocytocine (contractions + réflexe de Ferguson) + le cortisol fœtal (signal de maturité) — mécanismes encore partiellement inconnus", "La progestérone qui augmente", "Le calcium maternel qui chute"], "a": 1, "exp": "Déclenchement du travail : multi-factoriel. Estrogènes ↑ + progestérone ↓ → sensibilité à l'ocytocine ↑. Cortisol fœtal (maturité) → conversion progestérone → œstrogènes dans le placenta. Prostaglandines → maturation (effacement) du col → oxytocine → contractions → réflexe de Ferguson (pression tête sur col → ↑ ocytocine) = rétrocontrôle positif rare en physiologie.", "matiere": "Bio. Reproduction", "color": "#be185d", "fichier": "bioreprGrossesse"}, {"q": "À la naissance, la fermeture du foramen ovale est déclenchée par :", "opts": ["L'injection d'ocytocine", "La 1ère inspiration → ↓ résistances pulmonaires → ↑ retour veineux pulmonaire → ↑ pression OG > OD → valve du foramen ovale s'applique et se ferme fonctionnellement", "La coupure du cordon ombilical", "La montée du CO₂ néonatal"], "a": 1, "exp": "Circulation fœtale : foramen ovale (OD→OG, bypass des poumons) + canal artériel (AP→Ao, bypass des poumons). Naissance → 1ère inspiration → résistances pulmonaires ↓ → débit pulmonaire ↑ → ↑ pression OG → OG > OD → valve foramen ovale se ferme. ↑ PO₂ → canal artériel se ferme (contraction des muscles lisses en quelques heures). PCA du prématuré : canal artériel ne se ferme pas → shunt gauche-droite → surcharge pulmonaire → AINS (ibuprofène) ou chirurgie.", "matiere": "Bio. Reproduction", "color": "#be185d", "fichier": "bioreprGrossesse"}, {"q": "La prééclampsie est une urgence obstétricale car :", "opts": ["Elle n'est jamais grave", "Elle peut évoluer vers le syndrome HELLP (hémolyse + cytolyse hépatique + thrombopénie) et l'éclampsie (convulsions) → menace vitale maternelle et fœtale → déclenchement urgent de l'accouchement", "Elle guérit spontanément", "Elle est due à une infection bactérienne"], "a": 1, "exp": "Prééclampsie : dysfonction endothéliale systémique → HTA + protéinurie après 20 SA. Formes sévères : HELLP syndrome (hémolyse mécanique + cytolyse hépatique + plaquettes < 100G/L) → coagulopathie, hématome sous-capsulaire hépatique (risque de rupture). Éclampsie = convulsions → morbidité neurologique. Seul traitement définitif = accouchement. Anti-HTA (nicardipine, labetalol) + sulfate de magnésium (prévention convulsions) en attendant.", "matiere": "Bio. Reproduction", "color": "#be185d", "fichier": "bioreprGrossesse"}, {"q": "Le bilan d'infertilité féminine comprend en 1ère intention :", "opts": ["Une FIV directement", "Bilan hormonal (FSH, LH, AMH, estradiol) + échographie pelvienne (CFA, utérus) + hystérosalpingographie (perméabilité tubaire) + bilan infectieux (Chlamydia)", "Un caryotype systématique", "Une biopsie ovarienne"], "a": 1, "exp": "Bilan infertilité féminin de 1ère intention : hormonal (J2-3 du cycle : FSH, LH, E2, AMH = réserve ovarienne, prolactine, TSH) + écho pelvienne (CFA = compte follicules antraux = réserve ovarienne, utérus) + HSG (trompes + cavité utérine) + sérologie Chlamydia. Chez l'homme : spermogramme/spermocytogramme en même temps. Bilan à commencer dès 12 mois d'infertilité (6 mois si > 35 ans).", "matiere": "Bio. Reproduction", "color": "#be185d", "fichier": "bioreprPathologies"}, {"q": "La FIV-ICSI est indiquée notamment en cas de :", "opts": ["Trompes imperméables sans anomalie du sperme", "Oligo-asthéno-tératospermie (OAT) sévère ou azoospermie avec prélèvement chirurgical — injection directe d'un spermatozoïde dans l'ovocyte contourne les étapes de capacitation et de pénétration de la zone pellucide", "Infertilité inexpliquée modérée", "Anovulation isolée"], "a": 1, "exp": "ICSI : injection intracytoplasmique de spermatozoïde. Indiquée si : OAT sévère (< 1 million de spermatozoïdes mobiles), azoospermie (0 spermatozoïde dans l'éjaculat → prélèvement chirurgical testiculaire), échec de FIV conventionnelle (pas de fécondation). Même taux de succès que la FIV classique (~25-30% par transfert). En France depuis 2021 : PMA ouverte aux femmes seules et couples de femmes → don de sperme le plus souvent.", "matiere": "Bio. Reproduction", "color": "#be185d", "fichier": "bioreprPathologies"}, {"q": "L'hyperprolactinémie cause une aménorrhée en :", "opts": ["Augmentant la FSH", "Inhibant la sécrétion pulsatile de GnRH → ↓ FSH et LH → anovulation → aménorrhée. Aussi : galactorrhée (production de lait hors allaitement)", "Causant une insuffisance ovarienne", "Bloquant les récepteurs de l'œstradiol"], "a": 1, "exp": "Prolactine normale : stimule la lactation + inhibe légèrement la GnRH. Hyperprolactinémie : inhibition forte de la GnRH pulsatile → anovulation + aménorrhée + galactorrhée (triade). Causes : prolactinome (adénome hypophysaire → IRM hypophysaire), médicaments (antagonistes dopaminergiques : antipsychotiques, métoclopramide), hypothyroïdie (TRH stimule aussi la prolactine). Traitement : cabergoline (agoniste dopaminergique D2) → ↓ prolactine.", "matiere": "Bio. Reproduction", "color": "#be185d", "fichier": "bioreprPathologies"}, {"q": "La mifépristone (RU486) est un antiprogestérone qui agit en :", "opts": ["Inhibant l'aromatase", "Bloquant les récepteurs de la progestérone → déciduolyse (destruction de l'endomètre décidual) + assouplissement du col + sensibilité utérine aux prostaglandines → combinée au misoprostol → IVG médicamenteuse efficace dans > 95% des cas jusqu'à 9 SA", "Stimulant les contractions directement", "Bloquant la FSH hypophysaire"], "a": 1, "exp": "Mifépristone : modulateur sélectif des récepteurs à la progestérone (SPRM). Progestérone normalement nécessaire au maintien de la grossesse → mifépristone bloque ce signal → déciduolyse → séparation embryon/utérus + col s'amollit. Misoprostol (prostaglandine E1 analogue) 24-48h après → contractions → expulsion. Protocole validé jusqu'à 9 SA en médecine de ville, 12 SA en établissement.", "matiere": "Bio. Reproduction", "color": "#be185d", "fichier": "bioreprPathologies"}, {"q": "La transmission mère-enfant (TME) du VIH est réduite à < 1% grâce à :", "opts": ["La vaccination VIH", "Le traitement antirétroviral (TARV) pendant la grossesse + à l'accouchement + traitement prophylactique du nourrisson — la charge virale indétectable élimine quasiment la transmission", "L'allaitement maternel", "Une alimentation spéciale"], "a": 1, "exp": "TME VIH sans traitement : 20-30% (in utero, accouchement, allaitement). Avec TARV + charge virale indétectable : TME < 1%. Protocole : TARV dès le début de grossesse, objectif charge virale indétectable avant accouchement. Accouchement par voie basse si charge virale < 50 copies/mL (sinon césarienne). Traitement prophylactique du nourrisson (AZT ou névirapine) pendant 4-6 semaines. Pas d'allaitement (sauf dans les pays à faibles ressources où la balance bénéfice/risque est différente).", "matiere": "Bio. Reproduction", "color": "#be185d", "fichier": "bioreprPathologies"}, {"q": "Selon Brønsted-Lowry, un acide est :", "opts": ["Un accepteur de proton H⁺", "Un donneur de proton H⁺", "Un accepteur de doublet électronique", "Une espèce chargée positivement"], "a": 1, "exp": "Acide de Brønsted-Lowry = donneur de H⁺. Base = accepteur de H⁺. Chaque acide a une base conjuguée (l'acide sans son H⁺). Ex : CH₃COOH (acide) / CH₃COO⁻ (base conjuguée).", "matiere": "Chimie Générale", "color": "#818cf8", "fichier": "chimiegenacidebase"}, {"q": "Le pH sanguin normal est de :", "opts": ["6,8–7,0", "7,35–7,45", "7,5–8,0", "6,0–6,5"], "a": 1, "exp": "pH sanguin = 7,35–7,45 (légèrement alcalin). Acidose si pH < 7,35, alcalose si pH > 7,45. Une variation de 0,1 unité de pH est cliniquement significative — peut induire des troubles cardiaques et neurologiques.", "matiere": "Chimie Générale", "color": "#818cf8", "fichier": "chimiegenacidebase"}, {"q": "Quand [A⁻] = [HA] dans un tampon, alors :", "opts": ["pH = 0", "pH = pKa (d'après Henderson-Hasselbalch)", "pH = 7", "pH = 14"], "a": 1, "exp": "pH = pKa + log([A⁻]/[HA]). Si [A⁻] = [HA] → log(1) = 0 → pH = pKa. C'est la zone de tampon maximale (capacité de tamponner maximale à ± 1 unité de pH autour du pKa).", "matiere": "Chimie Générale", "color": "#818cf8", "fichier": "chimiegenacidebase"}, {"q": "Le principal tampon du plasma sanguin est :", "opts": ["Le tampon phosphate (pKa = 6,8)", "Le tampon bicarbonate (HCO₃⁻/H₂CO₃, pKa = 6,1) régulé par poumons et reins", "Le tampon protéines uniquement", "Le tampon lactate/acide lactique"], "a": 1, "exp": "Bicarbonate = tampon principal du plasma (même si pKa = 6,1 est loin de 7,4, sa grande concentration et la régulation respiratoire/rénale en font le plus important). Équation : pH = 6,1 + log([HCO₃⁻]/0,03×PCO₂).", "matiere": "Chimie Générale", "color": "#818cf8", "fichier": "chimiegenacidebase"}, {"q": "Une solution de HCl 0,01 M a un pH de :", "opts": ["2", "7", "12", "4"], "a": 0, "exp": "HCl est un acide fort (totalement dissocié) → [H⁺] = 0,01 M = 10⁻² M → pH = −log(10⁻²) = 2. Pour une base forte NaOH 0,01 M : [OH⁻] = 0,01 → pOH = 2 → pH = 14 − 2 = 12.", "matiere": "Chimie Générale", "color": "#818cf8", "fichier": "chimiegenacidebase"}, {"q": "En alcalose respiratoire (hyperventilation), le PCO₂ :", "opts": ["Augmente → pH diminue", "Diminue → pH augmente → alcalose", "Reste stable", "Augmente → HCO₃⁻ augmente"], "a": 1, "exp": "Hyperventilation → ↓ PCO₂ → H₂CO₃ ↓ → H⁺ ↓ → pH ↑ → alcalose respiratoire. Compensation rénale : excrétion de HCO₃⁻ → pH redescend progressivement.", "matiere": "Chimie Générale", "color": "#818cf8", "fichier": "chimiegenacidebase"}, {"q": "Le point isoélectrique (pI) d'un acide aminé est le pH auquel :", "opts": ["Il est totalement chargé positivement", "Il est sous forme zwitterion neutre (charge globale nulle)", "Il ne se dissout pas dans l'eau", "Il est totalement chargé négativement"], "a": 1, "exp": "Au pI, l'AA est sous forme zwitterion : +H₃N-CHR-COO⁻ (doublement chargé mais neutre). À pH < pI : protonation → charge positive. À pH > pI : déprotonation → charge négative. Utilisé en électrophorèse pour séparer les protéines.", "matiere": "Chimie Générale", "color": "#818cf8", "fichier": "chimiegenacidebase"}, {"q": "Un atome de carbone ¹²C (Z=6, A=12) possède :", "opts": ["6 protons, 6 neutrons, 6 électrons", "6 protons, 12 neutrons, 6 électrons", "12 protons, 6 neutrons, 12 électrons", "6 protons, 6 neutrons, 12 électrons"], "a": 0, "exp": "Z=6 → 6 protons. Neutrons = A-Z = 12-6 = 6. Atome neutre → électrons = protons = 6. Le ¹⁴C a 6p + 8n (isotope radioactif utilisé en datation).", "matiere": "Chimie Générale", "color": "#818cf8", "fichier": "chimiegenatome"}, {"q": "La configuration électronique de l'azote (Z=7) est :", "opts": ["1s² 2s² 2p⁵", "1s² 2s² 2p³", "1s² 2s⁴ 2p¹", "1s² 2s² 2p² 3s¹"], "a": 1, "exp": "N (Z=7) : 1s²(2) + 2s²(4) + 2p³(7). Les 3 électrons 2p occupent 3 orbitales séparées (règle de Hund) → valence 3. L'azote peut former 3 liaisons (NH₃) ou 4 si chargé (NH₄⁺).", "matiere": "Chimie Générale", "color": "#818cf8", "fichier": "chimiegenatome"}, {"q": "L'électronégativité dans le tableau périodique :", "opts": ["Augmente en descendant et de droite à gauche", "Augmente en montant et de gauche à droite (max = Fluor)", "Est identique dans un même groupe", "Ne varie pas avec la position"], "a": 1, "exp": "Électronégativité ↑ en montant dans un groupe (moins d'écrantage) et ↑ de gauche à droite (Z augmente). Fluor = plus électronégatif (4,0). Important pour prévoir la polarité des liaisons.", "matiere": "Chimie Générale", "color": "#818cf8", "fichier": "chimiegenatome"}, {"q": "Les atomes CHNOPS sont essentiels en biochimie car :", "opts": ["Ce sont les plus lourds", "Ils constituent 99% des biomolécules (ADN, protéines, lipides)", "Ils sont tous radioactifs", "Ils forment uniquement des liaisons ioniques"], "a": 1, "exp": "CHNOPS (Carbone, Hydrogène, Azote, Oxygène, Phosphore, Soufre) = 99% des molécules du vivant. C (valence 4) = squelette carboné. N et O = fonctions chimiques. P = ADN + ATP. S = ponts disulfure des protéines.", "matiere": "Chimie Générale", "color": "#818cf8", "fichier": "chimiegenatome"}, {"q": "La spectrophotométrie à 260 nm est utilisée pour doser :", "opts": ["Les protéines", "Les lipides", "L'ADN et l'ARN (bases azotées absorbent à 260 nm)", "Le glucose"], "a": 2, "exp": "Bases azotées (A, T, G, C, U) absorbent à 260 nm. Protéines (tryptophane, tyrosine) absorbent à 280 nm. Rapport DO260/DO280 > 1,8 → ADN pur. < 1,8 → contamination protéique. Fondamental en biologie moléculaire.", "matiere": "Chimie Générale", "color": "#818cf8", "fichier": "chimiegenatome"}, {"q": "Deux isotopes d'un même élément ont :", "opts": ["Le même nombre de neutrons", "Le même nombre de protons (Z) mais des nombres de neutrons différents", "Des propriétés chimiques très différentes", "Des masses atomiques identiques"], "a": 1, "exp": "Isotopes = même Z (même élément, mêmes propriétés chimiques) + A différent (neutrons différents). ¹²C et ¹⁴C : mêmes réactions chimiques, mais ¹⁴C est radioactif (noyau instable car trop de neutrons).", "matiere": "Chimie Générale", "color": "#818cf8", "fichier": "chimiegenatome"}, {"q": "La liaison O–H dans l'eau est covalente polaire car :", "opts": ["O et H ont la même électronégativité", "O est beaucoup plus électronégatif que H → les électrons sont attirés vers O → dipôle δ−O···Hδ+", "H est plus électronégatif que O", "La liaison est ionique à haute température"], "a": 1, "exp": "O (EN=3,44) >> H (EN=2,20) → ΔEN = 1,24 → liaison polaire. Les électrons partagés sont plus proches de O. Cette polarité permet les liaisons hydrogène → propriétés uniques de l'eau.", "matiere": "Chimie Générale", "color": "#818cf8", "fichier": "chimiegenliaisons"}, {"q": "La liaison ionique se forme quand :", "opts": ["Deux atomes partagent des électrons", "Un atome transfère complètement un électron à un autre (ΔEN > 1,7)", "Deux atomes s'attirent par dipôles instantanés", "Un atome perd tous ses électrons"], "a": 1, "exp": "Liaison ionique = transfert complet d'électron → deux ions de charges opposées. NaCl : Na → Na⁺ (cède 1e⁻), Cl → Cl⁻ (gagne 1e⁻). Dans l'eau : dissociation en ions → conductivité électrique.", "matiere": "Chimie Générale", "color": "#818cf8", "fichier": "chimiegenliaisons"}, {"q": "Les liaisons hydrogène G–C dans l'ADN sont au nombre de :", "opts": ["1", "2", "3", "4"], "a": 2, "exp": "G–C : 3 liaisons H (plus stables). A–T : 2 liaisons H. Les régions riches en GC sont plus stables thermiquement (Tm plus élevée). Utilisé en PCR : une température d'hybridation élevée cible des régions à fort %GC.", "matiere": "Chimie Générale", "color": "#818cf8", "fichier": "chimiegenliaisons"}, {"q": "La géométrie de H₂O (2 liaisons, 2 doublets libres) est :", "opts": ["Linéaire (180°)", "Tétraédrique (109,5°)", "Coudée (104,5°)", "Pyramidale (107°)"], "a": 2, "exp": "H₂O : 2 liaisons O–H + 2 doublets libres → géométrie coudée (104,5°, légèrement moins que tétraédrique car doublets libres repoussent plus). Cette géométrie + polarité → molécule polaire → solvant universel du vivant.", "matiere": "Chimie Générale", "color": "#818cf8", "fichier": "chimiegenliaisons"}, {"q": "L'effet hydrophobe est principalement responsable de :", "opts": ["La liaison covalente des protéines", "Le repliement des protéines (résidus apolaires s'enfouissent) et la formation des bicouches lipidiques", "La solubilité des sucres dans l'eau", "La formation des liaisons peptidiques"], "a": 1, "exp": "Effet hydrophobe = moteur principal du repliement des protéines (core hydrophobe) et de l'auto-assemblage des membranes lipidiques. Ce n'est pas une liaison mais une tendance thermodynamique (augmentation d'entropie du solvant).", "matiere": "Chimie Générale", "color": "#818cf8", "fichier": "chimiegenliaisons"}, {"q": "Le carbone sp2 (hybridation sp2) forme :", "opts": ["4 liaisons simples (alcane)", "1 liaison double + 2 liaisons simples — géométrie plane (120°)", "1 liaison triple + 1 liaison simple — géométrie linéaire", "3 liaisons simples + 1 doublet libre"], "a": 1, "exp": "Carbone sp2 : 3 orbitales sp2 dans un plan (120°) + 1 orbitale p perpendiculaire qui forme la liaison π de la double liaison. Exemples : alcènes (C=C), groupement carbonyle (C=O), noyau aromatique (benzène).", "matiere": "Chimie Générale", "color": "#818cf8", "fichier": "chimiegenliaisons"}, {"q": "Une molécule polaire est soluble dans l'eau car :", "opts": ["Elle est plus lourde", "Like dissolves like : molécule polaire se dissout dans solvant polaire (interactions dipôle-dipôle et liaisons H avec l'eau)", "L'eau est un mauvais solvant pour les apolaires", "La polarité augmente la taille moléculaire"], "a": 1, "exp": "Solubilité : molécules polaires (sucres, acides aminés chargés, ions) → solubles dans l'eau (liaisons H + interactions ion-dipôle). Molécules apolaires (lipides, alcanes) → insolubles dans l'eau, solubles dans les solvants organiques apolaires.", "matiere": "Chimie Générale", "color": "#818cf8", "fichier": "chimiegenliaisons"}, {"q": "À pression constante, la chaleur échangée est égale à :", "opts": ["ΔU (variation d'énergie interne)", "ΔH (variation d'enthalpie)", "ΔG (énergie de Gibbs)", "ΔS (variation d'entropie)"], "a": 1, "exp": "À pression constante : Q_p = ΔH. C'est pour ça qu'on utilise l'enthalpie (pas l'énergie interne) en chimie — la plupart des réactions biologiques se font à pression atmosphérique constante.", "matiere": "Chimie Générale", "color": "#818cf8", "fichier": "chimiegenthermo"}, {"q": "Une réaction exothermique a :", "opts": ["ΔH > 0 (absorbe de la chaleur)", "ΔH < 0 (libère de la chaleur)", "ΔH = 0", "ΔG > 0"], "a": 1, "exp": "Exothermique = libère de la chaleur → ΔH < 0 (le système perd de l'énergie thermique). Endothermique = absorbe la chaleur → ΔH > 0. La combustion du glucose (ΔH = −2803 kJ/mol) est fortement exothermique.", "matiere": "Chimie Générale", "color": "#818cf8", "fichier": "chimiegenthermo"}, {"q": "La dissolution d'un sel dans l'eau a généralement :", "opts": ["ΔS < 0 (ordre augmente)", "ΔS > 0 (désordre augmente — ions libres en solution vs cristal ordonné)", "ΔS = 0", "ΔH = 0 obligatoirement"], "a": 1, "exp": "Dissolution : cristal ordonné → ions libres en solution (plus de désordre) → ΔS > 0. C'est souvent ce qui compense un ΔH endothermique pour que ΔG = ΔH − TΔS soit négatif (dissolution spontanée malgré absorption de chaleur).", "matiere": "Chimie Générale", "color": "#818cf8", "fichier": "chimiegenthermo"}, {"q": "L'hydrolyse de l'ATP est spontanée car :", "opts": ["ΔH > 0 et ΔS < 0", "ΔG° = −30,5 kJ/mol < 0 (réaction exergonique)", "K << 1", "La réaction est endothermique"], "a": 1, "exp": "Hydrolyse ATP → ADP + Pi : ΔG° = −30,5 kJ/mol. En conditions cellulaires réelles ΔG ≈ −50 à −60 kJ/mol (rapport ATP/ADP élevé). C'est pourquoi l'ATP peut 'payer' des réactions endergoniques (biosynthèse, transport actif, mouvement).", "matiere": "Chimie Générale", "color": "#818cf8", "fichier": "chimiegenthermo"}, {"q": "Si ΔG° = −17,1 kJ/mol, la constante d'équilibre K est :", "opts": ["K < 1 (réactifs favorisés)", "K = 1 (équilibre exact 50/50)", "K > 1 (produits favorisés, environ 10³)", "K = 0 (réaction irréversible)"], "a": 2, "exp": "ΔG° = −RT ln K → ln K = −ΔG°/RT = 17100/(8,314×298) = 6,9 → K = e^6,9 ≈ 1000. ΔG° négatif → K > 1 → produits favorisés. Règle : ΔG° = −5,7 kJ/mol → K ≈ 10 à 25°C.", "matiere": "Chimie Générale", "color": "#818cf8", "fichier": "chimiegenthermo"}, {"q": "Dans la chaîne respiratoire, les électrons circulent du NADH vers l'O₂ car :", "opts": ["L'O₂ est plus léger", "E°(O₂) >> E°(NADH) → ΔE° > 0 → ΔG° < 0 → transfert spontané", "Les électrons remontent leur gradient", "Le NADH est plus oxydant que l'O₂"], "a": 1, "exp": "E°(NADH) = −0,32 V (donneur d'électrons). E°(O₂/H₂O) = +0,82 V (accepteur final). ΔE° = 1,14 V > 0 → ΔG° = −n×F×ΔE° = −220 kJ/mol → spontané → énergie utilisée pour synthétiser l'ATP (phosphorylation oxydative).", "matiere": "Chimie Générale", "color": "#818cf8", "fichier": "chimiegenthermo"}, {"q": "La loi de Le Chatelier prédit que si on augmente la température d'un équilibre endothermique :", "opts": ["L'équilibre se déplace vers les réactifs", "L'équilibre se déplace vers les produits (favorise la réaction endothermique)", "L'équilibre n'est pas affecté", "La constante K diminue"], "a": 1, "exp": "Le Chatelier : si T augmente → le système absorbe de la chaleur → favorise la réaction endothermique → équilibre se déplace vers les produits → K augmente. Pour une réaction exothermique : T augmente → K diminue.", "matiere": "Chimie Générale", "color": "#818cf8", "fichier": "chimiegenthermo"}, {"q": "La phosphorylation des protéines par les kinases cible :", "opts": ["Les groupes –COOH des acides aspartique et glutamique", "Les groupes –OH des sérines, thréonines et tyrosines", "Les groupes –NH₂ des lysines", "Les groupes –SH des cystéines"], "a": 1, "exp": "Les kinases transfèrent le γ-phosphate de l'ATP vers le –OH de Ser, Thr ou Tyr. Les phosphatases retirent le phosphate. Ces modifications post-traductionnelles régulent la plupart des cascades de signalisation cellulaire.", "matiere": "Chimie Organique", "color": "#16a34a", "fichier": "chimieorgafonctions"}, {"q": "L'acyl-CoA (thioester) est très réactif car :", "opts": ["Il contient un soufre électronégatif", "L'hydrolyse du thioester est très exergonique (ΔG° ≈ −31 kJ/mol) → force d'entraînement élevée pour les réactions couplées", "Il est insoluble dans l'eau", "Il contient une liaison C=C"], "a": 1, "exp": "Thioester (Acyl-CoA) : la liaison C–S est plus faible que C–O → hydrolyse très exergonique → excellent donneur de groupes acyle. L'acétyl-CoA est le carrefour du métabolisme : glycolyse + β-oxydation → Krebs + synthèse AG.", "matiere": "Chimie Organique", "color": "#16a34a", "fichier": "chimieorgafonctions"}, {"q": "L'histidine (pKa ~6) joue un rôle de tampon intracellulaire car :", "opts": ["Son pKa est très éloigné du pH physiologique", "Son pKa (~6) est proche du pH intracellulaire (~7,2) → peut être protonée ou déprotonée selon le contexte", "Elle est chargée positivement en permanence", "Elle ne participe pas aux réactions enzymatiques"], "a": 1, "exp": "Histidine (pKa imidazole ~6) : peut être protonée (His–H⁺) ou neutre (His) autour du pH physiologique → rôle de tampon intracellulaire et de site actif enzymatique (sérine-protéases, anhydrases carboniques). L'histidine est le seul AA avec un pKa proche du pH cellulaire.", "matiere": "Chimie Organique", "color": "#16a34a", "fichier": "chimieorgafonctions"}, {"q": "La base de Schiff dans la rhodopsine est formée par :", "opts": ["Un ester entre le rétinal et la rhodopsine", "Une imine C=N entre le CHO du rétinal et le NH₂ d'une lysine de l'opsine", "Une liaison hydrogène", "Une liaison disulfure"], "a": 1, "exp": "Base de Schiff : R–CHO + H₂N–R' → R–CH=N–R' + H₂O (imine). Dans la rhodopsine : rétinal (aldéhyde) + Lys296 de l'opsine → protonated Schiff base. La lumière → isomérisation Z→E → signal → phototransduction.", "matiere": "Chimie Organique", "color": "#16a34a", "fichier": "chimieorgafonctions"}, {"q": "L'aspirine inhibe les COX de façon irréversible car :", "opts": ["Elle bloque le site actif par liaison non covalente", "Elle acétyle (SN2) de façon covalente la Ser530 des COX → inhibition définitive", "Elle précipite les COX", "Elle inhibe leur synthèse"], "a": 1, "exp": "L'aspirine = acide acétylsalicylique (ester). Elle transfère son groupement acétyle (SN2) sur la Ser530 de COX-1 et COX-2 → inhibition irréversible (toute la durée de vie de la protéine, 7-10 jours pour les plaquettes qui n'ont pas de noyau → effet antiagrégant durable).", "matiere": "Chimie Organique", "color": "#16a34a", "fichier": "chimieorgafonctions"}, {"q": "La liaison peptidique est plane et en configuration trans car :", "opts": ["Les 4 substituants du carbone sont différents", "La délocalisation électronique lui confère un caractère partiellement double → rigidité planaire, configuration trans préférée (H et R opposés)", "Les forces de Van der Waals l'imposent", "La liaison hydrogène maintient la planéité"], "a": 1, "exp": "Liaison peptidique : délocalisation C=O ↔ C–N (résonance) → caractère partiellement double → rotation impossible → plan. Configuration trans quasi-universelle (encombrement moindre). Seule exception : proline (cis possible, kink dans la protéine).", "matiere": "Chimie Organique", "color": "#16a34a", "fichier": "chimieorgafonctions"}, {"q": "La réaction SN2 se caractérise par :", "opts": ["Formation d'un carbocation intermédiaire, racémisation", "Attaque simultanée du nucléophile et départ du groupe partant, INVERSION de configuration", "2 étapes cinétiques, favorisée par C tertiaire", "Mécanisme radicalaire"], "a": 1, "exp": "SN2 = mécanisme concerté : Nu: attaque par derrière pendant que LG part → inversion de configuration (effet Walden). Ordre 2. Favorisée par C primaire non encombré. SN1 = carbocation → racémisation, ordre 1.", "matiere": "Chimie Organique", "color": "#16a34a", "fichier": "chimieorgareactions"}, {"q": "La cyclisation du glucose (C=O → hémiacétal) est une :", "opts": ["Réaction d'élimination", "Addition nucléophile intramoléculaire sur le carbonyle", "Substitution électrophile", "Oxydation"], "a": 1, "exp": "Le OH en C5 du glucose (nucléophile) attaque le C=O en C1 (électrophile) → addition nucléophile intramoléculaire → hémiacétal = cycle pyranose → carbone anomérique (C1, nouveau C*) → anomères α et β.", "matiere": "Chimie Organique", "color": "#16a34a", "fichier": "chimieorgareactions"}, {"q": "En métabolisme, NADH est :", "opts": ["Un oxydant (capte des électrons)", "Un réducteur (donne un hydrure H⁻, oxydation +2 du carbone)", "Un acide", "Un électrophile"], "a": 1, "exp": "NADH = réducteur biologique. Il donne H⁻ (hydrure) → réduit le substrat. NAD⁺ = oxydant. En métabolisme : C=O + NADH → CHOH (réduction enzymatique). Produit dans la glycolyse et le cycle de Krebs → chaîne respiratoire.", "matiere": "Chimie Organique", "color": "#16a34a", "fichier": "chimieorgareactions"}, {"q": "La formation d'une liaison peptidique est une réaction de :", "opts": ["Substitution nucléophile (SN2)", "Condensation (déshydratation) : COOH + NH₂ → CO–NH + H₂O", "Addition sur double liaison", "Oxydation du carbone alpha"], "a": 1, "exp": "Liaison peptidique = condensation (réaction de déshydratation). L'eau est éliminée. La réaction inverse = hydrolyse par les protéases. Thermodynamiquement, l'hydrolyse est légèrement exergonique → la biosynthèse nécessite un couplage à l'ATP.", "matiere": "Chimie Organique", "color": "#16a34a", "fichier": "chimieorgareactions"}, {"q": "La réaction d'élimination dans le cycle de Krebs (malate → fumarate par la fumarase) produit :", "opts": ["Une double liaison C=C de configuration Z (cis)", "Une double liaison C=C de configuration E (trans) — fumarate = trans", "Une liaison C=O", "Un alcool"], "a": 1, "exp": "Fumarase : malate → fumarate. La double liaison du fumarate est de configuration E (trans). Réaction d'élimination stéréospécifique = anti-élimination. Important : le fumarase est stéréosélectif (ne produit que le trans-fumarate).", "matiere": "Chimie Organique", "color": "#16a34a", "fichier": "chimieorgareactions"}, {"q": "Un nucléophile est :", "opts": ["Pauvre en électrons, attaque les zones riches", "Riche en électrons (doublet libre ou charge négative), attaque les carbones électrophiles appauvris", "Un ion positif", "Un radical libre"], "a": 1, "exp": "Nucléophile (Nu:) = riche en électrons → attaque l'électrophile (pauvre en électrons). Ex : OH⁻, NH₂, RS⁻. Dans les enzymes : Ser, Cys, His sont des nucléophiles catalytiques. La flèche courbe pointe vers l'électrophile.", "matiere": "Chimie Organique", "color": "#16a34a", "fichier": "chimieorgareactions"}, {"q": "Dans une formule topologique, un sommet de ligne représente :", "opts": ["Un atome d'hydrogène", "Un atome de carbone avec ses H implicites", "Un atome d'oxygène", "Un groupe méthyle explicite"], "a": 1, "exp": "Dans une formule topologique : chaque sommet ou extrémité = carbone. Les H sont implicites (on les déduit : valence C = 4 - nb liaisons). Les hétéroatomes (O, N, S) et leurs H sont écrits explicitement.", "matiere": "Chimie Organique", "color": "#16a34a", "fichier": "chimieorgarepr"}, {"q": "Le glucose et le fructose (C₆H₁₂O₆) sont des :", "opts": ["Énantiomères", "Diastéréoisomères", "Isomères de fonction (aldose vs cétose)", "Isomères de chaîne"], "a": 2, "exp": "Glucose = aldose (CHO en C1). Fructose = cétose (C=O en C2). Même formule brute C₆H₁₂O₆ → isomères de fonction. Glucose et galactose = épiméres (diastéréoisomères différant en C4).", "matiere": "Chimie Organique", "color": "#16a34a", "fichier": "chimieorgarepr"}, {"q": "La règle de Hückel définit l'aromaticité par :", "opts": ["4n électrons π", "4n+2 électrons π dans un cycle plan conjugué", "Un cycle à 6 carbones uniquement", "La présence d'un benzène"], "a": 1, "exp": "Règle de Hückel : 4n+2 électrons π (n entier) dans un système cyclique plan et conjugué. Benzène : 6e π (n=1). Pyridine : 6e π. Les bases azotées de l'ADN sont aromatiques.", "matiere": "Chimie Organique", "color": "#16a34a", "fichier": "chimieorgarepr"}, {"q": "La formule semi-développée du propane est :", "opts": ["C₃H₈", "CH₃–CH₂–CH₃", "3C + 8H", "Propanol"], "a": 1, "exp": "Formule brute : C₃H₈. Formule semi-développée : CH₃–CH₂–CH₃ (liaisons C–H groupées, liaisons C–C explicites). Formule topologique : zigzag de 3 carbones.", "matiere": "Chimie Organique", "color": "#16a34a", "fichier": "chimieorgarepr"}, {"q": "Les acides gras insaturés se distinguent par :", "opts": ["L'absence de carbone", "La présence d'une ou plusieurs doubles liaisons C=C", "La présence d'un noyau benzénique", "Leur formule brute CₙH₂ₙ₊₂"], "a": 1, "exp": "Acide gras insaturé = une ou plusieurs doubles liaisons C=C dans la chaîne hydrocarbonée. CₙH₂ₙ₊₂ = alcane saturé. Acide oléique C18:1Δ9 = mono-insaturé. Acide linoléique C18:2 = poly-insaturé (essentiel).", "matiere": "Chimie Organique", "color": "#16a34a", "fichier": "chimieorgarepr"}, {"q": "La représentation de Cram utilise des traits en coin pour :", "opts": ["Les liaisons dans le plan de la feuille", "Les liaisons venant vers l'observateur (devant le plan)", "Les liaisons allant derrière le plan", "Les doubles liaisons"], "a": 1, "exp": "Cram : trait plein = plan de la feuille. Trait en coin (plein épais) = vers l'observateur (devant). Trait pointillé = derrière le plan. Utilisé pour les acides aminés et glucides pour montrer la configuration absolue.", "matiere": "Chimie Organique", "color": "#16a34a", "fichier": "chimieorgarepr"}, {"q": "Un carbone asymétrique (stéréogène) est lié à :", "opts": ["4 substituants identiques", "4 substituants tous différents → 2 énantiomères possibles", "3 substituants différents", "2 doubles liaisons"], "a": 1, "exp": "C* = 4 substituants tous différents → chiralité → 2 énantiomères (images miroir non superposables). Glycine = seul AA naturel sans C* (R = H). Tous les autres AA ont un C* en Cα.", "matiere": "Chimie Organique", "color": "#16a34a", "fichier": "chimieorgastereo"}, {"q": "La configuration S d'un carbone asymétrique correspond à :", "opts": ["Rotation horaire 1→2→3 (substituant 4 au fond)", "Rotation antihoraire 1→2→3 (substituant 4 au fond)", "L'énantiomère dextrogyre", "La configuration D de Fischer"], "a": 1, "exp": "Règle CIP : substituant de priorité 4 au fond → rotation 1→2→3 antihoraire = S. Horaire = R. La plupart des AA naturels sont S (sauf cystéine = R car soufre de –SH est plus lourd).", "matiere": "Chimie Organique", "color": "#16a34a", "fichier": "chimieorgastereo"}, {"q": "Un mélange racémique est :", "opts": ["Un mélange de 2 diastéréoisomères", "Un mélange 50/50 des 2 énantiomères → inactif optiquement", "Une molécule achirale", "Un mélange d'isomères de constitution"], "a": 1, "exp": "Mélange racémique = 50% énantiomère (+) + 50% énantiomère (−) → les rotations s'annulent → [α]D = 0. Problème en pharmacologie : souvent un seul énantiomère est actif (ex : ibuprofène S-actif).", "matiere": "Chimie Organique", "color": "#16a34a", "fichier": "chimieorgastereo"}, {"q": "Les acides gras insaturés naturels ont une configuration :", "opts": ["E (trans) comme dans la margarine", "Z (cis) → coude dans la chaîne → membranes plus fluides", "R toujours", "Achirale (pas de C*)"], "a": 1, "exp": "Acides gras naturels insaturés = configuration Z (cis). Le coude créé → membranes plus fluides. La margarine (hydrogénation partielle) crée des isomères trans → risque cardiovasculaire (acides gras trans).", "matiere": "Chimie Organique", "color": "#16a34a", "fichier": "chimieorgastereo"}, {"q": "En convention de Fischer, les acides aminés naturels ont l'amine :", "opts": ["À droite → configuration D", "À gauche → configuration L", "En haut sur la chaîne principale", "Au centre de la formule"], "a": 1, "exp": "Convention Fischer pour les AA : NH₂ à gauche = configuration L. NH₂ à droite = configuration D (non naturel, non reconnu par nos enzymes). Tous les AA du vivant = L.", "matiere": "Chimie Organique", "color": "#16a34a", "fichier": "chimieorgastereo"}, {"q": "Le glucose naturel est de configuration :", "opts": ["L (OH à gauche en C5)", "D (OH à droite en C5 dans la formule de Fischer)", "R (convention CIP)", "Achirale"], "a": 1, "exp": "D-glucose : dans la formule de Fischer, l'OH sur le C asymétrique le plus bas (C5) est à droite = D. Tous les sucres naturels sont de configuration D. Le L-glucose existerait mais n'est pas métabolisable par nos enzymes.", "matiere": "Chimie Organique", "color": "#16a34a", "fichier": "chimieorgastereo"}, {"q": "Le collagène de type IV se trouve principalement :", "opts": ["Dans les tendons", "Dans les cartilages", "Dans les lames basales", "Dans les fibres élastiques"], "a": 2, "exp": "Collagène IV : constituant majeur des lames basales (réseau en treillis). Ciblé dans le syndrome de Goodpasture (auto-Ac anti-col IV → GN rapidement progressive + hémorragie pulmonaire). Collagène I = tendons, os, peau. Collagène II = cartilage. Collagène III = réticuline (foie, rate).", "matiere": "Histologie", "color": "#db2777", "fichier": "histologieconjonctif"}, {"q": "Les mastocytes sont identifiés en histologie par :", "opts": ["Le rouge Congo", "L'orcéine", "Le bleu de toluidine (métachromasie — granules violet sur fond bleu)", "L'imprégnation argentique"], "a": 2, "exp": "Mastocytes : bleu de toluidine colore les granules en violet (métachromasie) sur fond bleu → contraste net. Marqueur IHC : CD117 (c-kit), tryptase. En PAS : polysaccharides des granules roses. Orcéine = élastine. Rouge Congo = amyloïde (biréfringence verte en lumière polarisée).", "matiere": "Histologie", "color": "#db2777", "fichier": "histologieconjonctif"}, {"q": "Le tissu adipeux brun se distingue du tissu adipeux blanc par :", "opts": ["Des adipocytes avec une grande vacuole lipidique unique", "Des adipocytes multiloculaires riches en mitochondries et en thermogénine (UCP-1)", "L'absence de vascularisation", "Sa localisation uniquement sous-cutanée"], "a": 1, "exp": "Tissu adipeux brun (TAB) : multiloculaire (petites vacuoles), nombreuses mitochondries (couleur brune), UCP-1 (thermogénine) → dissipation de l'énergie en chaleur (découplage de la chaîne respiratoire). Abondant chez le nouveau-né (lutte contre le froid). Activé par le froid et les bêta-3-agonistes.", "matiere": "Histologie", "color": "#db2777", "fichier": "histologieconjonctif"}, {"q": "La vitamine C est indispensable à la synthèse du collagène car :", "opts": ["Elle fournit les acides aminés", "Elle est cofacteur de la prolyl-hydroxylase → hydroxyproline → stabilité de la triple hélice", "Elle active la lysyl-oxydase", "Elle glycosyle les chaînes pro-alpha"], "a": 1, "exp": "Vitamine C = cofacteur de la prolyl-hydroxylase ET lysyl-hydroxylase → hydroxyproline et hydroxylysine → stabilisation de la triple hélice (liaisons H intermoléculaires). Carence → scorbut : collagène instable → hémorragies périvasculaires, mauvaise cicatrisation, gencives enflées.", "matiere": "Histologie", "color": "#db2777", "fichier": "histologieconjonctif"}, {"q": "Lors de la phase de prolifération de la cicatrisation, les fibroblastes deviennent :", "opts": ["Des ostéoblastes", "Des myofibroblastes — qui synthétisent du collagène III et contractent la plaie", "Des mastocytes", "Des macrophages"], "a": 1, "exp": "Fibroblastes → myofibroblastes (sous l'effet du TGF-β) : acquièrent des filaments d'actine-α musculaire lisse → contraction de la plaie + synthèse de collagène III (tissu de granulation). Remodelage ultérieur : collagène III → collagène I (plus solide). Excès → fibrose/chéloïde.", "matiere": "Histologie", "color": "#db2777", "fichier": "histologieconjonctif"}, {"q": "L'épithélium qui tapisse la trachée et les bronches est :", "opts": ["Simple pavimenteux", "Pseudostratifié cylindrique cilié avec cellules à mucus", "Stratifié pavimenteux kératinisé", "Simple cubique"], "a": 1, "exp": "Épithélium respiratoire = pseudostratifié cylindrique cilié + cellules caliciformes (à mucus). Les cils font remonter le mucus vers le pharynx (clairance mucociliaire). Atteint dans la mucoviscidose (mucus épais, cils bloqués) et le syndrome de Kartagener (cils immobiles).", "matiere": "Histologie", "color": "#db2777", "fichier": "histologieepithelium"}, {"q": "La lame basale est composée principalement de :", "opts": ["Collagène I et fibronectine", "Collagène IV, laminine, perlécane et nidogène", "Élastine et collagène III", "Kératine et vimentine"], "a": 1, "exp": "Lame basale : collagène IV (réseau en treillis) + laminine (ancrage des intégrines) + perlécane (héparane sulfate, charge négative → filtration glomérulaire) + nidogène (pont entre laminine et collagène IV). Visible en PAS (rose) ou immunofluorescence.", "matiere": "Histologie", "color": "#db2777", "fichier": "histologieepithelium"}, {"q": "Les desmosomes utilisent principalement :", "opts": ["Des occludines et claudines", "Des connexines", "Des cadhérines (desmogléine/desmocolline) ancrées sur la kératine (filaments intermédiaires)", "Des intégrines ancrées sur l'actine"], "a": 2, "exp": "Desmosomes : cadhérines (desmogléine, desmocolline) → plaque dense (desmoplakine, plakoglobine) → kératine (filaments intermédiaires). Très résistants aux forces mécaniques. Ciblés dans le pemphigus vulgaire (auto-Ac anti-desmogléine 3) → bulles cutanées et muqueuses.", "matiere": "Histologie", "color": "#db2777", "fichier": "histologieepithelium"}, {"q": "Une glande sébacée sécrète selon le mode :", "opts": ["Mérocrine — exocytose sans perte cellulaire", "Apocrine — perte du cytoplasme apical", "Holocrine — la cellule entière est détruite et constitue la sécrétion", "Endocrine — libération dans le sang"], "a": 2, "exp": "Glandes sébacées = holocrines : les cellules (sébocytes) se différencient, s'accumulent de lipides, puis se lysent totalement pour libérer le sébum. À l'opposé, les glandes salivaires = mérocrines (exocytose). Les glandes mammaires = apocrines (perte apicale).", "matiere": "Histologie", "color": "#db2777", "fichier": "histologieepithelium"}, {"q": "La maladie cœliaque provoque histologiquement :", "opts": ["Une hyperplasie villositaire", "Une atrophie villositaire avec allongement des cryptes et infiltrat lymphocytaire intraépithélial", "Une métaplasie intestinale", "Un carcinome in situ"], "a": 1, "exp": "Maladie cœliaque : atrophie villositaire totale ou subtotale + hyperplasie des cryptes + lymphocytes intraépithéliaux (LIE > 25/100 entérocytes). Rapport V/C < 1 (normal > 3). Diagnostic sur biopsie duodénale. Normalisation après régime sans gluten.", "matiere": "Histologie", "color": "#db2777", "fichier": "histologieepithelium"}, {"q": "La E-cadhérine est :", "opts": ["Une intégrine des hémidesmosomes", "La protéine des jonctions serrées", "Un suppresseur de tumeur — sa perte induit la transition épithélio-mésenchymateuse", "Une connexine des jonctions communicantes"], "a": 2, "exp": "E-cadhérine (épithéliale) : jonctions adhérentes → cohésion cellulaire + inhibition de la migration. Sa perte (mutation CDH1, méthylation) = TEM → cellules invasives → métastases. CDH1 muté dans les cancers gastriques diffus héréditaires. Marqueur de différenciation épithéliale en immunohistochimie.", "matiere": "Histologie", "color": "#db2777", "fichier": "histologieepithelium"}, {"q": "Le cardiomyocyte se distingue du muscle squelettique par :", "opts": ["L'absence de striations transversales", "La présence d'un seul noyau central et de disques intercalaires (jonctions gap + desmosomes)", "Sa multinucléation avec noyaux périphériques", "L'absence d'actine et de myosine"], "a": 1, "exp": "Cardiomyocyte : 1-2 noyaux CENTRAUX, disques intercalaires (jonctions gap pour conduction + desmosomes pour cohésion mécanique), branches latérales. Muscle squelettique : multinucléé, noyaux PÉRIPHÉRIQUES, pas de disques intercalaires. Les 2 ont des striations.", "matiere": "Histologie", "color": "#db2777", "fichier": "histologiemusculaire"}, {"q": "Lors de la contraction musculaire, quelle bande ne change pas de taille ?", "opts": ["La bande I", "La bande A (la myosine reste en place, l'actine glisse dessus)", "La zone H", "Le sarcomère entier"], "a": 1, "exp": "Théorie des filaments glissants : l'actine glisse sur la myosine → bandes I et zone H diminuent (zones de chevauchement augmentent) → sarcomère se raccourcit. Mais la bande A (= longueur des filaments de myosine) reste CONSTANTE. Mémo : bAnde A = constant (A comme Ancre).", "matiere": "Histologie", "color": "#db2777", "fichier": "histologiemusculaire"}, {"q": "La rigidité cadavérique est due à :", "opts": ["Une contraction active des muscles post-mortem", "L'épuisement de l'ATP → les têtes de myosine restent fixées à l'actine (le détachement nécessite de l'ATP)", "Un excès de calcium", "La destruction des filaments d'actine"], "a": 1, "exp": "Détachement actine-myosine nécessite ATP. Après la mort, ATP s'épuise → têtes de myosine bloquées sur actine → rigidité. Maximum à 6-12h (37°C), disparaît à 24-48h (autolyse enzymatique des protéines). Utile en médecine légale pour estimer l'heure du décès.", "matiere": "Histologie", "color": "#db2777", "fichier": "histologiemusculaire"}, {"q": "Les inhibiteurs calciques abaissent la tension artérielle en :", "opts": ["Bloquant les récepteurs bêta-adrénergiques", "Inhibant la MLC kinase indirectement via ↓ Ca<sup>2</sup><sup>+</sup> → ↓ Ca<sup>2</sup><sup>+</sup>-calmoduline → relaxation du muscle lisse vasculaire", "Augmentant la sécrétion de NO", "Bloquant la troponine C"], "a": 1, "exp": "Muscle lisse : Ca<sup>2</sup><sup>+</sup> + calmoduline → MLC kinase → phosphorylation MLC → contraction. Inhibiteurs calciques → ↓ entrée Ca<sup>2</sup><sup>+</sup> → ↓ MLC kinase active → relaxation vasculaire → vasodilatation → ↓ PA. Pas de troponine dans le muscle lisse (régulation par calmoduline uniquement).", "matiere": "Histologie", "color": "#db2777", "fichier": "histologiemusculaire"}, {"q": "Les cellules satellites du muscle squelettique sont :", "opts": ["Des macrophages résidents", "Des cellules souches quiescentes entre sarcolemme et lame basale → régénération musculaire", "Des fibroblastes intermusculaires", "Des cellules de Schwann"], "a": 1, "exp": "Cellules satellites : cellules souches musculaires quiescentes (Pax7+, Myf5+). Localisées entre sarcolemme (membrane plasmique) et lame basale. Activées par la lésion → prolifération → différenciation → fusion → nouvelles fibres. Le myocarde adulte n'en a pas → pas de régénération fonctionnelle après infarctus.", "matiere": "Histologie", "color": "#db2777", "fichier": "histologiemusculaire"}, {"q": "Les corps de Nissl correspondent à :", "opts": ["Des amas de mitochondries dans le soma", "Du réticulum endoplasmique granuleux abondant coloré au crésyl violet — dans le soma et les dendrites, absent de l'axone", "Des lysosomes", "Des ribosomes libres uniquement"], "a": 1, "exp": "Corps de Nissl = REG + polysomes → synthèse protéique intense dans les neurones. Colorés en bleu-violet par le crésyl violet. Présents dans le soma et les dendrites. Absents du cône axonal et de l'axone → repère histologique pour délimiter le corps cellulaire.", "matiere": "Histologie", "color": "#db2777", "fichier": "histologienerveux"}, {"q": "Les oligodendrocytes myélinisent :", "opts": ["Un seul segment d'un seul axone (comme les cellules de Schwann)", "Plusieurs axones à la fois dans le SNC", "Uniquement les axones du SNP", "Les dendrites des neurones corticaux"], "a": 1, "exp": "Oligodendrocyte (SNC) : myélinise plusieurs axones (jusqu'à 40) simultanément — un prolongement par axone. Cellule de Schwann (SNP) : myélinise UN SEUL segment d'UN SEUL axone. Différence clé pour comprendre la SEP (oligodendrocytes) vs Guillain-Barré (Schwann).", "matiere": "Histologie", "color": "#db2777", "fichier": "histologienerveux"}, {"q": "Dans la conduction saltatoire, la dépolarisation se produit :", "opts": ["En continu le long de l'axone myélinisé", "Uniquement aux nœuds de Ranvier (zones non myélinisées riches en canaux Na<sup>+</sup>)", "Dans les dendrites uniquement", "Dans les boutons présynaptiques uniquement"], "a": 1, "exp": "Conduction saltatoire : l'influx 'saute' de nœud de Ranvier en nœud de Ranvier. Myéline = isolant électrique → dépolarisation uniquement là où la membrane est exposée (nœuds). Résultat : vitesse 10-100× plus élevée ET consommation d'énergie réduite (moins de pompes Na<sup>+</sup>/K<sup>+</sup> à activer).", "matiere": "Histologie", "color": "#db2777", "fichier": "histologienerveux"}, {"q": "La myasthénie grave est due à :", "opts": ["Une destruction des motoneurones spinaux", "Des auto-Ac anti-récepteurs nicotiniques à l'ACh → moins de récepteurs → faiblesse musculaire fluctuante aggravée à l'effort", "Un déficit en acétylcholinestérase", "Une démyélinisation de la jonction neuromusculaire"], "a": 1, "exp": "Myasthénie = auto-immunité contre RNiCh (85%) ou anti-MuSK (10-15%) → défaut de transmission neuromusculaire. Caractéristique : fatigabilité (s'aggrave à la répétition). Traitement : néostigmine (inhibe l'acétylcholinestérase → plus d'ACh dans la fente) + immunosuppresseurs + thymectomie.", "matiere": "Histologie", "color": "#db2777", "fichier": "histologienerveux"}, {"q": "Dans la moelle épinière, la substance grise est disposée :", "opts": ["En surface, autour de la substance blanche centrale", "En H central (cornes antérieures = motoneurones, cornes postérieures = sensitif)", "De façon diffuse et homogène", "Uniquement dans les cornes antérieures"], "a": 1, "exp": "Moelle épinière : substance grise en H (papillon) au centre. Cornes antérieures (ventrales) = corps cellulaires des motoneurones α. Cornes postérieures (dorsales) = relais sensitifs. Corne latérale (T1-L2) = SNA sympathique. Substance blanche en périphérie (cordons = axones myélinisés des voies ascendantes/descendantes).", "matiere": "Histologie", "color": "#db2777", "fichier": "histologienerveux"}, {"q": "Au frottis MGG, l'éosinophile se distingue par :", "opts": ["Un noyau plurilobé (4-5 lobes) et de petits granules", "Un noyau bilobé et de grands granules orange-rouges refringents", "Des granules violets masquant un noyau irrégulier", "Un grand noyau réniforme avec cytoplasme gris"], "a": 1, "exp": "Éosinophile : noyau bilobé + grands granules éosinophiles (orange-rouges, refringents). 2-4% des GB. Augmenté dans les parasitoses (Löffler), les allergies, la maladie de Churg-Strauss. Neutrophile : noyau plurilobé + petits granules neutres. Basophile : granules violets masquant le noyau.", "matiere": "Histologie", "color": "#db2777", "fichier": "histologiesang"}, {"q": "Une anémie ferriprive se caractérise au frottis par :", "opts": ["Des GR macrocytaires hyperchromiques", "Des GR microcytaires hypochromes (pâles, zone centrale claire élargie) — VGM < 80 fL, ferritine effondrée", "Des GR en faucille", "Des GR avec corps de Jolly"], "a": 1, "exp": "Anémie ferriprive : microcytose (VGM < 80 fL) + hypochromie (CCMH diminuée, zone claire centrale élargie > 1/3 du GR). Ferritine basse (< 15 µg/L = critère diagnostic). Cause fréquente : saignement digestif occulte, règles abondantes, malabsorption.", "matiere": "Histologie", "color": "#db2777", "fichier": "histologiesang"}, {"q": "Le chromosome Philadelphie dans la LMC résulte de :", "opts": ["Une délétion du chromosome 22", "La translocation t(9;22) → fusion BCR-ABL (tyrosine kinase constitutive) → prolifération myéloïde clonale", "Une trisomie 12", "Une mutation FLT3"], "a": 1, "exp": "LMC : t(9;22)(q34;q11) = chromosome Philadelphie. ABL (9q34) + BCR (22q11) → protéine BCR-ABL (210 kDa) = tyrosine kinase toujours active → prolifération. Imatinib = inhibiteur TK ciblé → révolution thérapeutique (1999). Exemple paradigmatique de thérapie ciblée.", "matiere": "Histologie", "color": "#db2777", "fichier": "histologiesang"}, {"q": "La coloration de Perls (bleu de Prusse) est utilisée pour :", "opts": ["Visualiser l'amyloïde", "Détecter le fer (ferritine, hémosidérine) dans les tissus — bleu-vert", "Colorer les polysaccharides (glycogène)", "Identifier la myéloperoxydase"], "a": 1, "exp": "Perls : K<sub>4</sub>[Fe(CN)<sub>6</sub>] + acide chlorhydrique → bleu de Prusse avec les ions Fe<sup>3</sup><sup>+</sup>. Utilisé pour l'hémochromatose (surcharge en fer), les sidéroblastes en couronne (anneau de granules autour du noyau = anémie sidéroblastique), la surcharge martiale hépatique.", "matiere": "Histologie", "color": "#db2777", "fichier": "histologiesang"}, {"q": "Dans la biopsie médullaire d'un PTI, on trouve :", "opts": ["Une moelle pauvre (aplasie)", "Une moelle riche avec hyperplasie des mégacaryocytes (production normale, destruction périphérique par auto-Ac)", "Une infiltration par des blastes", "Des granulomes épithélioïdes"], "a": 1, "exp": "PTI : auto-Ac anti-plaquettes → destruction splénique accélérée → thrombopénie. La moelle compense en augmentant la production → hyperplasie mégacaryocytaire. Biopsie non nécessaire au diagnostic habituel mais utile pour éliminer une aplasie ou un syndrome myélodysplasique. Plaquettes < 30 G/L → risque hémorragique grave.", "matiere": "Histologie", "color": "#db2777", "fichier": "histologiesang"}, {"q": "Les β-lactamines agissent en :", "opts": ["Inhibant l'ARN polymérase bactérienne", "Inhibant les PBP (protéines liant la pénicilline = transpeptidases) → blocage de la réticulation du peptidoglycane → fragilisation de la paroi → lyse osmotique. Bactéricides.", "Inhibant la synthèse des acides nucléiques", "Ciblant les ribosomes 30S"], "a": 1, "exp": "β-lactamines (pénicillines, céphalosporines, carbapénèmes) : cycle β-lactame → mimétisme structural avec le substrat naturel des transpeptidases (D-Ala-D-Ala) → liaison covalente irréversible avec les PBP → blocage de la réticulation du peptidoglycane → paroi fragilisée → pression osmotique → lyse → bactéricides. Spectre variable selon la génération.", "matiere": "Pharmacologie", "color": "#ea580c", "fichier": "pharmaabc"}, {"q": "Le SARM est résistant à toutes les β-lactamines car :", "opts": ["Il produit une carbapénémase", "Il possède le gène mecA qui code pour PBP2a — une transpeptidase à très faible affinité pour toutes les β-lactamines → aucune β-lactamine efficace", "Il détruit les β-lactamines par sa β-lactamase BLSE", "Il a une membrane externe imperméable"], "a": 1, "exp": "SARM : mecA (sur SCCmec) → PBP2a (faible affinité pour toutes β-lactamines). Traitement : vancomycine IV (TDM AUC/CMI ≥ 400), linézolide (bactériostatique, oral possible), daptomycine (bactéricide, pas pour pneumonies = inactivée par surfactant). Précautions contact. SARM communautaire : souche spécifique (souvent leucocidine de Panton-Valentine).", "matiere": "Pharmacologie", "color": "#ea580c", "fichier": "pharmaabc"}, {"q": "L'aciclovir est efficace spécifiquement contre les herpèsvirus car :", "opts": ["Il est activé par une enzyme humaine", "La thymidine kinase virale (absente chez l'homme) phosphoryle spécifiquement l'aciclovir → aciclovir triphosphate → inhibe l'ADN pol virale → sélectivité et faible toxicité humaine", "Il se concentre dans les cellules infectées", "Il stimule le système immunitaire contre le virus"], "a": 1, "exp": "Aciclovir = prodrogue. Étape 1 : TK virale (HSV, VZV) → aciclovir monophosphate (l'aciclovir est très mauvais substrat pour la TK humaine → sélectivité). Étapes 2-3 : kinases cellulaires → aciclovir-TP. Aciclovir-TP : inhibe l'ADN pol virale (compétition avec dGTP) + chaîne terminatrice. Résistance : mutation TK (perte d'activité) → traitement : foscarnet (inhibe directement ADN pol virale).", "matiere": "Pharmacologie", "color": "#ea580c", "fichier": "pharmaabc"}, {"q": "La désescalade antibiotique consiste à :", "opts": ["Augmenter la dose à 48-72h si pas d'amélioration", "Passer à un antibiotique de spectre plus étroit dès que l'antibiogramme est disponible (48-72h) → ↓ pression de sélection → ↓ résistances", "Arrêter l'antibiothérapie si la CRP diminue", "Associer systématiquement 3 antibiotiques"], "a": 1, "exp": "Désescalade : traitement probabiliste large spectre initialement (couvre le plus probable) → antibiogramme à 48-72h → si identification + sensibilité → spectre plus étroit. Ex : C3G → amoxicilline si pneumocoque sensible à la péniG. Objectifs : ↓ coûts, ↓ EI, ↓ résistances, ↓ pression de sélection. Switch IV → oral dès que cliniquement possible (biodisponibilité orale > 70%).", "matiere": "Pharmacologie", "color": "#ea580c", "fichier": "pharmaabc"}, {"q": "Le métronidazole est actif sur les bactéries anaérobies et les parasites car :", "opts": ["C'est un inhibiteur de l'ARN polymérase", "Il est réduit par les systèmes enzymatiques anaérobies (ferrédoxines) en radicaux libres nitroso → dommages à l'ADN bactérien/parasitaire. Les cellules aérobies ne le réduisent pas → sélectivité", "Il bloque la paroi des anaérobies", "Il inhibe la synthèse d'ergostérol"], "a": 1, "exp": "Métronidazole = prodrogue. Réduit par les ferrédoxines (présentes dans les anaérobies et parasites protozoaires) → radical nitro-anion → endommagements ADN et protéines. Aérobies : pas de ferrédoxine → pas de réduction → pas d'activité. Spectre : bactéries anaérobies (C. difficile, Bacteroides, Prevotella, H. pylori en trithérapie), protozoaires (Entamoeba, Giardia, Trichomonas).", "matiere": "Pharmacologie", "color": "#ea580c", "fichier": "pharmaabc"}, {"q": "L'indication préférentielle des IEC dans l'HTA est :", "opts": ["L'HTA + goutte", "L'HTA + diabète (néphroprotection via ↓ pression de filtration glomérulaire + effet antiprotéinurique) et l'HTA + insuffisance cardiaque + post-IDM", "L'HTA + asthme", "L'HTA + grossesse"], "a": 1, "exp": "IEC : indication préférentielle si HTA + diabète (réduisent la progression de la néphropathie diabétique, indépendamment de l'effet antihypertenseur), IC (réduisent la post-charge et le remodelage), post-IDM (limitent le remodelage ventriculaire). Contre-indiqués : grossesse (fœtotoxiques), insuffisance rénale bilatérale des artères rénales, hyperkaliémie > 5,5.", "matiere": "Pharmacologie", "color": "#ea580c", "fichier": "pharmacardio"}, {"q": "La surveillance biologique des AVK repose sur :", "opts": ["La TCA (temps de céphaline activée)", "L'INR (International Normalized Ratio = mesure standardisée du temps de coagulation, reflète l'efficacité des AVK) — objectif 2-3 pour FANV, 2,5-3,5 pour valve mécanique. INR = (TP patient / TP témoin)^ISI. Reflète l'inhibition des facteurs II, VII, IX, X", "Le dosage anti-Xa", "Le temps de saignement"], "a": 1, "exp": "INR = standardisation du TP (taux de prothrombine). AVK → ↓ facteurs II, VII, IX, X (vit K-dépendants) → ↑ TP → ↑ INR. INR > 5 = risque hémorragique majeur → arrêt + vitamine K + PPSB si urgence. INR < 2 = sous-anticoagulation → risque thrombotique. Nombreuses interactions (CYP2C9) et alimentaires (vitamine K).", "matiere": "Pharmacologie", "color": "#ea580c", "fichier": "pharmacardio"}, {"q": "La quadrithérapie de l'insuffisance cardiaque à FE réduite comprend :", "opts": ["Digoxine + amiodarone + furosémide + aspirine", "IEC ou ARNI + bêtabloquant + antagoniste des minéralocorticoïdes + SGLT2 inhibiteur — chaque classe réduit la mortalité indépendamment", "Diurétiques seuls à fortes doses", "Dobutamine en continu"], "a": 1, "exp": "Quadrithérapie ICFEr (2021-2023) : IEC/ARNI (↓ post-charge) + BB (↓ remodelage) + MRA (↓ fibrose) + SGLT2i (↓ congestion). Chacune réduit la mortalité de ~15-25%. Association : ~50% de réduction de mortalité totale. Objectif : initier les 4 classes rapidement, titrer progressivement. Entresto (sacubitril/valsartan) supérieur aux IEC seuls dans l'IC symptomatique.", "matiere": "Pharmacologie", "color": "#ea580c", "fichier": "pharmacardio"}, {"q": "Les statines réduisent le LDL-cholestérol en :", "opts": ["Augmentant la sécrétion biliaire du cholestérol", "Inhibant la HMG-CoA réductase → ↓ synthèse hépatique de cholestérol → ↑ expression du LDLR → ↑ captation des LDL circulants → ↓ LDL plasmatique jusqu'à 50-60%", "Bloquant l'absorption intestinale du cholestérol", "Activant la lipase hormonosensible"], "a": 1, "exp": "HMG-CoA réductase = enzyme limitante de la voie du mévalonate (synthèse du cholestérol). Statines → ↓ cholestérol intracellulaire → signal de carence → ↑ transcription LDLR (via SREBP-2) → plus de LDLR membranaires → captation accrue des LDL circulants → ↓ LDL-C. Ézétimibe bloque le transporteur NPC1L1 intestinal (absorption) → additif aux statines.", "matiere": "Pharmacologie", "color": "#ea580c", "fichier": "pharmacardio"}, {"q": "L'amiodarone peut provoquer des troubles thyroïdiens car :", "opts": ["Elle inhibe la TSH", "Elle contient une grande quantité d'iode (~200 mg par comprimé vs besoin quotidien de 200 µg) → surcharge iodée → hypo ou hyperthyroïdie selon le tissu thyroïdien", "Elle inhibe la déiodase", "Elle bloque les récepteurs thyroïdiens"], "a": 1, "exp": "Amiodarone : 37% de sa masse = iode. Chaque comprimé apporte 1000× les besoins quotidiens. Deux mécanismes : surcharge iodée inhibe la thyroïde (effet Wolff-Chaikoff → hypothyroïdie) OU stimule la thyroïde pathologique (hyperthyroïdie). Surveillance TSH tous les 6 mois. Autres EI : pneumopathie, hépatite, photosensibilisation, dépôts cornéens. t½ = 40-55 j → EI persistent après arrêt.", "matiere": "Pharmacologie", "color": "#ea580c", "fichier": "pharmacardio"}, {"q": "La codéine est inefficace chez certains patients car :", "opts": ["Elle est dégradée par l'acide gastrique", "Les métaboliseurs lents du CYP2D6 (~10% des Caucasiens) ne convertissent pas la codéine en morphine (son métabolite actif) → pas d'analgésie. Les métaboliseurs ultra-rapides → trop de morphine → toxicité", "Elle a un IT trop large", "Elle est antagoniste des récepteurs µ"], "a": 1, "exp": "Codéine = prodrogue → morphine via CYP2D6. Polymorphisme génétique du CYP2D6 : MR lents (6-10% Cauc.) → pas d'effet. MR ultra-rapides (1-7% Cauc., 30% Éthiopiens) → trop de morphine → dépression respiratoire. CI chez enfants < 12 ans (décès reportés), allaitantes (métaboliseurs UR). Même principe pour tramadol (métabolite actif O-desméthyltramadol via CYP2D6).", "matiere": "Pharmacologie", "color": "#ea580c", "fichier": "pharmaneuro"}, {"q": "Les benzodiazépines agissent en :", "opts": ["Bloquant les récepteurs NMDA", "Potentialisant le GABA-A → ↑ fréquence d'ouverture du canal Cl⁻ → hyperpolarisation → ↓ excitabilité neuronale", "Inhibant la recapture de GABA", "Bloquant les canaux Na⁺"], "a": 1, "exp": "BZD : se fixent sur un site allostérique du récepteur GABA-A (entre la sous-unité α et γ) → ↑ fréquence d'ouverture du canal Cl⁻ (SANS augmenter la durée d'ouverture = barbituriques). Cl⁻ rentre → hyperpolarisation → ↓ excitabilité. Antidote : flumazénil (antagoniste compétitif BZD sur le GABA-A). Dépendance physique → sevrage progressif obligatoire.", "matiere": "Pharmacologie", "color": "#ea580c", "fichier": "pharmaneuro"}, {"q": "Le valproate est contre-indiqué chez les femmes enceintes car :", "opts": ["Il est néphrotoxique", "Il est fortement tératogène (spina bifida, malformations cardiaques, troubles neurodéveloppementaux) — risque malformations majeures 10%, neurodéveloppement altéré dans 30-40% des enfants exposés", "Il inhibe la thyroïde", "Il cause une hémolyse"], "a": 1, "exp": "Valproate : inhibiteur de l'histone déacétylase → perturbation de l'expression génique embryonnaire → tératogénicité élevée (tube neural, cœur, membres). Risque neurodéveloppemental (QI réduit, autisme, TDAH). En France depuis 2018 : contre-indiqué dans la bipolarité des femmes en âge de procréer sauf exceptionnellement. En épilepsie : maintenu si indispensable + contraception + FAN obligatoire.", "matiere": "Pharmacologie", "color": "#ea580c", "fichier": "pharmaneuro"}, {"q": "La prégabaline (Lyrica) agit sur les douleurs neuropathiques en :", "opts": ["Bloquant les récepteurs NMDA", "Bloquant les sous-unités α₂δ des canaux Ca²⁺ voltage-dépendants présynaptiques → ↓ libération de glutamate et substance P → ↓ neurotransmission nociceptive centrale", "Inhibant la COX-2", "Bloquant les récepteurs µ-opioïdes"], "a": 1, "exp": "Prégabaline/gabapentine : se lient à la sous-unité α₂δ des canaux Ca²⁺ présynaptiques → ↓ influx Ca²⁺ → ↓ vésicules libérées → ↓ glutamate, substance P. Pas d'effet sur COX, GABA, NMDA. Indications : névralgie post-zostérienne, neuropathie diabétique, fibromyalgie, anxiété généralisée. Classée stupéfiant en France en 2021 (mésusage croissant).", "matiere": "Pharmacologie", "color": "#ea580c", "fichier": "pharmaneuro"}, {"q": "En cas de toxicité systémique aux anesthésiques locaux (LAST), le traitement spécifique est :", "opts": ["Adrénaline IV", "Émulsion lipidique 20% (Intralipide) → piège les AL lipophiles → ↓ concentration libre → cardioprotection", "Naloxone IV", "Flumazénil IV"], "a": 1, "exp": "LAST : AL injecté en intravasculaire → convulsions + arythmies cardiaques (bupivacaïne++) → arrêt cardiaque. Traitement : benzodiazépines (convulsions) + émulsion lipidique 20% IV (lipid rescue) → les lipides captent les AL lipophiles → les séquestrent → ↓ concentration libre cardiaque. Atropine si bradycardie. RCP si arrêt. Intralipide doit être disponible partout où on injecte des AL.", "matiere": "Pharmacologie", "color": "#ea580c", "fichier": "pharmaneuro"}, {"q": "Les bêtabloquants sont contre-indiqués dans l'asthme car :", "opts": ["Ils augmentent la fréquence cardiaque", "Le blocage des récepteurs β₂-adrénergiques bronchiques → bronchospasme — les β₂ sont normalement bronchodilatateurs, les bloquer peut déclencher une crise d'asthme grave", "Ils sont néphrotoxiques", "Ils inhibent les CYP450"], "a": 1, "exp": "β-AR bronchiques = β₂ → activation → bronchodilatation. Bêtabloquants non-cardiosélectifs (propranolol) bloquent β₁ ET β₂ → bronchospasme. Bêtabloquants cardiosélectifs (métoprolol, bisoprolol) ciblent préférentiellement β₁ → moins de risque bronchique MAIS toujours avec prudence en asthme sévère. Les β₂-agonistes (salbutamol) sont agonistes = bronchodilatateurs = traitement de la crise.", "matiere": "Pharmacologie", "color": "#ea580c", "fichier": "pharmapd"}, {"q": "Un antagoniste compétitif :", "opts": ["Réduit l'effet maximal (Emax) du médicament", "Décale la courbe dose-effet vers la droite sans modifier l'Emax — déplaçable par une forte dose d'agoniste", "Inhibe irréversiblement l'enzyme cible", "Potentialise l'effet de l'agoniste"], "a": 1, "exp": "Antagoniste compétitif : même site de liaison que l'agoniste → compétition → courbe E=f(dose) décalée vers la droite (il faut plus d'agoniste pour le même effet) MAIS Emax inchangé. Ex : naloxone vs morphine. Antagoniste non-compétitif (aspirine/COX, phénoxybenzamine/α-AR) : fixation irréversible → ↓ Emax.", "matiere": "Pharmacologie", "color": "#ea580c", "fichier": "pharmapd"}, {"q": "La toux sous IEC est due à :", "opts": ["Un bronchospasme direct", "L'accumulation de bradykinine (l'IEC bloque aussi sa dégradation) → stimulation des récepteurs bronchiques → toux sèche dans 10-15% des cas", "Une allergie IgE-médiée", "Une fibre pulmonaire"], "a": 1, "exp": "IEC (ramipril, énalapril) : inhibent l'ECA (convertit AnglI → AngII mais dégrade aussi bradykinine). Accumulation bradykinine → ↑ prostaglandines + substance P → irritation bronchique → toux sèche, surtout nocturne. Traitement : remplacer par ARA2 (valsartan, irbesartan) qui ne modifie pas la bradykinine. EI de type A, prévisible, dose-dépendant.", "matiere": "Pharmacologie", "color": "#ea580c", "fichier": "pharmapd"}, {"q": "L'arrêt brutal des bêtabloquants est dangereux car :", "opts": ["La tension artérielle chute brutalement", "Les récepteurs β se sont up-régulés pendant le traitement → à l'arrêt, les catécholamines stimulent ces récepteurs surnuméraires → rebond adrénergique (tachycardie, HTA, angor)", "Cela cause une insuffisance surrénalienne", "Les CYP sont désinduits brutalement"], "a": 1, "exp": "Dépendance pharmacodynamique : sous bêtabloquants → ↓ stimulation β → compensation par up-régulation des récepteurs β (plus nombreux). Arrêt brutal → catécholamines endogènes normales stimulent ces récepteurs surnuméraires → effet adrénergique excessif → tachycardie sinusale, poussée HTA, angor instable, risque IDM. Arrêt progressif sur 1-2 semaines obligatoire.", "matiere": "Pharmacologie", "color": "#ea580c", "fichier": "pharmapd"}, {"q": "L'affaire du Médiator a montré :", "opts": ["Que la pharmacovigilance fonctionne parfaitement", "Les limites de la pharmacovigilance post-AMM : médicament prescrit hors AMM comme coupe-faim → valvulopathies + HTAP → ~500 décès → retiré après 33 ans. A conduit à une réforme majeure en France", "Que les EI de type B sont prévisibles", "Que les CRPV sont inutiles"], "a": 1, "exp": "Médiator : benfluorex → norfenfluramine (métabolite) → agoniste 5-HT₂B cardiaque → valvulopathies. Prescrit hors AMM depuis des années malgré des signaux. Affaire judiciaire → condamnation Servier. Conséquences : loi Bertrand (2011) sur la transparence des liens d'intérêts, renforcement de la pharmacovigilance, registre des médicaments à risque. Exemple paradigmatique du risque des prescriptions hors AMM.", "matiere": "Pharmacologie", "color": "#ea580c", "fichier": "pharmapd"}, {"q": "La biodisponibilité d'un médicament per os est inférieure à 100% principalement à cause :", "opts": ["De la mauvaise solubilité uniquement", "De l'absorption incomplète ET de l'effet de premier passage hépatique (EPP) — le médicament est métabolisé dans la paroi intestinale et le foie avant d'atteindre la circulation systémique", "De la liaison aux protéines plasmatiques", "De l'élimination rénale rapide"], "a": 1, "exp": "F (biodisponibilité) = fraction absorbée × (1 − extraction hépatique). EPP : médicament absorbé passe dans la veine porte → foie → métabolisme avant circulation systémique. Morphine : F ≈ 30% (fort EPP) → dose orale = 3× dose IV. Trinitrine per os : F < 1% → inefficace. En sublingual → évite EPP (drainage cave).", "matiere": "Pharmacologie", "color": "#ea580c", "fichier": "pharmapk"}, {"q": "La rifampicine est un inducteur enzymatique. Elle :", "opts": ["Augmente les concentrations des médicaments co-administrés", "Augmente l'expression des CYP (surtout CYP3A4) → métabolisme accéléré → concentrations plasmatiques des autres médicaments diminuées → risque d'inefficacité (contraceptifs, ciclosporine, anticoagulants)", "Inhibe directement les reins", "Bloque l'absorption intestinale"], "a": 1, "exp": "Inducteurs (rifampicine, carbamazépine, phénytoïne, millepertuis) : ↑ transcription des gènes CYP → plus d'enzymes → métabolisme accéléré des substrats → ↓ concentrations plasmatiques → inefficacité. Rifampicine = inducteur le plus puissant. Rend inefficaces : contraceptifs oraux (grossesse non désirée !), ciclosporine, warfarine, antirétroviraux.", "matiere": "Pharmacologie", "color": "#ea580c", "fichier": "pharmapk"}, {"q": "La phénytoïne a une cinétique d'ordre 0 aux doses thérapeutiques car :", "opts": ["Elle est éliminée par les reins uniquement", "Ses enzymes de métabolisme (CYP2C9) sont saturées aux doses thérapeutiques → élimination à vitesse constante → t½ variable selon la dose → accumulation non linéaire dangereuse", "Elle se lie à l'albumine", "Elle traverse la BHE"], "a": 1, "exp": "Phénytoïne : enzyme saturée (Km = ~10 mg/L) → cinétique de Michaelis-Menten. En dessous du Km → ordre 1. Au-dessus → ordre 0. Conséquence : petite augmentation de dose → grande augmentation de concentration → toxicité (nystagmus, ataxie, confusion). Adaptation posologique très prudente + dosage plasmatique obligatoire.", "matiere": "Pharmacologie", "color": "#ea580c", "fichier": "pharmapk"}, {"q": "Le suivi thérapeutique (TDM) est obligatoire pour les médicaments à :", "opts": ["Large index thérapeutique", "Index thérapeutique étroit — la zone efficace est proche de la zone toxique. Ex : digoxine, lithium, aminosides, vancomycine, phénytoïne, ciclosporine", "Élimination uniquement biliaire", "Métabolisme uniquement par phase II"], "a": 1, "exp": "IT étroit = concentrations efficaces proches des concentrations toxiques. Digoxine : 0,5-2 ng/mL (efficace), > 2 ng/mL (toxique). Lithium : 0,6-1,2 mmol/L (efficace), > 1,5 (toxique). Aminosides : dosage pic (efficacité) + résiduelle (toxicité rénale/auditive). Vancomycine : AUC/CMI (rapport entre l'exposition totale au médicament et la concentration minimale inhibant la bactérie = mesure de l'efficacité antibiotique) pour efficacité + résiduelle < 15-20 mg/L pour éviter la néphrotoxicité.", "matiere": "Pharmacologie", "color": "#ea580c", "fichier": "pharmapk"}, {"q": "Le débit cardiaque normal au repos est :", "opts": ["1-2 L/min", "5 L/min (VES ~70 mL × FC ~75 bpm)", "10 L/min", "20 L/min"], "a": 1, "exp": "DC = VES × FC = 70 mL × 75 bpm = 5250 mL/min ≈ 5 L/min. FE normale ≥ 55% (VES/VTD). À l'effort, le DC peut atteindre 20-25 L/min chez un athlète (VES ↑ + FC ↑). ICFEr : FE < 40%, DC insuffisant.", "matiere": "Physiologie", "color": "#059669", "fichier": "physiocardio"}, {"q": "Le SRAA est activé par :", "opts": ["Une hypertension artérielle", "Une baisse de la PA, de la volémie ou une hyponatrémie → rénine → angiotensine II → aldostérone → Na+/H2O réabsorbés → PA ↑", "Une hypernatrémie", "Un excès de volume circulant"], "a": 1, "exp": "SRAA : PA ↓ ou Na+ ↓ ou débit tubulaire ↓ → cellules juxta-glomérulaires → rénine → angiotensine I → ECA (poumon) → angiotensine II → vasoconstriction + aldostérone → Na+/H2O réabsorbés → volémie ↑ → PA ↑. IEC bloquent l'ECA → antihypertenseurs.", "matiere": "Physiologie", "color": "#059669", "fichier": "physiocardio"}, {"q": "Un sus-décalage du segment ST sur l'ECG signifie :", "opts": ["Un trouble de la conduction (BBG)", "Une ischémie transmurale (STEMI) — occlusion coronaire complète — urgence coronarographique < 90 min", "Une hypokaliémie", "Une péricardite uniquement"], "a": 1, "exp": "Sus-ST > 1 mm dans ≥2 dérivations contiguës = STEMI (occlusion coronaire totale). Urgence absolue : coronarographie + angioplastie < 90 min (porte-ballon). Sus-ST diffus (concave) = péricardite aiguë. Sous-ST = ischémie sous-endocardique (NSTEMI ou angor instable).", "matiere": "Physiologie", "color": "#059669", "fichier": "physiocardio"}, {"q": "La loi de Frank-Starling stipule que :", "opts": ["La FC augmente quand la précharge augmente", "La force de contraction du myocarde augmente avec le volume de remplissage (précharge) — mécanisme intrinsèque d'adaptation", "La post-charge détermine seule le VES", "La contractilité est constante"], "a": 1, "exp": "Frank-Starling : précharge ↑ → étirement des sarcomères → meilleur alignement actine-myosine → force de contraction ↑ → VES ↑. Mécanisme adaptatif au retour veineux. Limite : en IC sévère, le ventricule dilate sans amélioration du VES (sortie de la courbe de Frank-Starling).", "matiere": "Physiologie", "color": "#059669", "fichier": "physiocardio"}, {"q": "L'œdème néphrotique est dû à :", "opts": ["Une P hydrostatique capillaire élevée (insuffisance cardiaque)", "Une pression oncotique plasmatique basse (πp ↓) — perte d'albumine dans les urines → moins d'attraction de l'eau → œdème", "Une obstruction lymphatique", "Une perméabilité capillaire augmentée"], "a": 1, "exp": "Œdème néphrotique : protéinurie massive (> 3,5 g/j) → perte d'albumine → πp ↓ → moins de force d'attraction de l'eau vers le plasma → eau reste dans l'interstitium → œdème. Traitement causal (corticoïdes si néphrose lipoïdique) + albumine IV si hypoalbuminémie sévère.", "matiere": "Physiologie", "color": "#059669", "fichier": "physiocardio"}, {"q": "L'absorption des lipides alimentaires se fait par :", "opts": ["Transport direct via les veines portales", "Formation de micelles (sels biliaires + AG + monoglycérides) → absorption dans les entérocytes → re-synthèse en triglycérides → chylomicrons → lymphe (vaisseaux chylifères)", "Transport via les VLDL directement", "Phagocytose par les macrophages intestinaux"], "a": 1, "exp": "Lipides : lipase pancréatique + colipase → AG + MG → micelles (sels biliaires nécessaires) → entérocytes → re-estérification → TG → apoprotéines → chylomicrons → vaisseau chylifère → canal thoracique → sang (bypasse le foie). Déficit sels biliaires (cholestase, résection iléale) → stéatorrhée + malabsorption vitamines liposolubles.", "matiere": "Physiologie", "color": "#059669", "fichier": "physiodigest"}, {"q": "La CCK (cholécystokinine) est libérée par :", "opts": ["L'acide gastrique", "Les graisses et protéines dans le duodénum → contraction vésicule biliaire + sécrétion enzymatique pancréatique + relaxation sphincter d'Oddi", "Le glucose uniquement", "L'aldostérone"], "a": 1, "exp": "CCK : sécrétée par les cellules I du duodénum. Stimulée par graisses et protéines. Actions : vésicule biliaire contractée → bile dans le duodénum + pancréas → enzymes (lipase, trypsine, amylase) + relaxation sphincter d'Oddi. Satié (centre de la satiété). Sécrétine : neutralise l'acide (stimule NaHCO<sub>3</sub> pancréatique).", "matiere": "Physiologie", "color": "#059669", "fichier": "physiodigest"}, {"q": "Dans la cirrhose, l'encéphalopathie hépatique est due à :", "opts": ["L'hypoglycémie uniquement", "L'accumulation d'ammoniac (NH<sub>3</sub>) — le foie ne peut plus convertir NH<sub>3</sub> en urée (cycle de l'urée) → NH<sub>3</sub> traverse la BHE → neurotoxicité", "La carence en facteurs de coagulation", "L'hypoalbuminémie"], "a": 1, "exp": "Encéphalopathie hépatique : insuffisance hépatocellulaire → ↓ cycle de l'urée → NH<sub>3</sub> ↑ → passe BHE → altère la neurotransmission (faux neurotransmetteurs, inhibition Na<sup>+</sup>/K<sup>+</sup>-ATPase neuronale). Traitement : lactulose (acidifie le côlon → NH<sub>4</sub><sup>+</sup> non absorbable) + rifaximine (↓ bactéries productrices d'ammoniac) + régime protéique contrôlé.", "matiere": "Physiologie", "color": "#059669", "fichier": "physiodigest"}, {"q": "Les IPP (oméprazole) bloquent :", "opts": ["Les récepteurs H2 à l'histamine", "La H<sup>+</sup>/K<sup>+</sup>-ATPase des cellules pariétales gastriques → suppression de la sécrétion acide", "La gastrine", "Le facteur intrinsèque"], "a": 1, "exp": "IPP : pro-médicaments activés en milieu acide → lient de façon covalente irréversible la H<sup>+</sup>/K<sup>+</sup>-ATPase (pompe à protons) des cellules pariétales → blocage de la sécrétion acide. Plus puissants que les anti-H2 (ranitidine). Attention long terme : ↓ absorption Mg<sup>2</sup><sup>+</sup>, Fe<sup>2</sup><sup>+</sup>, Ca<sup>2</sup><sup>+</sup>, B12, risque Clostridium difficile, pneumonies.", "matiere": "Physiologie", "color": "#059669", "fichier": "physiodigest"}, {"q": "La transplantation de microbiote fécal (TMF) est le traitement de référence de :", "opts": ["La maladie de Crohn", "Les infections récidivantes à Clostridium difficile (> 90% de guérison) — restauration de la résistance à la colonisation", "Le syndrome de l'intestin irritable", "La cirrhose hépatique"], "a": 1, "exp": "TMF = transfert de selles d'un donneur sain → restaure un microbiote diversifié → compétition avec C. diff → guérison. Indication principale : C. diff récidivant (≥ 2 épisodes) après traitement conventionnel (vancomycine orale). Efficacité > 90% après 1 TMF. Voie : coloscopie, enema ou gélules lyo.", "matiere": "Physiologie", "color": "#059669", "fichier": "physiodigest"}, {"q": "Dans l'axe thyroïdien, une TSH élevée avec T4L basse indique :", "opts": ["Une hyperthyroïdie centrale", "Une hypothyroïdie périphérique — la TSH essaie de compenser le manque de T4 → cause principale : thyroïdite de Hashimoto", "Une sécrétion ectopique de TSH", "Un syndrome de Cushing"], "a": 1, "exp": "TSH ↑ + T4L ↓ = hypothyroïdie périphérique (la thyroïde répond insuffisamment → hypothalamus + hypophyse surcompensent → TSH ↑). Cause principale : Hashimoto (anti-TPO+). TSH ↓ + T4L ↓ = hypothyroïdie centrale (atteinte hypo/hypophysaire). TSH ↓ + T4L ↑ = hyperthyroïdie périphérique (Basedow : TRAb+).", "matiere": "Physiologie", "color": "#059669", "fichier": "physioendo"}, {"q": "Les critères diagnostiques du diabète incluent :", "
